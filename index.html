<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モンスターマスターズ - PROTOTYPE</title>
    <style>
        :root {
            --main-blue: #0288d1;
            --panel-bg: rgba(0, 30, 60, 0.85);
            --gold: #fdd835;
        }

        body { font-family: sans-serif; background: #e0f7fa; margin: 0; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 450px; height: 100vh; background: white; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.3); }

        /* --- 性別選択画面 (初期表示) --- */
        #setup-screen {
            position: absolute; inset: 0; background: var(--panel-bg); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .select-btn {
            width: 200px; padding: 20px; margin: 10px; font-size: 18px; cursor: pointer;
            border-radius: 10px; border: 2px solid white; background: transparent; color: white;
        }
        .select-btn:hover { background: rgba(255,255,255,0.2); }

        /* --- 共通：上部ステータス --- */
        .top-nav { position: absolute; top: 0; width: 100%; background: var(--panel-bg); color: white; padding: 10px; box-sizing: border-box; z-index: 100; font-size: 12px; }
        .exp-bar { width: 100%; height: 8px; background: #444; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        #exp-fill { height: 100%; background: var(--main-blue); width: 20%; transition: width 0.3s; }

        /* --- 画面切り替え --- */
        .screen { display: none; height: 100%; padding-top: 80px; box-sizing: border-box; }
        .active { display: block; }

        /* --- ホーム画面：主人公の画像表示 --- */
        #home-screen { background: linear-gradient(to bottom, #87CEEB, #fff); text-align: center; }
        .stage { height: 55%; display: flex; align-items: flex-end; justify-content: center; gap: 10px; padding-bottom: 40px; }
        
        /* ここがフォルダ内の画像を表示するメイン部分 */
        #hero-img {
            width: 160px; height: 240px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            transition: background-image 0.5s;
        }
        .buddy-unit { font-size: 50px; animation: bounce 2s infinite ease-in-out; }

        /* --- 下部ナビゲーション --- */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: white; border: none; background: none; font-size: 10px; cursor: pointer; }
        .nav-btn span { font-size: 20px; display: block; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-screen">
        <h2>主人公の性別を選んでね</h2>
        <button class="select-btn" onclick="startGame('boy')">👦 男の子</button>
        <button class="select-btn" onclick="startGame('girl')">👧 女の子</button>
    </div>

    <div class="top-nav">
        <div style="display: flex; justify-content: space-between;">
            <div><b id="p-name">レン</b> <span id="p-rank" style="color:var(--gold)">Rank 1</span></div>
            <div>💰<span id="p-gold">500</span> 💎<span id="p-crystal">10</span></div>
        </div>
        <div class="exp-bar"><div id="exp-fill"></div></div>
    </div>

    <div id="home-screen" class="screen">
        <div class="stage">
            <div id="buddy-1" class="buddy-unit">🐾</div>
            <div id="hero-img"></div>
            <div id="buddy-2" class="buddy-unit">🐾</div>
        </div>
        <h3>モンスターマスターズの世界へ！</h3>
    </div>

    <div id="book-screen" class="screen">
        <h2 style="text-align:center;">図鑑画面</h2>
        <p style="text-align:center;">（ここにモンスターが並びます）</p>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="showScreen('home-screen')"><span>🏠</span>ホーム</button>
        <button class="nav-btn" onclick="showScreen('book-screen')"><span>📖</span>図鑑</button>
    </div>
</div>

<script>
/**
 * 1. 性別選択とゲーム開始
 */
function startGame(gender) {
    // 選択された性別に応じて、画像フォルダのパスを決定
    const heroImg = document.getElementById('hero-img');
    
    if (gender === 'boy') {
        heroImg.style.backgroundImage = "url('images/hero/boy.jpg')";
    } else {
        heroImg.style.backgroundImage = "url('images/hero/girl.jpg')";
    }

    // セットアップ画面を非表示にし、ホームを表示
    document.getElementById('setup-screen').style.display = 'none';
    showScreen('home-screen');
}

/**
 * 2. 画面切り替え関数
 */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/**
 * 3. 将来的にモンスターフォルダ（images/monsters/）から画像を出すための準備
 * 例: loadMonsterImage(1) と呼べば images/monsters/mon_001.png を出す、など
 */
function loadMonsterImage(id) {
    const formattedId = String(id).padStart(3, '0'); // 1 -> 001 に変換
    return `images/monsters/mon_${formattedId}.png`;
}
</script>

</body>
</html>
