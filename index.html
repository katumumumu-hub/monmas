<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー 完全版 (体力成長Ver)</title>
    <style>
        :root {
            --bg-main: #74b9ff;
            --header-dark: #2c3e50;
            --accent-green: #27ae60;
            --accent-blue: #2980b9;
            --accent-red: #e74c3c;
            --panel-white: rgba(255, 255, 255, 0.9);
        }

        body { font-family: 'Hiragino Kaku Gothic Pro', sans-serif; margin: 0; background: #333; display: flex; justify-content: center; color: #333; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; position: relative; overflow: hidden; background: white; }

        section { display: none; width: 100%; height: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
        section.active { display: flex; }

        /* --- 1. ホーム画面 --- */
        #home-screen { background: linear-gradient(to bottom, #74b9ff, #a29bfe); }
        .player-info { background: rgba(0,0,0,0.7); color: white; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; font-size: 0.8rem; }
        .next-action-display { background: white; margin: 10px auto; padding: 5px 20px; border-radius: 5px; font-weight: bold; font-size: 0.9rem; border: 2px solid var(--accent-blue); min-height: 1.2rem; text-align: center;}
        .main-visual { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .facility-list { position: absolute; top: 10px; right: 10px; background: var(--panel-white); padding: 8px; border-radius: 8px; font-size: 0.7rem; border: 1px solid #ccc; width: 100px; }
        .monster-img { font-size: 6rem; margin: 20px 0; transition: 0.3s; }
        .evolution-countdown { color: white; background: var(--accent-red); padding: 4px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; visibility: hidden; }
        
        .status-gauges { background: var(--panel-white); width: 85%; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .gauge-row { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.75rem; }
        .gauge-label { width: 40px; font-weight: bold; }
        .gauge-bg { flex: 1; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; margin-left: 10px; }
        .gauge-fill { height: 100%; background: var(--accent-green); transition: width 0.3s; }
        /* 体力（HP）だけ色を変えて強調 */
        #g-hp { background: #ff7675; }

        .home-btns { display: flex; gap: 10px; width: 85%; margin-bottom: 20px; }
        .btn-large { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px rgba(0,0,0,0.2); }
        .btn-large:active { transform: translateY(2px); box-shadow: none; }

        .bottom-nav { background: var(--header-dark); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-btn { color: white; text-align: center; font-size: 0.65rem; cursor: pointer; flex: 1; }

        /* --- 2. スケジュール画面 --- */
        #schedule-screen { background: #fdfaf0; }
        .mode-selector { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #eee; }
        .mode-btn { padding: 8px 15px; border: 1px solid #bbb; border-radius: 5px; background: white; cursor: pointer; }
        .mode-btn.active { background: var(--accent-red); color: white; }
        .schedule-work-area { display: flex; flex: 1; overflow: hidden; }
        .slot-scroll { flex: 1.2; overflow-y: auto; background: white; margin: 5px; padding: 5px; }
        .slot-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 6px 0; font-size: 0.75rem; }
        .slot-box { flex: 1; border: 1px dashed #ccc; border-radius: 4px; padding: 3px; text-align: center; cursor: pointer; }
        .slot-box.filled { background: #e3f2fd; border-style: solid; border-color: var(--accent-blue); color: #333; }
        .action-sidebar { flex: 0.8; background: var(--header-dark); padding: 8px; overflow-y: auto; }
        .action-chip { background: white; margin-bottom: 8px; padding: 8px; border-radius: 5px; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .item-preview-row { display: flex; justify-content: center; gap: 15px; padding: 10px; background: #fff; border-top: 1px solid #ddd; }
        .preview-circle { width: 45px; height: 45px; border: 2px dashed #aaa; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* --- ショップ画面 --- */
        #shop-screen { background: #fff; }
        .shop-item { display: flex; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .shop-info { flex: 1; margin-left: 15px; }
        .btn-buy { padding: 8px 15px; background: var(--accent-blue); color: white; border: none; border-radius: 5px; font-weight: bold; }

        /* 共通カラー */
        .btn-blue { background: var(--accent-blue); }
        .btn-green { background: var(--accent-green); }
        .btn-gray { background: #95a5a6; }
        .btn-disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="home-screen" class="active">
        <div class="player-info">
            <span id="p-name">👤 ブリーダー: ナマエ</span>
            <span id="p-rank">🏆 ランク: ブロンズ</span>
            <span id="p-money">💰 所持金: 1500G</span>
            <span>💎 ダイヤ: 10</span>
        </div>
        <div class="main-visual">
            <div class="next-action-display" id="next-action-text">ショップでタネモンを購入してください</div>
            <div class="facility-list" id="fac-list">解放施設<br>・なし</div>
            <div class="monster-img" id="main-sprite">❓</div>
            <div class="evolution-countdown" id="evo-days">進化まで あと 90 日</div>
            <div class="status-gauges">
                <div class="gauge-row"><span class="gauge-label">体力</span><div class="gauge-bg"><div class="gauge-fill" id="g-hp" style="width:0%"></div></div></div>
                <div class="gauge-row"><span class="gauge-label">筋力</span><div class="gauge-bg"><div class="gauge-fill" id="g-str" style="width:0%"></div></div></div>
                <div class="gauge-row"><span class="gauge-label">魔力</span><div class="gauge-bg"><div class="gauge-fill" id="g-mag" style="width:0%"></div></div></div>
                <div class="gauge-row"><span class="gauge-label">防御</span><div class="gauge-bg"><div class="gauge-fill" id="g-def" style="width:0%"></div></div></div>
                <div class="gauge-row"><span class="gauge-label">俊敏</span><div class="gauge-bg"><div class="gauge-fill" id="g-spd" style="width:0%"></div></div></div>
            </div>
            <div class="home-btns">
                <button class="btn-large btn-blue" id="btn-do-action" onclick="game.processNextDay()">行動する</button>
                <button class="btn-large btn-green" id="btn-all-action" onclick="game.processAllActions()">全行動</button>
            </div>
        </div>
        <nav class="bottom-nav">
            <div class="nav-btn" onclick="game.nav('schedule')">育成</div>
            <div class="nav-btn">増築</div>
            <div class="nav-btn" onclick="game.nav('shop')">ショップ</div>
            <div class="nav-btn">持ち物</div>
        </nav>
    </section>

    <section id="schedule-screen">
        <div style="padding:10px; background:#fff; border-bottom:1px solid #ddd; font-weight:bold;">スケジュール設定</div>
        <div class="mode-selector">
            <button class="mode-btn" id="m-7" onclick="game.setMode(7)">7日</button>
            <button class="mode-btn" id="m-30" onclick="game.setMode(30)">1月</button>
            <button class="mode-btn active" id="m-90" onclick="game.setMode(90)">3月</button>
        </div>
        <div class="schedule-work-area">
            <div class="slot-scroll" id="slot-container"></div>
            <div class="action-sidebar">
                <div class="action-chip" onclick="game.fillSlot('腹筋')">腹筋</div>
                <div class="action-chip" onclick="game.fillSlot('瞑想')">瞑想</div>
                <div class="action-chip" onclick="game.fillSlot('散歩')">散歩</div>
                <div class="action-chip" onclick="game.fillSlot('昼寝')">昼寝</div>
            </div>
        </div>
        <div class="item-preview-row">
            <div class="preview-circle" id="ps-1">1</div>
            <div class="preview-circle" id="ps-2">2</div>
            <div class="preview-circle" id="ps-3">3</div>
        </div>
        <div style="display:flex; gap:10px; padding:15px; background:#fff;">
            <button class="btn-large btn-blue" onclick="game.nav('item')">アイテム選択</button>
            <button class="btn-large btn-disabled" id="start-train-btn" onclick="game.startEvolution()">育成開始</button>
        </div>
    </section>

    <section id="item-screen">
        <div style="padding:15px; background:var(--header-dark); color:white; text-align:center;">補助アイテム選択</div>
        <div id="item-inventory" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <button class="btn-large btn-green" style="margin:15px;" onclick="game.nav('schedule')">完了</button>
    </section>

    <section id="shop-screen">
        <div style="padding:15px; background:var(--accent-blue); color:white; text-align:center;">ショップ</div>
        <div style="flex:1; overflow-y:auto;">
            <div class="shop-item">
                <span style="font-size:2rem;">🌱</span>
                <div class="shop-info"><strong>ドロモン</strong><br><small>500G / Rank E</small></div>
                <button class="btn-buy" onclick="game.buy('tanemon', 'T01')">購入</button>
            </div>
            <div class="shop-item">
                <span style="font-size:2rem;">💊</span>
                <div class="shop-info"><strong>栄養剤</strong><br><small>300G / 成長効率UP</small></div>
                <button class="btn-buy" onclick="game.buy('item', 'I01')">購入</button>
            </div>
        </div>
        <button class="btn-large btn-gray" style="margin:15px;" onclick="game.nav('home')">戻る</button>
    </section>
</div>

<script>
const game = {
    state: {
        money: 1500,
        monster: null,
        inventory: [],
        mode: 90,
        tempSchedule: [],
        tempItems: []
    },

    nav(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-screen').classList.add('active');
        if(id === 'schedule') this.renderSlots();
        if(id === 'item') this.renderInventory();
        this.updateUI();
    },

    buy(type, id) {
        if(type === 'tanemon') {
            if(this.state.monster) return alert("既に育成中です");
            if(this.state.money >= 500) {
                this.state.money -= 500;
                this.state.monster = { 
                    name: "ドロモン", sprite: "🌱", currentDay: 0, 
                    stats: { hp: 10, str: 10, mag: 10, def: 10, spd: 10 }, // 体力の初期値を設定
                    schedule: [], items: [] 
                };
                alert("ドロモンを購入しました！育成設定へ進んでください。");
            }
        } else {
            if(this.state.money >= 300) {
                this.state.money -= 300;
                this.state.inventory.push({ name: "栄養剤", icon: "💊" });
                alert("栄養剤を購入しました。");
            }
        }
        this.updateUI();
    },

    setMode(d) {
        this.state.mode = d;
        this.state.tempSchedule = [];
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+d).classList.add('active');
        this.renderSlots();
    },

    renderSlots() {
        const con = document.getElementById('slot-container');
        con.innerHTML = '';
        for(let i=1; i<=this.state.mode; i++) {
            const div = document.createElement('div');
            div.className = 'slot-row';
            const val = this.state.tempSchedule[i-1] || "行動を選択";
            div.innerHTML = `<span style="width:30px">${i}</span><div class="slot-box ${val!=='行動を選択'?'filled':''}" id="s-${i}">${val}</div>`;
            con.appendChild(div);
        }
        this.checkReady();
    },

    fillSlot(act) {
        if(this.state.tempSchedule.length < this.state.mode) {
            this.state.tempSchedule.push(act);
            this.renderSlots();
        }
    },

    renderInventory() {
        const con = document.getElementById('item-inventory');
        con.innerHTML = this.state.inventory.length ? '' : '所持アイテムがありません';
        this.state.inventory.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'shop-item';
            const isSelected = this.state.tempItems.includes(item);
            div.style.background = isSelected ? '#e8f8f0' : '#fff';
            div.innerHTML = `<span>${item.icon}</span><div class="shop-info">${item.name}</div>
                             <button class="btn-buy" onclick="game.selectItem(${i})">${isSelected?'解除':'選択'}</button>`;
            con.appendChild(div);
        });
    },

    selectItem(idx) {
        const item = this.state.inventory[idx];
        const sIdx = this.state.tempItems.indexOf(item);
        if(sIdx > -1) this.state.tempItems.splice(sIdx, 1);
        else if(this.state.tempItems.length < 3) this.state.tempItems.push(item);
        
        this.renderInventory();
        for(let i=1; i<=3; i++) {
            const ps = document.getElementById('ps-'+i);
            ps.innerText = this.state.tempItems[i-1] ? this.state.tempItems[i-1].icon : i;
            ps.style.borderColor = this.state.tempItems[i-1] ? 'var(--accent-green)' : '#aaa';
        }
    },

    checkReady() {
        const btn = document.getElementById('start-train-btn');
        if(this.state.tempSchedule.length === this.state.mode) {
            btn.className = 'btn-large btn-green';
        } else {
            btn.className = 'btn-large btn-disabled';
        }
    },

    startEvolution() {
        if(this.state.tempSchedule.length < this.state.mode) return;
        let finalSched = [];
        while(finalSched.length < 90) finalSched.push(...this.state.tempSchedule);
        this.state.monster.schedule = finalSched.slice(0, 90);
        this.state.monster.items = [...this.state.tempItems];
        this.state.monster.currentDay = 1;
        this.nav('home');
    },

    processNextDay() {
        const m = this.state.monster;
        if(!m || m.currentDay === 0 || m.currentDay > 90) return;
        
        const act = m.schedule[m.currentDay - 1];
        const bonus = m.items.length > 0 ? 1.2 : 1.0; // アイテムによる成長補正(仮)

        // 体力は減るものではなく、トレーニングで成長する
        if(act === '腹筋') { m.stats.str += 5 * bonus; m.stats.hp += 3 * bonus; }
        if(act === '瞑想') { m.stats.mag += 5 * bonus; m.stats.hp += 1 * bonus; }
        if(act === '散歩') { m.stats.spd += 5 * bonus; m.stats.hp += 2 * bonus; }
        if(act === '昼寝') { m.stats.hp += 8 * bonus; } // 昼寝でも体力が育つ
        
        m.currentDay++;
        if(m.currentDay > 90) {
            alert("90日が経過しました。育成完了！");
        }
        this.updateUI();
    },

    processAllActions() {
        while(this.state.monster && this.state.monster.currentDay > 0 && this.state.monster.currentDay <= 90) {
            this.processNextDay();
        }
    },

    updateUI() {
        document.getElementById('p-money').innerText = `💰 所持金: ${this.state.money}G`;
        const m = this.state.monster;
        if(m) {
            document.getElementById('main-sprite').innerText = m.sprite;
            document.getElementById('evo-days').style.visibility = "visible";
            document.getElementById('evo-days').innerText = `進化まで あと ${91 - m.currentDay} 日`;
            
            const next = m.schedule[m.currentDay - 1] || "スケジュール未設定";
            document.getElementById('next-action-text').innerText = m.currentDay === 0 ? "育成を開始してください" : `次：${next}`;

            // 全ステータスが成長していくゲージ表示
            document.getElementById('g-hp').style.width = Math.min(m.stats.hp, 100) + "%";
            document.getElementById('g-str').style.width = Math.min(m.stats.str, 100) + "%";
            document.getElementById('g-mag').style.width = Math.min(m.stats.mag, 100) + "%";
            document.getElementById('g-def').style.width = Math.min(m.stats.def, 100) + "%";
            document.getElementById('g-spd').style.width = Math.min(m.stats.spd, 100) + "%";
        }
    }
};
</script>
</body>
</html>
