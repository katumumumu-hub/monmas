<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - スケジュール設定</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #2c3e50;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --border-color: #dee2e6;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 画面切り替え用 */
        section { display: none; width: 100%; height: 100%; flex-direction: column; }
        section.active { display: flex; }

        /* ヘッダー */
        .top-nav {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .top-nav h2 { margin: 0; font-size: 1.1rem; }
        .home-btn { font-size: 1.3rem; cursor: pointer; background: none; border: none; }

        /* タネモン情報エリア */
        .monster-info-card {
            margin: 10px;
            padding: 12px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .monster-icon {
            width: 54px;
            height: 54px;
            background: #f0f0f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin-right: 15px;
            position: relative;
        }
        .rank-tag {
            position: absolute;
            top: -6px;
            left: 45px;
            background: #95a5a6;
            color: white;
            font-size: 0.65rem;
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        .monster-detail { flex: 1; }
        .monster-detail h3 { margin: 0 0 4px 0; font-size: 1rem; }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            font-size: 0.7rem;
            color: var(--text-sub);
            gap: 2px;
        }

        /* 期間切り替え */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            background: #fdfdfd;
        }
        .tab-btn {
            width: 60px;
            padding: 6px 0;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--accent-blue);
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
            font-weight: bold;
        }

        /* メイン編集エリア */
        .editor-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            border-top: 1px solid var(--border-color);
        }

        /* 左側：スロット */
        .slots-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #fff;
        }
        .day-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .day-num { width: 28px; font-size: 0.85rem; color: #999; }
        .slot-box {
            flex: 1;
            height: 36px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #ccc;
            cursor: pointer;
            position: relative;
        }
        .slot-box.filled {
            border: 1px solid var(--accent-blue);
            background: #f0f7ff;
            color: var(--text-main);
            font-weight: bold;
        }
        .repeat-tag {
            position: absolute;
            right: 8px;
            font-size: 0.6rem;
            color: var(--accent-blue);
            opacity: 0.7;
        }

        /* 右側：行動リスト */
        .action-sidebar {
            width: 140px;
            background: var(--sidebar-bg);
            padding: 15px 10px;
            overflow-y: auto;
        }
        .action-chip {
            background: white;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .action-chip:active { transform: scale(0.95); }
        .sidebar-desc {
            color: rgba(255,255,255,0.6);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 20px;
            line-height: 1.5;
        }

        /* フッター */
        .footer-area {
            background: white;
            padding: 15px;
            border-top: 1px solid var(--border-color);
        }
        .item-slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .item-circle {
            width: 58px;
            height: 58px;
            border: 2px dashed #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #ddd;
        }
        .item-circle.filled { border: 2px solid var(--accent-blue); color: var(--text-main); }

        .btn-row { display: flex; gap: 12px; }
        .main-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-blue { background: var(--accent-blue); box-shadow: 0 4px #2980b9; }
        .btn-disabled { background: #ced4da; color: #fff; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div class="app-container">
    
    <section id="home-screen" class="active" style="background: linear-gradient(135deg, #74b9ff, #a29bfe); align-items:center; justify-content:center; color:white;">
        <h1 style="text-shadow: 0 2px 4px rgba(0,0,0,0.2);">ハナモン・ブリーダー</h1>
        <div style="font-size: 6rem; margin: 30px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));">🌱</div>
        <button class="main-btn btn-blue" style="width: 220px;" onclick="showScreen('schedule-screen')">育成を開始する</button>
    </section>

    <section id="schedule-screen">
        <div class="top-nav">
            <h2>スケジュール設定</h2>
            <button class="home-btn" onclick="showScreen('home-screen')">🏠</button>
        </div>

        <div class="monster-info-card">
            <div class="monster-icon">
                🌱
                <span class="rank-tag">E</span>
            </div>
            <div class="monster-detail">
                <h3>ドロモン</h3>
                <div class="status-grid">
                    <span>体力: 12</span> <span>筋力: 8</span> <span>魔力: 5</span>
                    <span>防御: 6</span> <span>俊敏: 5</span>
                </div>
            </div>
        </div>

        <div class="mode-selector">
            <button class="tab-btn" id="t-7" onclick="changeMode(7)">7日</button>
            <button class="tab-btn" id="t-30" onclick="changeMode(30)">1月</button>
            <button class="tab-btn active" id="t-90" onclick="changeMode(90)">3月</button>
        </div>

        <div class="editor-layout">
            <div class="slots-container" id="slot-list"></div>

            <div class="action-sidebar">
                <div class="action-chip" onclick="fillNext('腹筋')">腹筋</div>
                <div class="action-chip" onclick="fillNext('瞑想')">瞑想</div>
                <div class="action-chip" onclick="fillNext('散歩')">散歩</div>
                <div class="action-chip" onclick="fillNext('昼寝')">昼寝</div>
                <div class="sidebar-desc">
                    トレーニング方法を選択<br>(ショップ等で購入可能)
                </div>
            </div>
        </div>

        <div class="footer-area">
            <div class="item-slots">
                <div class="item-circle" id="i-1">1</div>
                <div class="item-circle" id="i-2">2</div>
                <div class="item-circle" id="i-3">3</div>
            </div>
            <div class="btn-row">
                <button class="main-btn btn-blue" onclick="alert('補助アイテム選択画面へ')">アイテム選択</button>
                <button class="main-btn btn-disabled" id="start-btn">育成開始</button>
            </div>
        </div>
    </section>
</div>

<script>
    let currentMode = 90;
    let schedules = [];

    function showScreen(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'schedule-screen') changeMode(currentMode);
    }

    function changeMode(days) {
        currentMode = days;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + days).classList.add('active');
        
        // スケジュール初期化
        schedules = new Array(days).fill(null);
        render();
        updateBtn();
    }

    function render() {
        const list = document.getElementById('slot-list');
        list.innerHTML = '';
        
        schedules.forEach((act, i) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            const isFilled = act !== null;
            
            let tag = "";
            if(currentMode === 7) tag = '<span class="repeat-tag">毎週</span>';
            if(currentMode === 30) tag = '<span class="repeat-tag">毎月</span>';

            row.innerHTML = `
                <div class="day-num">${i + 1}</div>
                <div class="slot-box ${isFilled ? 'filled' : ''}" onclick="clearSlot(${i})">
                    ${isFilled ? act : '行動を選択'}
                    ${tag}
                </div>
            `;
            list.appendChild(row);
        });
    }

    function fillNext(action) {
        const idx = schedules.indexOf(null);
        if(idx !== -1) {
            schedules[idx] = action;
            render();
            updateBtn();
            // 自動スクロール
            const list = document.getElementById('slot-list');
            list.scrollTop = (idx - 2) * 44;
        }
    }

    function clearSlot(idx) {
        schedules[idx] = null;
        render();
        updateBtn();
    }

    function updateBtn() {
        const btn = document.getElementById('start-btn');
        const complete = schedules.every(s => s !== null);
        if(complete) {
            btn.className = 'main-btn btn-blue';
            btn.onclick = () => { 
                const msg = currentMode === 90 ? "90日間の育成" : (currentMode === 7 ? "7日周期の育成" : "30日周期の育成");
                alert(msg + "を開始します！"); 
                showScreen('home-screen'); 
            };
        } else {
            btn.className = 'main-btn btn-disabled';
            btn.onclick = null;
        }
    }
</script>

</body>
</html>
