<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #e94560;
            --text-color: #ffffff;
            --disabled-color: #444;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* スマホ画面サイズ */
        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            border: 2px solid #333;
        }

        /* ヘッダー：階級名とクリスタル */
        header {
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 1px solid var(--accent-color);
            text-align: center;
        }
        #rank-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        #crystal-container { display: flex; justify-content: center; gap: 5px; }
        .crystal-icon { width: 20px; height: 20px; background: cyan; border-radius: 50%; box-shadow: 0 0 10px cyan; }
        .crystal-empty { background: #333; box-shadow: none; }

        /* メインコンテンツエリア */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; height: 100%; }
        .active { display: flex; flex-direction: column; }

        /* ホーム画面 */
        #home-screen .rank-image-box {
            width: 100%;
            height: 200px;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #444;
            margin-bottom: 20px;
            position: relative;
        }
        .rank-up-effect {
            position: absolute;
            color: yellow;
            font-weight: bold;
            animation: flash 1s infinite;
        }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ボタン */
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 0;
            font-size: 1rem;
        }
        button:disabled { background: var(--disabled-color); cursor: not-allowed; opacity: 0.6; }

        /* イベント画面 */
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .choice-btn { width: 100%; text-align: left; position: relative; }
        .reason-text { font-size: 0.7rem; color: #ff8888; display: block; }

        /* ステータス画面 */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 4px; }
        .status-label { font-size: 0.8rem; color: #aaa; }

        /* スキル画面 */
        .skill-item { background: var(--panel-color); margin-bottom: 8px; padding: 10px; border-left: 4px solid var(--accent-color); }
        .skill-name { font-weight: bold; }
        .skill-bonus { font-size: 0.8rem; color: #00ff00; }

        /* フッター：ナビゲーション */
        footer {
            display: flex;
            background: var(--panel-color);
            border-top: 1px solid #333;
        }
        footer button { flex: 1; margin: 0; border-radius: 0; background: transparent; border-right: 1px solid #333; }
        footer button:last-child { border-right: none; }
        footer button:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div id="rank-name">魔族の端くれ</div>
        <div id="crystal-container"></div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" id="rank-image-area">
                <span>階級画像</span>
                <div id="rank-up-msg" class="rank-up-effect" style="display:none;">RANK UP!!</div>
            </div>
            <div class="status-grid">
                <div class="status-item"><div class="status-label">戦闘力</div><div id="display-combat-power">0</div></div>
                <div class="status-item"><div class="status-label">次まで</div><div id="display-next-rank">1,000</div></div>
                <div class="status-item"><div class="status-label">配下</div><div id="display-subordinates">0名</div></div>
            </div>
            <button onclick="startEvent()" style="margin-top: 20px;">イベント発生 (消費: 1)</button>
        </div>

        <div id="event-screen" class="screen">
            <div class="event-box">
                <h3 id="event-title"></h3>
                <p id="event-text"></p>
            </div>
            <div id="choices-area"></div>
        </div>

        <div id="result-screen" class="screen">
            <div class="event-box">
                <h3>結果</h3>
                <p id="result-text"></p>
                <div id="change-log" style="color: #00ff00; font-size: 0.9rem; margin-top: 10px;"></div>
                <div id="skill-log" style="color: #ffff00; font-size: 0.9rem; margin-top: 5px;"></div>
            </div>
            <button onclick="showScreen('home-screen')">ホームへ戻る</button>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3 style="margin-top:20px;">内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div id="acquired-skills-list"></div>
        </div>
    </main>

    <footer>
        <button onclick="showScreen('home-screen')">戻る</button>
        <button onclick="showScreen('skill-screen')">スキル</button>
        <button onclick="showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
// --- JSONデータ (マスターデータ) ---
const ranks = [
    { "id": 1, "name": "魔族の端くれ", "reqCombatPower": 0, "maxCrystals": 3 },
    { "id": 2, "name": "魔軍歩兵", "reqCombatPower": 1000, "maxCrystals": 4 },
    { "id": 3, "name": "魔軍小隊長", "reqCombatPower": 5000, "maxCrystals": 5 },
    { "id": 4, "name": "魔将候補", "reqCombatPower": 20000, "maxCrystals": 6 },
    { "id": 5, "name": "魔将", "reqCombatPower": 100000, "maxCrystals": 7 },
    { "id": 6, "name": "上級魔将", "reqCombatPower": 500000, "maxCrystals": 8 },
    { "id": 7, "name": "魔軍四天王", "reqCombatPower": 2500000, "maxCrystals": 9 },
    { "id": 8, "name": "准魔王", "reqCombatPower": 10000000, "maxCrystals": 10 },
    { "id": 9, "name": "魔王", "reqCombatPower": 50000000, "maxCrystals": 11 },
    { "id": 10, "name": "真・魔王", "reqCombatPower": 100000000, "maxCrystals": 12 }
];

const events = [
    {
        "id": 1, "title": "魔軍歩兵の因縁", "text": "パトロール中の歩兵に生意気だと絡まれた。", "minRankId": 1,
        "choices": [
            { "text": "力で分からせる", "req": {"stat": "physAtk", "val": 5}, "fail": "力が足りない…", "res": "力でねじ伏せた！", "change": {"physAtk": 5, "cruelty": 10} },
            { "text": "魔法で驚かせる", "req": {"stat": "magAtk", "val": 5}, "fail": "魔力が足りない…", "res": "魔力を見せつけた。", "change": {"magAtk": 5, "charisma": 5} },
            { "text": "賄賂を渡す", "req": null, "res": "金で解決したが屈辱的だ。", "change": {"luck": 5, "responsibility": -5} },
            { "text": "謝る", "req": null, "res": "プライドを捨てて謝罪した。", "change": {"responsibility": 10, "charisma": -5} }
        ]
    },
    {
        "id": 2, "title": "秘密特訓", "text": "独りで鍛錬に励む。何に集中する？", "minRankId": 1,
        "choices": [
            { "text": "筋力トレーニング", "req": null, "res": "体が引き締まった。", "change": {"physAtk": 10, "hp": 5} },
            { "text": "瞑想", "req": null, "res": "魔力の流れを掴んだ。", "change": {"magAtk": 10, "mp": 5} },
            { "text": "滝行", "req": {"stat": "hp", "val": 10}, "fail": "今の体力では流される…", "res": "精神を研ぎ澄ませた。", "change": {"responsibility": 15, "magDef": 5} },
            { "text": "素振り", "req": null, "res": "技術が向上した。", "change": {"agility": 10, "physDef": 5} }
        ]
    }
    // ... 他のイベントも同様に追加可能
];

const skills = [
    { "id": 1, "name": "火炎", "bonus": { "magAtk": 8 }, "reqs": [{ "stat": "magAtk", "val": 8 }, { "stat": "charisma", "val": 20 }] },
    { "id": 2, "name": "強打", "bonus": { "physAtk": 5 }, "reqs": [{ "stat": "physAtk", "val": 5 }] },
    { "id": 3, "name": "号令", "bonus": { "leadership": 15 }, "reqs": [{ "stat": "leadership", "val": 10 }] }
];

// --- ゲーム状態管理 ---
let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: []
};

let subordinates = 0;
let combatPower = 0;

// --- 初期化 ---
function init() {
    const saved = localStorage.getItem('devil_lord_save');
    if (saved) {
        gameState = JSON.parse(saved);
        recoverCrystals();
    }
    updateAll();
    showScreen('home-screen');
}

// クリスタル回復
function recoverCrystals() {
    const now = Date.now();
    const diffHours = Math.floor((now - gameState.lastPlayTime) / (1000 * 60 * 60));
    if (diffHours > 0) {
        const currentRank = ranks.find(r => r.id === gameState.currentRankId);
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + diffHours);
    }
    gameState.lastPlayTime = now;
}

// 数値の更新
function updateAll() {
    const s = gameState.stats;
    const i = gameState.innerTraits;

    // 配下 = (HP,MP除くステ合計) + 統率 + カリスマ - 凶悪
    subordinates = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    subordinates = Math.max(0, subordinates);

    // 戦闘力 = ステ合計 + 内面性合計 + 配下
    const statSum = Object.values(s).reduce((a, b) => a + b, 0);
    const innerSum = Object.values(i).reduce((a, b) => a + b, 0);
    combatPower = statSum + innerSum + subordinates;

    checkRankUp();
    checkSkills();
    renderUI();
    save();
}

// 階級アップ判定
function checkRankUp() {
    const nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    if (nextRank && combatPower >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        document.getElementById('rank-up-msg').style.display = 'block';
        setTimeout(() => { document.getElementById('rank-up-msg').style.display = 'none'; }, 3000);
        updateAll();
    }
}

// スキル習得判定
function checkSkills() {
    let skillAdded = false;
    skills.forEach(skill => {
        if (!gameState.acquiredSkills.includes(skill.id)) {
            const isMet = skill.reqs.every(req => {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                return currentVal >= req.val;
            });

            if (isMet) {
                gameState.acquiredSkills.push(skill.id);
                // ボーナス加算
                for (let key in skill.bonus) {
                    if (gameState.stats[key] !== undefined) gameState.stats[key] += skill.bonus[key];
                    else if (gameState.innerTraits[key] !== undefined) gameState.innerTraits[key] += skill.bonus[key];
                }
                skillAdded = true;
                const log = document.getElementById('skill-log');
                if (log) log.innerHTML += `スキル習得: 【${skill.name}】！<br>`;
            }
        }
    });
    if (skillAdded) updateAll();
}

// UI描画
function renderUI() {
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    document.getElementById('rank-name').innerText = currentRank.name;
    document.getElementById('display-combat-power').innerText = combatPower.toLocaleString();
    document.getElementById('display-subordinates').innerText = subordinates.toLocaleString() + "名";
    
    const nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    document.getElementById('display-next-rank').innerText = nextRank ? nextRank.reqCombatPower.toLocaleString() : "MAX";

    // クリスタル表示
    const crystalArea = document.getElementById('crystal-container');
    crystalArea.innerHTML = '';
    for (let i = 0; i < currentRank.maxCrystals; i++) {
        const dot = document.createElement('div');
        dot.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        crystalArea.appendChild(dot);
    }

    // ステータス画面
    renderList('stat-list', gameState.stats, {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運'});
    renderList('inner-list', gameState.innerTraits, {cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感'});

    // スキルリスト
    const skillList = document.getElementById('acquired-skills-list');
    skillList.innerHTML = '';
    gameState.acquiredSkills.forEach(sid => {
        const sk = skills.find(s => s.id === sid);
        skillList.innerHTML += `<div class="skill-item"><div class="skill-name">${sk.name}</div></div>`;
    });
}

function renderList(targetId, data, labels) {
    const target = document.getElementById(targetId);
    target.innerHTML = '';
    for (let key in data) {
        target.innerHTML += `<div class="status-item"><div class="status-label">${labels[key]}</div><div>${data[key]}</div></div>`;
    }
}

// 画面遷移
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// イベント開始
function startEvent() {
    if (gameState.crystals <= 0) return alert("クリスタルが足りません");
    
    gameState.crystals--;
    gameState.lastPlayTime = Date.now();
    save();

    const currentEvents = events.filter(e => e.minRankId <= gameState.currentRankId);
    const event = currentEvents[Math.floor(Math.random() * currentEvents.length)];

    document.getElementById('event-title').innerText = event.title;
    document.getElementById('event-text').innerText = event.text;
    const choicesArea = document.getElementById('choices-area');
    choicesArea.innerHTML = '';

    event.choices.forEach((c, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        
        // 条件チェック
        let disabled = false;
        if (c.req) {
            const currentVal = gameState.stats[c.req.stat] !== undefined ? gameState.stats[c.req.stat] : gameState.innerTraits[c.req.stat];
            if (currentVal < c.req.val) disabled = true;
        }

        btn.innerHTML = c.text;
        if (disabled) {
            btn.disabled = true;
            btn.innerHTML += `<span class="reason-text">${c.fail}</span>`;
        } else {
            btn.onclick = () => finishEvent(c);
        }
        choicesArea.appendChild(btn);
    });

    showScreen('event-screen');
}

function finishEvent(choice) {
    document.getElementById('result-text').innerText = choice.res;
    document.getElementById('change-log').innerHTML = '';
    document.getElementById('skill-log').innerHTML = '';

    for (let key in choice.change) {
        if (gameState.stats[key] !== undefined) gameState.stats[key] += choice.change[key];
        else if (gameState.innerTraits[key] !== undefined) gameState.innerTraits[key] += choice.change[key];
        document.getElementById('change-log').innerHTML += `${key}: ${choice.change[key]}<br>`;
    }

    updateAll();
    showScreen('result-screen');
}

function save() {
    localStorage.setItem('devil_lord_save', JSON.stringify(gameState));
}

init();
</script>

</body>
</html>
