<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー Full Prototype v2</title>
    <style>
        :root {
            --bg-main: #74b9ff;
            --bg-schedule: #f7f1e3;
            --header-dark: #2c3e50;
            --accent-green: #27ae60;
            --accent-blue: #0984e3;
            --accent-red: #ff5252;
        }

        body { font-family: 'Hiragino Kaku Gothic Pro', sans-serif; margin: 0; background: #222; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; position: relative; overflow: hidden; background: white; }

        section { display: none; width: 100%; height: 100%; flex-direction: column; position: absolute; }
        section.active { display: flex; }

        /* --- スケジュール画面共通 --- */
        #schedule-screen { background: var(--bg-schedule); }
        .sch-header { background: white; padding: 10px; display: flex; border-bottom: 2px solid #ddd; align-items: center; }
        
        /* 期間切り替えタブ */
        .mode-tabs { display: flex; background: #eee; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer; background: #ccc; transition: 0.2s; }
        .tab-btn.active { background: var(--accent-red); color: white; font-weight: bold; }

        .sch-main { display: flex; flex: 1; overflow: hidden; }
        .slot-list { flex: 1; padding: 10px; overflow-y: auto; background: white; margin: 5px; border-radius: 8px; }
        .day-row { display: flex; align-items: center; padding: 6px; border-bottom: 1px solid #eee; font-size: 0.75rem; }
        .repeat-label { font-size: 0.6rem; color: var(--accent-blue); margin-left: 5px; font-weight: bold; }

        .act-sidebar { width: 110px; background: var(--header-dark); padding: 10px; overflow-y: auto; }
        .act-card { background: white; padding: 8px; margin-bottom: 8px; border-radius: 5px; font-size: 0.65rem; text-align: center; cursor: pointer; }

        .sch-footer { background: white; padding: 15px; border-top: 2px solid #ddd; }
        .btn-home { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 5px; }
        .btn-green { background: var(--accent-green); box-shadow: 0 4px #1e8449; }
        .btn-blue { background: var(--accent-blue); box-shadow: 0 4px #0761a4; }
        .btn-gray { background: #95a5a6; box-shadow: 0 4px #7f8c8d; }
    </style>
</head>
<body>

<div class="app-container">
    
    <section id="home-screen" class="active" style="align-items:center; justify-content:center; background:var(--bg-main);">
        <div style="font-size:5rem;">🌱</div>
        <button class="btn-home btn-blue" style="width:200px" onclick="changeScreen('schedule-screen')">育成開始設定へ</button>
    </section>

    <section id="schedule-screen">
        <div class="sch-header">
            <div style="font-size:1.5rem; margin-right:10px;">🌱</div>
            <div style="font-size:0.7rem;"><strong>スケジュール設定</strong><br>期間を選んで行動をセットしてください</div>
        </div>

        <div class="mode-tabs">
            <button id="btn-7" class="tab-btn" onclick="setMode(7)">1週 (7日設定)</button>
            <button id="btn-30" class="tab-btn" onclick="setMode(30)">1月 (30日設定)</button>
            <button id="btn-90" class="tab-btn active" onclick="setMode(90)">3月 (90日設定)</button>
        </div>

        <div class="sch-main">
            <div class="slot-list" id="day-slots">
                </div>
            <div class="act-sidebar">
                <div style="color:white; font-size:0.6rem; margin-bottom:5px;">行動リスト</div>
                <div class="act-card">腹筋</div>
                <div class="act-card">瞑想</div>
                <div class="act-card">散歩</div>
                <div class="act-card">昼寝</div>
            </div>
        </div>

        <div class="sch-footer">
            <div id="repeat-info" style="font-size:0.65rem; color:#666; text-align:center; margin-bottom:8px;">
                ※90日分すべて個別に設定します
            </div>
            <button class="btn-home btn-green" onclick="alert('育成を開始します！')">育成開始</button>
            <button class="btn-home btn-gray" onclick="changeScreen('home-screen')">戻る</button>
        </div>
    </section>

</div>

<script>
    let currentMode = 90;

    function changeScreen(screenId) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'schedule-screen') renderSlots(currentMode);
    }

    function setMode(days) {
        currentMode = days;
        // ボタンの見た目を更新
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + days).classList.add('active');
        
        [span_4](start_span)// 説明文の更新[span_4](end_span)
        const info = document.getElementById('repeat-info');
        if(days === 7) info.innerText = "※7日分の設定が12回繰り返されます（計84日+予備）";
        else if(days === 30) info.innerText = "※30日分の設定が3回繰り返されます（計90日）";
        else info.innerText = "※90日分すべて個別に設定します";

        renderSlots(days);
    }

    function renderSlots(count) {
        const container = document.getElementById('day-slots');
        container.innerHTML = '';
        
        for(let i=1; i<=count; i++) {
            const div = document.createElement('div');
            div.className = 'day-row';
            
            let label = "";
            if(currentMode === 7) label = `<span class="repeat-label">毎週</span>`;
            if(currentMode === 30) label = `<span class="repeat-label">毎月</span>`;

            div.innerHTML = `
                <span style="width:30px; color:#999; font-weight:bold;">${i}</span> 
                <div style="flex:1; border:1px dashed #ccc; text-align:center; border-radius:4px; color:#aaa; padding:2px;">
                    行動を選択
                </div>
                ${label}
            `;
            container.appendChild(div);
        }
        // スクロールを一番上に戻す
        container.scrollTop = 0;
    }

    // 初回実行
    renderSlots(90);
</script>

</body>
</html>
