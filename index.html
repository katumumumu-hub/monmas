<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - ステータス連動版</title>
    <style>
        :root {
            --bg-sky: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            --panel-bg: rgba(0, 0, 0, 0.4);
            --accent-yellow: #ffeaa7;
            --accent-blue: #0984e3;
        }

        body { font-family: sans-serif; margin: 0; background: #222; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: var(--bg-sky); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        section { display: none; width: 100%; height: 100%; flex-direction: column; }
        section.active { display: flex; }

        .header-info { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: rgba(0,0,0,0.2); }
        .info-slot { background: var(--panel-bg); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; color: white; display: flex; justify-content: space-between; }
        .info-label { color: var(--accent-yellow); font-weight: bold; }

        /* モンスター表示エリア */
        .monster-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #monster-image-container { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        #monster-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* ステータス表示 */
        #status-board { 
            background: var(--panel-bg); 
            border: 2px solid #555; 
            border-radius: 10px; 
            padding: 10px; 
            width: 80%; 
            color: white; 
            font-size: 0.8rem; 
            display: none; /* 初期は非表示 */
        }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .status-bar-bg { background: #333; height: 8px; width: 100px; border-radius: 4px; overflow: hidden; }
        .status-bar-fill { background: #55efc4; height: 100%; }

        #shop-item-list { flex: 1; overflow-y: auto; padding: 15px; }
        .shop-item-card { background: white; margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; color: #333; }

        .bottom-nav { height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 15px 15px 0 0; }
        .nav-button { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; color: #95a5a6; cursor: pointer; border: none; background: none; }
        .nav-button.active { color: var(--accent-blue); font-weight: bold; }
        .nav-icon { font-size: 1.5rem; }

        .btn-buy { background: var(--accent-blue); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="home-screen" class="active">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">PLAYER:</span><span>ケンジ</span></div>
            <div class="info-slot"><span class="info-label">MONEY:</span><span class="money-display">1500 G</span></div>
        </header>
        <div class="monster-display">
            <div id="monster-image-container">
                <div style="font-size: 4rem; opacity: 0.3;">🌱</div>
            </div>
            <div id="monster-name-display" style="font-weight:bold; color:white; margin-bottom:15px;">モンスターがいません</div>
            
            <div id="status-board">
                <div class="status-row"><span>HP</span><div class="status-bar-bg"><div id="hp-bar" class="status-bar-fill"></div></div><span id="hp-val">0</span></div>
                <div class="status-row"><span>STR</span><div class="status-bar-bg"><div id="str-bar" class="status-bar-fill"></div></div><span id="str-val">0</span></div>
                <div class="status-row"><span>MAG</span><div class="status-bar-bg"><div id="mag-bar" class="status-bar-fill"></div></div><span id="mag-val">0</span></div>
                <div class="status-row"><span>DEF</span><div class="status-bar-bg"><div id="def-bar" class="status-bar-fill"></div></div><span id="def-val">0</span></div>
                <div class="status-row"><span>SPD</span><div class="status-bar-bg"><div id="spd-bar" class="status-bar-fill"></div></div><span id="spd-val">0</span></div>
            </div>
        </div>
        <div class="bottom-nav">
            <button class="nav-button active" onclick="showPage('home-screen')"><span class="nav-icon">🥚</span><span>育成</span></button>
            <button class="nav-button" onclick="showPage('shop-screen')"><span class="nav-icon">🛒</span><span>ショップ</span></button>
            <button class="nav-button"><span class="nav-icon">🎒</span><span>持ち物</span></button>
        </div>
    </section>

    <section id="shop-screen">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">MONEY:</span><span class="money-display">1500 G</span></div>
            <button onclick="showPage('home-screen')" style="color:white; background:none; border:none; cursor:pointer;">✖ 戻る</button>
        </header>
        <div id="shop-item-list">読み込み中...</div>
    </section>
</div>

<script>
    // hanamon.json.txt の情報をベースにしたデータ
    const monsterMasterData = {
        "ドロモン（最低ランク）": {
            image: "https://raw.githubusercontent.com/katumumumu-hub/monmas/main/images/doromon.png",
            [span_2](start_span)stats: { hp: 10, str: 5, mag: 5, def: 5, spd: 5 } //[span_2](end_span)
        }
    };

    let gameState = {
        money: 1500,
        currentMonster: null
    };

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if(id === 'shop-screen') fetchShopData();
    }

    async function fetchShopData() {
        const url = "https://raw.githubusercontent.com/katumumumu-hub/monmas/main/shop.json";
        const container = document.getElementById('shop-item-list');
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderShop(data.shop_data.tanemon_list);
        } catch (e) { container.innerHTML = "通信失敗"; }
    }

    function renderShop(items) {
        const container = document.getElementById('shop-item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = "shop-item-card";
            card.innerHTML = `<div style="flex:1"><div style="font-weight:bold">${item.name}</div><div style="font-size:0.7rem; color:#666">${item.description}</div><div style="color:#e67e22; font-weight:bold">💰 ${item.price} G</div></div>
                <button class="btn-buy" onclick="buyItem('${item.name}', ${item.price})">購入</button>`;
            container.appendChild(card);
        });
    }

    function buyItem(name, price) {
        if (gameState.money >= price) {
            gameState.money -= price;
            if (monsterMasterData[name]) gameState.currentMonster = name;
            alert(name + " を入手しました！");
            updateUI();
        } else { alert("お金が足りません！"); }
    }

    function updateUI() {
        document.querySelectorAll('.money-display').forEach(el => el.innerText = gameState.money + " G");
        
        if (gameState.currentMonster) {
            const data = monsterMasterData[gameState.currentMonster];
            document.getElementById('monster-image-container').innerHTML = `<img src="${data.image}">`;
            document.getElementById('monster-name-display').innerText = gameState.currentMonster;
            document.getElementById('status-board').style.display = 'block';
            
            // ステータス更新
            for (let s in data.stats) {
                document.getElementById(`${s}-val`).innerText = data.stats[s];
                document.getElementById(`${s}-bar`).style.width = (data.stats[s] * 2) + "px"; // 簡易バー表示
            }
        }
    }

    updateUI();
</script>
</body>
</html>
