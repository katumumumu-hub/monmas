<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #080410;
            --panel-color: rgba(25, 12, 40, 0.95);
            --border-color: #5c3a82;
            --accent-gold: #e5b05c;
            --text-color: #f0e6fa;
            --disabled-color: #221533;
            --crystal-color: #d100ff;
            --btn-bg: linear-gradient(180deg, #4b2373 0%, #1a082e 100%);
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at top, #1e0b35, #000000);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: transparent;
        }

        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-gold);
            text-align: center;
            position: relative;
        }
        
        #rank-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(229, 176, 92, 0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { 
            width: 16px;
            height: 16px; 
            background: var(--crystal-color); 
            border-radius: 50%; 
            box-shadow: 0 0 12px var(--crystal-color); 
            transform: rotate(45deg);
            transition: all 0.3s;
        }
        .crystal-empty { background: #1a0a25; box-shadow: inset 0 0 5px #000; transform: rotate(45deg) scale(0.8); opacity: 0.5; }
        #crystal-timer { font-size: 0.8rem; color: #a894c2; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px; 
            overflow: hidden;
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;}
        .screen.active { display: flex; }

        .rank-image-box {
            flex: 1 1 0;
            min-height: 0; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(92, 58, 130, 0.4);
            cursor: pointer;
        }

        #rank-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .home-bottom-area { flex-shrink: 0; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .status-item { 
            background: rgba(30, 15, 45, 0.7);
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid rgba(92, 58, 130, 0.5);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .status-label { font-size: 0.7rem; color: #bcaed4; margin-bottom: 2px; }
        .status-value { font-size: 1rem; font-weight: bold; color: var(--accent-gold); }

        /* 育成ゲーム風ステータス用の追加CSS */
        .status-section-title {
            font-size: 0.9rem; font-weight: bold; color: var(--accent-gold);
            border-left: 4px solid var(--crystal-color);
            padding-left: 8px; margin-bottom: 8px;
            background: linear-gradient(90deg, rgba(92, 58, 130, 0.4), transparent);
        }
        .status-bar-container {
            width: 100%; background: #1a0a25; height: 6px; border-radius: 3px; margin-top: 4px;
            overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        .status-bar-fill {
            height: 100%; background: linear-gradient(90deg, #d100ff, #00ffaa);
        }

        button {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        button:disabled, button.disabled-btn { 
            background: var(--disabled-color);
            border-color: #222; 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        button.disabled-btn:active { transform: scale(1); }

        .reason-text { font-size: 0.75rem; color: #ff5555; display: block; margin-top: 3px; font-weight: normal; }

        #skill-detail-panel {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            margin-top: 10px;
            display: none;
            flex-shrink: 0;
        }

        footer { 
            flex-shrink: 0;
            display: flex; 
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
        }
        footer button { 
            flex: 1;
            background: transparent; 
            border: none;
            border-right: 1px solid var(--border-color); 
            border-radius: 0;
            padding: 12px 0; 
            font-size: 0.85rem;
            font-weight: bold;
            color: #d1c1e5;
        }
        footer button:last-child { border-right: none; }
        footer button:disabled { background: #1a082e; color: #555; opacity: 1; }

        .dev-tools { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .dev-btn { padding: 4px 8px; font-size: 0.7rem; width: auto; border-radius: 4px; border:none; cursor: pointer; }
        .btn-max { background: #ffaa00; color: #000; }
        .btn-reset { background: #cc3333; color: #fff; }
        .btn-ref { background: #44aaff; color: #fff; }

        #event-screen, #result-screen, #status-screen, #item-screen, #event-ref-screen { overflow-y: auto; }
        
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; flex-shrink: 0; }
        
        .item-row { background: rgba(30,15,50,0.8); padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #4a2b6e; }
        .item-rarity { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px; margin-right: 6px; font-weight: bold; border: 1px solid currentColor;}
        .rarity-SS { color: #ff3333; text-shadow: 0 0 5px #ff0000; }
        .rarity-S { color: #ffdf00; }
        .rarity-A { color: #d100ff; }
        .rarity-B { color: #33aaff; }
        .rarity-C { color: #33ff33; }
        .rarity-D { color: #aaaaaa; }
        .rarity-E { color: #888888; }
        .rarity-F { color: #555555; }
        .item-use-btn { background: #4a2b6e; padding: 6px 12px; font-size: 0.8rem; width: auto; border-radius: 4px; border: 1px solid #7c4bb3; margin-top: 8px;}

        .skill-tab-container { display: flex; gap: 5px; margin-bottom: 10px; flex-shrink: 0; }
        .skill-tab {
            flex: 1;
            padding: 10px;
            font-size: 0.9rem;
            background: rgba(30, 15, 45, 0.7);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            border-radius: 4px;
        }
        .skill-tab.active { background: var(--btn-bg); border-color: var(--accent-gold); font-weight: bold; }

        .level-grid { 
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px; 
            overflow-y: auto; 
            padding: 5px 0;
            flex: 1;
            width: 90%; 
            margin: 0 auto;
        }
        .level-btn { background: #2a1540; border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 5px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s;}
        .level-btn.cleared { background: #1a3320; border-color: #33cc66; color: #aaffaa; }
        .level-btn:disabled { background: #111; color: #555; border-color: #333; cursor: not-allowed; }

        #monster-preview-container {
            flex-shrink: 0;
            height: 140px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; position: relative; overflow: hidden;
        }
        #monster-preview-img { max-height: 100px; max-width: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(209, 0, 255, 0.3)); }
        #monster-preview-info { font-size: 0.85rem; font-weight: bold; color: var(--accent-gold); margin-top: 5px; }

        .battle-ui { display: flex; flex-direction: column; height: 100%; gap: 10px; }
        .battle-enemy-area { 
            flex: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); position: relative;
        }
        .enemy-name { font-size: 1.2rem; font-weight: bold; color: #ff5555; margin-bottom: 5px; text-shadow: 0 0 5px #ff0000; }
        .enemy-image { max-width: 260px; max-height: 260px; width: 100%; object-fit: contain; margin-bottom: 10px; transition: opacity 0.3s; }
        
        .hp-container { width: 100%; background: #222; border-radius: 10px; border: 1px solid #555; height: 18px; overflow: hidden; margin-bottom: 5px; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);}
        .hp-bar { height: 100%; background: linear-gradient(90deg, #228b22, #32cd32); width: 100%; transition: width 0.3s ease; }
        .hp-bar.enemy { background: linear-gradient(90deg, #8b0000, #ff4500); }
        .hp-bar.mp { background: linear-gradient(90deg, #1e90ff, #00bfff); }
        .hp-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 0.75rem; line-height: 18px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;}

        .buff-area { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; min-height: 20px; width: 100%; justify-content: flex-start; }
        .buff-icon { font-size: 0.7rem; padding: 2px 4px; border-radius: 3px; color: #fff; background: rgba(0,0,0,0.6); border: 1px solid #888; }
        .buff-icon.buff { border-color: #32cd32; color: #32cd32; }
        .buff-icon.debuff { border-color: #ff4500; color: #ff4500; }
        .buff-icon.stun { border-color: #ffd700; color: #ffd700; }

        .battle-player-area { padding: 10px; background: rgba(30, 15, 45, 0.8); border-radius: 8px; border: 1px solid var(--border-color);}
        
        .battle-log-area { 
            flex: 0.6;
            background: #000; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; color: #d1c1e5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        @keyframes shake {
            0% { transform: translate(3px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .anim-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        
        @keyframes flashRed {
            0% { background-color: rgba(255, 0, 0, 0.6); }
            100% { background-color: transparent; }
        }
        .anim-flash { animation: flashRed 0.4s ease-out; }
        
        @keyframes fadeOutDown {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(30px); }
        }
        .anim-defeat { animation: fadeOutDown 1s forwards; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="dev-tools">
            <button class="dev-btn btn-max" onclick="playSE('click'); devMaxCrystals()">[開発] クリスタルMAX</button>
            <button class="dev-btn btn-reset" onclick="playSE('click'); devResetSave()">[開発] セーブ初期化</button>
            <button class="dev-btn btn-ref" onclick="playSE('click'); showEventRefScreen()">[開発] イベント参照</button>
        </div>
        <div id="rank-name">読み込み中...</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
    
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" onclick="playRankVideo()">
                <video id="rank-video" muted playsinline preload="metadata" src=""></video>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item">
                        <div class="status-label" id="display-next-req">戦闘力---で</div>
                        <div class="status-value" id="display-next-name" style="font-size: 0.9rem;">---に昇格</div>
                    </div>
                </div>
                <div class="status-item" style="margin-bottom:10px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div class="status-label" style="margin:0;">配下総数</div>
                    <div class="status-value" id="display-subordinates">0名</div>
                </div>
                <button onclick="startEvent()" style="margin-bottom: 8px;">イベント発生 (消費: 1)</button>
                <button onclick="openTrainingScreen()" style="background: linear-gradient(180deg, #732323 0%, #2e0808 100%);">特訓で鍛える (消費: 1)</button>
            </div>
        </div>

        <div id="training-screen" class="screen">
            <h3>特訓レベル選択</h3>
            <div id="monster-preview-container">
                <img id="monster-preview-img" src="" style="display:none;">
                <div id="monster-preview-info">レベルを選択してください</div>
            </div>
            <div id="level-list" class="level-grid"></div>
            <div style="text-align: center; padding: 10px 0; flex-shrink: 0;">
                <button id="start-battle-btn" disabled onclick="initiateSelectedBattle()" style="width: 80%; background: linear-gradient(180deg, #732323 0%, #2e0808 100%); box-shadow: 0 0 10px rgba(255,0,0,0.3); font-size: 1.1rem; padding: 12px;">戦闘開始</button>
            </div>
        </div>

        <div id="battle-screen" class="screen">
            <div class="battle-ui" id="battle-ui-area">
                <div class="battle-enemy-area">
                    <div class="enemy-name" id="battle-enemy-name">未知のモンスター</div>
                    <img class="enemy-image" id="battle-enemy-img" src="" alt="敵画像">
                    <div id="battle-enemy-buffs" class="buff-area" style="width: 90%; justify-content: center;"></div>
                    <div style="width: 90%;">
                        <div class="hp-container">
                            <div class="hp-bar enemy" id="battle-enemy-hp-bar" style="width: 100%;"></div>
                            <div class="hp-text" id="battle-enemy-hp-text">HP: ???/???</div>
                        </div>
                    </div>
                </div>
                
                <div class="battle-player-area">
                    <div style="font-weight: bold; color: var(--accent-gold); margin-bottom: 5px;">自分（魔族）</div>
                    <div id="battle-player-buffs" class="buff-area"></div>
                    <div class="hp-container">
                        <div class="hp-bar" id="battle-player-hp-bar" style="width: 100%;"></div>
                        <div class="hp-text" id="battle-player-hp-text">HP: 100/100</div>
                    </div>
                    <div class="hp-container">
                        <div class="hp-bar mp" id="battle-player-mp-bar" style="width: 100%;"></div>
                        <div class="hp-text" id="battle-player-mp-text">MP: 50/50</div>
                    </div>
                </div>
                
                <div class="battle-log-area" id="battle-log"></div>

                <button id="temp-end-battle-btn" style="padding: 10px; font-size: 0.9rem; display: none;">[結果を見る]</button>
            </div>
        </div>

        <div id="event-screen" class="screen">
            <div class="event-box" style="flex:1;">
                <h3 id="event-title">イベント</h3>
                <p id="event-text" style="line-height:1.5;"></p>
                <div id="choices-area" style="display:flex; flex-direction:column; gap:10px; margin-top:20px;"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="event-box" style="flex:1;">
                <h3 id="result-title">結果</h3>
                <p id="result-text" style="line-height:1.5;"></p>
                <div id="change-log" style="color:var(--crystal-color); margin-top: 15px; font-size: 0.9rem; font-weight:bold;"></div>
                <div id="skill-log" style="color:#ffdf00; margin-top: 10px; font-size: 0.95rem; font-weight:bold;"></div>
                <div id="item-log" style="color:#00ffaa; margin-top: 10px; font-size: 0.95rem; font-weight:bold;"></div>
            </div>
            <button onclick="playSE('click'); showScreen('home-screen')">ホームへ</button>
        </div>

        <div id="status-screen" class="screen">
            <h3 style="text-align: center; font-size: 1.2rem; color: #fff; background: linear-gradient(90deg, transparent, #4b2373, transparent); padding: 5px 0; border: none;">総合ステータス</h3>
            <div id="status-basic-area" style="display: flex; gap: 10px; margin-bottom: 15px;"></div>
            
            <div class="status-section-title">▶ 基礎能力</div>
            <div class="status-grid" id="stat-main-list"></div>
            
            <div class="status-section-title" style="margin-top: 10px;">▶ 属性魔力</div>
            <div class="status-grid" id="stat-elem-list"></div>
            
            <div class="status-section-title" style="margin-top: 10px;">▶ 魔族の性（内面性）</div>
            <div class="status-grid" id="stat-inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div class="skill-tab-container">
                <button id="tab-combat" class="skill-tab active" onclick="switchSkillTab('combat')">戦闘</button>
                <button id="tab-noncombat" class="skill-tab" onclick="switchSkillTab('noncombat')">非戦闘</button>
            </div>
            <div id="acquired-skills-list" style="display:flex; flex-direction:column; gap:8px; flex:1; overflow-y:auto; padding-bottom:5px;"></div>
            
            <div id="skill-detail-panel">
                <div id="detail-skill-name" style="font-weight:bold; font-size:1.1rem; color:var(--accent-gold); border-bottom:1px solid var(--border-color); padding-bottom:5px;"></div>
                <div style="display:flex; justify-content:flex-start; gap: 15px; margin-top: 8px;">
                    <div id="detail-skill-element" style="color:#ff7777; font-size:0.85rem; font-weight:bold; display:none;"></div>
                    <div id="detail-skill-mp" style="color:#00aaff; font-size:0.85rem; font-weight:bold; display:none;"></div>
                    <div id="detail-skill-power" style="color:#ffaa00; font-size:0.85rem; font-weight:bold; display:none;"></div>
                </div>
                <div id="detail-skill-bonus" style="color:var(--crystal-color); font-size:0.85rem; font-weight:bold; margin: 8px 0;"></div>
                <div id="detail-skill-req" style="color:#ffdf00; font-size:0.8rem; margin-bottom: 8px;"></div>
                <div id="detail-skill-desc" style="font-size:0.85rem; line-height:1.4;"></div>
            </div>
        </div>

        <div id="item-screen" class="screen">
            <h3>所持アイテム</h3>
            <div id="inventory-list"></div>
        </div>

        <div id="event-ref-screen" class="screen">
            <h3 style="flex-shrink:0;">イベント一覧 (開発用)</h3>
            <div id="event-ref-list" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:5px; margin-bottom:10px;"></div>
            <div id="event-ref-detail" style="flex-shrink:0; height:45%; background:rgba(20,10,30,0.9); border:1px solid var(--accent-gold); border-radius:8px; padding:10px; overflow-y:auto;">
                <div style="color:#aaa; text-align:center; margin-top:20px;">上のリストからイベントを選択してください</div>
            </div>
        </div>

    </main>

    <footer>
        <button onclick="playSE('click'); showScreen('home-screen')">ホーム</button>
        <button onclick="playSE('click'); showScreen('item-screen')">アイテム</button>
        <button onclick="playSE('click'); showScreen('skill-screen')">スキル</button>
        <button onclick="playSE('click'); showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

function initAudio() {
    if (!audioCtx) { audioCtx = new AudioContext(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
}

function playTone(freq, type, duration, vol=0.1, delay=0) {
    if (!audioCtx) return;
    const startTime = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function playSE(type) {
    initAudio();
    switch(type) {
        case 'click':      
            playTone(800, 'sine', 0.1, 0.05, 0);
            break;
        case 'error':      
            playTone(150, 'sawtooth', 0.3, 0.05, 0);
            playTone(140, 'sawtooth', 0.4, 0.05, 0.15); break;
        case 'finish':     
            playTone(523.25, 'sine', 0.3, 0.05, 0);
            playTone(659.25, 'sine', 0.3, 0.05, 0.1); playTone(783.99, 'sine', 0.4, 0.05, 0.2); break;
        case 'item':
            playTone(1046.50, 'sine', 0.1, 0.05, 0);
            playTone(1318.51, 'sine', 0.2, 0.05, 0.1); break;
        case 'use_item':
            playTone(600, 'sine', 0.4, 0.05, 0);
            playTone(800, 'triangle', 0.3, 0.03, 0.1); break;
        case 'skill':      
            playTone(880, 'square', 0.2, 0.03, 0);
            playTone(1108.73, 'square', 0.2, 0.03, 0.1); playTone(1318.51, 'square', 0.2, 0.03, 0.2); playTone(1760, 'square', 0.6, 0.03, 0.3); break;
        case 'rankup':     
            playTone(392.00, 'triangle', 0.2, 0.08, 0);
            playTone(392.00, 'triangle', 0.2, 0.08, 0.15); playTone(392.00, 'triangle', 0.2, 0.08, 0.30); playTone(523.25, 'triangle', 0.6, 0.08, 0.45); break;
        case 'hit':
            playTone(180, 'square', 0.1, 0.1, 0); break;
        case 'hit_heavy':
            playTone(100, 'sawtooth', 0.2, 0.15, 0); break;
        case 'defeat':

            playTone(100, 'sawtooth', 0.3, 0.1, 0.1); playTone(50, 'sawtooth', 0.6, 0.1, 0.3); break;
    }
}

let ranks = [];
let skills = [];
let events = [];
let items = [];
let monsters = [];
const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', fireAtk:'火属性', waterAtk:'水属性', thunderAtk:'雷属性', darkAtk:'闇属性', lightAtk:'光属性', nonElemAtk:'無属性', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感', crystals:'魔力石'};
let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, fireAtk: 0, waterAtk: 0, thunderAtk: 0, darkAtk: 0, lightAtk: 0, nonElemAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: [],
    items: {},
    clearedLevels: []
};
let currentSelectedLevel = null; 
let currentSkillTab = 'combat'; 

async function init() {
    try {
        const fetchJson = async (url) => {
            try {
                const res = await fetch(url);
                if (!res.ok) { return []; }
                return await res.json();
            } catch (e) {
                console.error(`[エラー] ${url} の解析失敗:`, e);
                return [];
            }
        };

        ranks = await fetchJson('ranks.json');
        skills = await fetchJson('skills.json');
        events = await fetchJson('events.json');
        items = await fetchJson('items.json');
        monsters = await fetchJson('monsters.json');

        const SKILL_DIFFICULTY_MULTIPLIER = 1.8;
        skills.forEach(skill => {
            if (skill.requirements) {
                let reqs = Array.isArray(skill.requirements) ? skill.requirements : [skill.requirements];
                reqs.forEach(req => {
                    if (req && req.value) {
                        req.value = Math.ceil(req.value * SKILL_DIFFICULTY_MULTIPLIER);
                    }
                });
            }
        });
        const saved = localStorage.getItem('devil_lord_save');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                gameState = Object.assign(gameState, parsed);
                gameState.stats = Object.assign({ hp: 0, mp: 0, physAtk: 0, magAtk: 0, fireAtk: 0, waterAtk: 0, thunderAtk: 0, darkAtk: 0, lightAtk: 0, nonElemAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 }, parsed.stats || {});
                gameState.innerTraits = Object.assign({ cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 }, parsed.innerTraits || {});
            } catch(e) {
                console.warn("セーブデータの破損を検知したため、リセットしました。:", e);
                localStorage.removeItem('devil_lord_save');
            }
        }
        
        if (!gameState.items) gameState.items = {};
        if (!gameState.clearedLevels) gameState.clearedLevels = [];
        if (!gameState.acquiredSkills) gameState.acquiredSkills = [];

        recoverCrystals();
        updateAll();
        setInterval(updateTimer, 1000);
    } catch (error) {
        console.error("致命的な初期化エラー:", error);
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    const footerBtns = document.querySelectorAll('footer button');
    if (id === 'event-screen' || id === 'battle-screen') {
        footerBtns.forEach(btn => btn.disabled = true);
    } else {
        footerBtns.forEach(btn => btn.disabled = false);
    }
}

function openTrainingScreen() {
    playSE('click');
    showScreen('training-screen');
    renderLevelGrid();
}

function updateMonsterPreview(lv) {
    const m = monsters.find(mon => mon.level === lv);
    const img = document.getElementById('monster-preview-img');
    const info = document.getElementById('monster-preview-info');
    if (m) {
        img.src = m.imagePath;
        img.style.display = 'block';
        info.innerText = `${m.name} (Lv.${lv})`;
    } else {
        img.style.display = 'none';
        info.innerText = lv > 10 ? `Lv.${lv} 未知の領域` : `Lv.${lv} モンスターデータなし`;
    }
}

function renderLevelGrid() {
    const list = document.getElementById('level-list');
    list.innerHTML = '';
    currentSelectedLevel = null;
    
    const startBtn = document.getElementById('start-battle-btn');
    if(startBtn) startBtn.disabled = true;

    let maxUnlocked = 10;
    if (gameState.clearedLevels) {
        for (let k = 10; k <= 100; k += 10) {
            if (gameState.clearedLevels.includes(k)) {
                maxUnlocked = k + 10;
            }
        }
    }
    
    for (let i = 1; i <= 100; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        
        if (i > maxUnlocked) {
            btn.disabled = true;
            btn.innerText = '未開放';
            btn.style.fontSize = '0.75rem';
        } else {
            btn.innerText = `Lv.${i}`;
            if (gameState.clearedLevels && gameState.clearedLevels.includes(i)) {
                btn.classList.add('cleared');
            }
            
            const monsterExists = monsters.find(m => m.level === i);
            if (!monsterExists && i > 10) {
                btn.disabled = true;
                btn.innerText = '???';
            }
            
            btn.onmouseenter = () => {
                if(btn.dataset.selected !== "true" && !btn.disabled) {
                    updateMonsterPreview(i);
                }
            };
            btn.onclick = (e) => {
                if(btn.disabled) return;
                updateMonsterPreview(i);
                document.querySelectorAll('.level-btn').forEach(b => {
                    b.dataset.selected = "false";
                    b.style.boxShadow = "none";
                    b.style.borderColor = b.classList.contains('cleared') ? "#33cc66" : "var(--border-color)";
                });
                btn.dataset.selected = "true";
                btn.style.boxShadow = "0 0 8px var(--accent-gold)";
                btn.style.borderColor = "var(--accent-gold)";
                
                currentSelectedLevel = i;
                if(startBtn) startBtn.disabled = false; 
            };
        }

        list.appendChild(btn);
    }
}

function initiateSelectedBattle() {
    if (currentSelectedLevel !== null) {
        startBattle(currentSelectedLevel);
    }
}

function getElementMultiplier(attackElem, defenseElem) {
    if(attackElem === '火' && defenseElem === '水') return 0.5;
    if(attackElem === '火' && defenseElem === '雷') return 1.5;
    if(attackElem === '水' && defenseElem === '雷') return 0.5;
    if(attackElem === '水' && defenseElem === '火') return 1.5;
    if(attackElem === '雷' && defenseElem === '火') return 0.5;
    if(attackElem === '雷' && defenseElem === '水') return 1.5;
    if(attackElem === '闇' && defenseElem === '光') return 1.5;
    if(attackElem === '光' && defenseElem === '闇') return 1.5;
    return 1.0;
}

async function startBattle(levelId) {
    if(gameState.stats.hp <= 0) {
        playSE('error');
        return alert("最大HPが0のため特訓できません。\nイベントをこなすかアイテムを使用してHPを上げてください！");
    }

    if(gameState.crystals <= 0) {
        playSE('error'); 
        return alert("魔力が足りません");
    }
    
    const monster = monsters.find(m => m.level === levelId);
    if (!monster) {
        playSE('error');
        return alert(`レベル${levelId}のモンスターデータが読み込めていません。`);
    }

    try {
        const enemyName = monster.name || `未知のモンスター (Lv.${levelId})`;
        const enemyMaxHp = monster.stats ? (monster.stats.hp || 1) : 1;
        
        const pStats = gameState.stats;
        const pInner = gameState.innerTraits;
        const pSubs = Math.max(0, (pStats.physAtk + pStats.magAtk + pStats.magDef + pStats.physDef + pStats.agility + pStats.luck) + pInner.leadership + pInner.charisma - pInner.cruelty);
        let battlePlayer = {
            name: "自分",
            isPlayer: true,
            hp: pStats.hp,
            maxHp: pStats.hp,
            mp: pStats.mp || 0,
            maxMp: pStats.mp || 0,
            element: '無',
            buffs: [],
            getStat: function(s) {
                let base = (pStats[s] !== undefined ? pStats[s] : (pInner[s] || 0));
                base += Math.floor(pSubs / 10);
                this.buffs.forEach(b => { if(b.stat === s) base += b.amount; });
                return Math.max(0, base);
            }
        };

        let battleEnemy = {
            name: enemyName,
            isPlayer: false,
            hp: enemyMaxHp,
            maxHp: enemyMaxHp,
            mp: monster.stats.mp || 9999,
            maxMp: monster.stats.mp || 9999,
            element: monster.element || '無',
            buffs: [],
            getStat: function(s) {
                let base = (monster.stats[s] || 0);
                this.buffs.forEach(b => { if(b.stat === s) base += b.amount; });
                return Math.max(0, base);
            }
        };

        const imgEl = document.getElementById('battle-enemy-img');
        const uiAreaEl = document.getElementById('battle-ui-area');
        imgEl.classList.remove('anim-shake', 'anim-defeat');
        imgEl.style.opacity = '1';
        imgEl.style.transform = 'none';
        document.getElementById('battle-enemy-name').innerText = enemyName;
        imgEl.src = monster.imagePath || '';

        const logArea = document.getElementById('battle-log');
        logArea.innerHTML = `<span style="color:#ff5555; font-size: 1.1rem; font-weight:bold;">${enemyName} が現れた！</span><br><br>`;

        function updateBattleUI() {
            document.getElementById('battle-enemy-hp-text').innerText = `HP: ${Math.max(0, battleEnemy.hp)}/${battleEnemy.maxHp}`;
            document.getElementById('battle-enemy-hp-bar').style.width = Math.max(0, (battleEnemy.hp / battleEnemy.maxHp) * 100) + '%';
            
            document.getElementById('battle-player-hp-text').innerText = `HP: ${Math.max(0, battlePlayer.hp)}/${battlePlayer.maxHp}`;
            document.getElementById('battle-player-hp-bar').style.width = Math.max(0, (battlePlayer.hp / battlePlayer.maxHp) * 100) + '%';
            document.getElementById('battle-player-mp-text').innerText = `MP: ${Math.max(0, battlePlayer.mp)}/${battlePlayer.maxMp}`;
            document.getElementById('battle-player-mp-bar').style.width = Math.max(0, (battlePlayer.mp / battlePlayer.maxMp) * 100) + '%';
            const renderBuffs = (entity, elemId) => {
                const el = document.getElementById(elemId);
                el.innerHTML = '';
                entity.buffs.forEach(b => {
                    const span = document.createElement('span');
                    span.className = `buff-icon ${b.type}`;
                    span.innerText = `${b.label}(${b.turns})`;
                    el.appendChild(span);
                });
            };
            renderBuffs(battlePlayer, 'battle-player-buffs');
            renderBuffs(battleEnemy, 'battle-enemy-buffs');
        }

        updateBattleUI();

        playSE('click');
        const currentRank = ranks.find(r => r.id === gameState.currentRankId);
        if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
        gameState.crystals--;
        save();
        renderCrystalUI(currentRank);
        updateTimer();

        showScreen('battle-screen');
        const endBtn = document.getElementById('temp-end-battle-btn');
        endBtn.style.display = 'none';
        await sleep(1000);
        
        const executeTurn = async (attacker, defender) => {
            if(attacker.hp <= 0 || defender.hp <= 0) return;
            let isStunned = attacker.buffs.some(b => b.type === 'stun');
            if (isStunned) {
                logArea.innerHTML += `${attacker.name}はスタンして動けない！<br>`;
                logArea.scrollTop = logArea.scrollHeight;
                await sleep(800);
                return;
            }

            let usableSkills = [];
            if (attacker.isPlayer) {
                let pSkills = gameState.acquiredSkills.map(id => skills.find(s => s.id === id)).filter(s => s && s.category === '戦闘');
                usableSkills = pSkills.filter(s => s.mpCost <= attacker.mp);
            } else {
                let eSkills = (monster.skills || []).map(id => skills.find(s => s.id === id)).filter(s => s);
                usableSkills = eSkills.filter(s => s.mpCost <= attacker.mp);
            }

            let selectedSkill = null;
            if (usableSkills.length > 0) {
                selectedSkill = usableSkills[Math.floor(Math.random() * usableSkills.length)];
            }

            if (selectedSkill) {
                attacker.mp -= selectedSkill.mpCost;
                updateBattleUI();
                logArea.innerHTML += `${attacker.name}は【${selectedSkill.name}】を使用した！<br>`;
                
                let alignBonus = 1.0;
                if (!attacker.isPlayer && attacker.element === selectedSkill.element && attacker.element !== '無') alignBonus = 1.5;
                let ce = selectedSkill.combatEffect || { type: 'damage', target: 'enemy', statUsed: 'physAtk', multiplier: 1.0 };
                let target = ce.target === 'self' ? attacker : defender;
                if (ce.type === 'damage') {
                    let atkStat = attacker.getStat(ce.statUsed || 'physAtk');
                    let isMag = ['magAtk', 'fireAtk', 'waterAtk', 'thunderAtk', 'darkAtk', 'lightAtk', 'nonElemAtk'].includes(ce.statUsed);
                    let defStat = target.getStat(isMag ? 'magDef' : 'physDef');
                    let damage = Math.max(1, Math.floor(atkStat * ce.multiplier - defStat / 2));
                    
                    let elemMult = getElementMultiplier(selectedSkill.element, target.element);
                    damage = Math.floor(damage * elemMult * alignBonus);

                    let luck = attacker.getStat('luck');
                    let isCrit = Math.random() < (luck * 0.01);
                    damage = Math.floor(damage * (0.85 + Math.random() * 0.3));
                    if (isCrit) damage = Math.floor(damage * 1.5);
                    if (attacker.isPlayer && monster.weaknessSkills && monster.weaknessSkills.includes(selectedSkill.id)) {
                        damage = Math.floor(damage * 1.5);
                        logArea.innerHTML += `<span style="color:#ffdf00;">弱点を突いた！</span> `;
                    }

                    if (elemMult > 1.0) logArea.innerHTML += `<span style="color:#ffdf00;">効果はばつぐんだ！</span> `;
                    else if (elemMult < 1.0) logArea.innerHTML += `<span style="color:#888;">効果はいまひとつのようだ。</span> `;
                    if (alignBonus > 1.0) logArea.innerHTML += `<span style="color:#ffdf00;">属性共鳴！</span> `;
                    if (isCrit) logArea.innerHTML += `<span style="color:#ff3333; font-weight:bold;">痛恨の一撃！</span> `;

                    target.hp -= damage;
                    logArea.innerHTML += `${target.name}に <b>${damage}</b> のダメージ！<br>`;
                    if (attacker.isPlayer) {
                        playSE('hit');
                        imgEl.classList.remove('anim-shake');
                        void imgEl.offsetWidth; 
                        imgEl.classList.add('anim-shake');
                    } else {
                        playSE('hit_heavy');
                        uiAreaEl.classList.remove('anim-flash');
                        void uiAreaEl.offsetWidth;
                        uiAreaEl.classList.add('anim-flash');
                    }
                } else if (ce.type === 'heal') {
                    let healBase = attacker.getStat(ce.statUsed || 'magAtk');
                    let healAmount = Math.floor(healBase * ce.multiplier * alignBonus);
                    target.hp = Math.min(target.maxHp, target.hp + healAmount);
                    if (alignBonus > 1.0) logArea.innerHTML += `<span style="color:#ffdf00;">属性共鳴！</span> `;
                    logArea.innerHTML += `<span style="color:#32cd32;">${target.name}のHPが <b>${healAmount}</b> 回復した！</span><br>`;
                    playSE('use_item');
                } else if (ce.type === 'buff' || ce.type === 'debuff') {
                    let bName = LABELS[ce.buffStat] || ce.buffStat;
                    target.buffs.push({ stat: ce.buffStat, amount: ce.buffAmount, turns: ce.turns, type: ce.type, label: bName });
                    let updown = ce.buffAmount > 0 ? '上昇' : '低下';
                    logArea.innerHTML += `<span style="color:${ce.type==='buff'?'#32cd32':'#ff4500'};">${target.name}の${bName}が${updown}した！(${ce.turns}ターン)</span><br>`;
                    playSE('skill');
                } else if (ce.type === 'stun') {
                    target.buffs.push({ stat: 'none', amount: 0, turns: ce.turns, type: 'stun', label: 'スタン' });
                    logArea.innerHTML += `<span style="color:#ffd700;">${target.name}はスタン状態になった！(${ce.turns}ターン)</span><br>`;
                    playSE('skill');
                }
            } else {
                let atkName = attacker.name;
                let defName = defender.name;
                let pAtk = Math.max(attacker.getStat('physAtk'), attacker.getStat('magAtk'));
                let isMag = attacker.getStat('magAtk') > attacker.getStat('physAtk');
                let def = defender.getStat(isMag ? 'magDef' : 'physDef');
                
                let damage = Math.max(1, Math.floor(pAtk - (def / 2)));
                let luck = attacker.getStat('luck');
                let isCrit = Math.random() < (luck * 0.01);
                damage = Math.floor(damage * (0.85 + Math.random() * 0.3));
                if (isCrit) damage = Math.floor(damage * 1.5);
                if (isCrit) logArea.innerHTML += `<span style="color:#ff3333; font-weight:bold;">痛恨の一撃！</span> `;
                defender.hp -= damage;
                logArea.innerHTML += `${atkName}の通常攻撃！ ${defName}に <b>${damage}</b> のダメージ！<br>`;
                if (attacker.isPlayer) {
                    playSE('hit');
                    imgEl.classList.remove('anim-shake');
                    void imgEl.offsetWidth; 
                    imgEl.classList.add('anim-shake');
                } else {
                    playSE('hit_heavy');
                    uiAreaEl.classList.remove('anim-flash');
                    void uiAreaEl.offsetWidth;
                    uiAreaEl.classList.add('anim-flash');
                }
            }

            updateBattleUI();
            logArea.scrollTop = logArea.scrollHeight;
            
            if (defender.hp <= 0 && attacker.isPlayer) {
                playSE('defeat');
                imgEl.classList.add('anim-defeat');
            }
            
            await sleep(800);
        };

        let turn = 1;
        while(battlePlayer.hp > 0 && battleEnemy.hp > 0) {
            logArea.innerHTML += `<span style="color:#a894c2;">--- ターン ${turn} ---</span><br>`;
            let pAgi = battlePlayer.getStat('agility');
            let eAgi = battleEnemy.getStat('agility');
            let isPlayerFirst = pAgi >= eAgi;
            if (pAgi === eAgi) isPlayerFirst = Math.random() > 0.5;

            await executeTurn(isPlayerFirst ? battlePlayer : battleEnemy, isPlayerFirst ? battleEnemy : battlePlayer);
            if(battlePlayer.hp > 0 && battleEnemy.hp > 0) {
                await executeTurn(isPlayerFirst ? battleEnemy : battlePlayer, isPlayerFirst ? battlePlayer : battleEnemy);
            }
            
            battlePlayer.buffs.forEach(b => b.turns--);
            battlePlayer.buffs = battlePlayer.buffs.filter(b => b.turns > 0);
            battleEnemy.buffs.forEach(b => b.turns--);
            battleEnemy.buffs = battleEnemy.buffs.filter(b => b.turns > 0);
            
            updateBattleUI();
            logArea.innerHTML += `<br>`;
            turn++;
        }

        let isWin = battlePlayer.hp > 0;
        logArea.innerHTML += isWin ?
            `<span style="color:#00ffaa; font-weight:bold; font-size:1.1rem;">${enemyName} を打ち倒した！</span><br>` : `<span style="color:#ff5555; font-weight:bold; font-size:1.1rem;">${enemyName} に敗北した…</span><br>`;
        logArea.scrollTop = logArea.scrollHeight;
        endBtn.style.display = 'block';
        endBtn.onclick = () => endBattle(levelId, monster, isWin);
    } catch (e) {
        console.error("バトル展開エラー:", e);
        playSE('error');
        alert("不具合が発生したため中断しました。");
    }
}

function endBattle(levelId, monster, isWin) {
    if (isWin) playSE('finish'); else playSE('click');
    
    document.getElementById('result-title').innerText = isWin ?
        "特訓 勝利！" : "特訓 敗北…";
    document.getElementById('result-text').innerText = isWin ? `${monster.name} との死闘を制した！` : `${monster.name} に敗れ去った…。力をつけて出直そう。`;
    
    let changeLog = '';
    let itemLog = '';
    
    if (isWin) {
        if (!gameState.clearedLevels.includes(levelId)) {
            gameState.clearedLevels.push(levelId);
            if (monster.firstClearReward) {
                monster.firstClearReward.forEach(reward => {
                    gameState.items[reward.itemId] = (gameState.items[reward.itemId] || 0) + reward.amount;
                    const it = items.find(i => i.id === reward.itemId);
                    if (it) itemLog += `<br>🎁 初回クリア報酬: ${it.name} x${reward.amount} を獲得！`;
                });
            }
        }
        
        if (monster.winStatsReward) {
            for(let k in monster.winStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.winStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.winStatsReward[k];
                changeLog += `${LABELS[k]}: +${monster.winStatsReward[k]}<br>`;
            }
        }
        
        if (monster.bonusProbability && Math.random() < monster.bonusProbability && monster.bonusStatsReward) {
            for(let k in monster.bonusStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.bonusStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.bonusStatsReward[k];
                changeLog += `[ボーナス] ${LABELS[k]}: +${monster.bonusStatsReward[k]}<br>`;
            }
        }
    } else {
        if (monster.loseStatsReward) {
            for(let k in monster.loseStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.loseStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.loseStatsReward[k];
                changeLog += `(敗北による成長) ${LABELS[k]}: +${monster.loseStatsReward[k]}<br>`;
            }
        }
    }

    document.getElementById('change-log').innerHTML = changeLog;
    document.getElementById('skill-log').innerHTML = ""; 
    document.getElementById('item-log').innerHTML = itemLog;
    
    let oldSkillCount = gameState.acquiredSkills.length;
    updateAll();
    if (gameState.acquiredSkills.length > oldSkillCount) {
        const newSkills = gameState.acquiredSkills.slice(oldSkillCount);
        newSkills.forEach(id => {
            const s = skills.find(sk => sk.id === id);
            if (s) document.getElementById('skill-log').innerHTML += `<br>★ 新たなスキル【${s.name}】を習得！`;
        });
        playSE('skill');
    }

    showScreen('result-screen');
}

function renderEventRefDetail(ev) {
    const detailArea = document.getElementById('event-ref-detail');
    let html = `<div style="font-weight:bold; color:var(--accent-gold); margin-bottom:5px; border-bottom:1px solid var(--border-color); padding-bottom:5px;">ID:${ev.id} ${ev.title}</div>`;
    html += `<div style="font-size:0.8rem; margin-bottom:10px;">${ev.text}</div>`;

    let choices = Array.isArray(ev.choices) ? ev.choices : (ev.choices ? [ev.choices] : []);
    choices.forEach((c, idx) => {
        let conditions = Array.isArray(c.reqCondition) ? c.reqCondition : (c.reqCondition ? [c.reqCondition] : []);
        let successRate = 100;
        let reqTextParts = [];

        for (let req of conditions) {
            if (!req || !req.stat) continue;
            const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : (gameState.innerTraits[req.stat] || 0);
            const targetVal = req.value || 0;
            reqTextParts.push(`${LABELS[req.stat]||req.stat}:${currentVal}/${targetVal}`);
            if (targetVal > 0) {
                let rate = Math.floor((currentVal / targetVal) * 100);
                if (rate > 100) rate = 100;
                if (rate < successRate) successRate = rate;
            }
        }
        
        let reqStr = reqTextParts.length > 0 ? `<div style="font-size:0.75rem; color:#aaa;">要求: ${reqTextParts.join(', ')}</div>` : '<div style="font-size:0.75rem; color:#aaa;">要求: なし</div>';
        let rateColor = successRate >= 100 ? '#00ffaa' : (successRate >= 50 ? '#ffaa00' : '#ff5555');

        html += `
        <div style="background:rgba(0,0,0,0.5); padding:8px; border-radius:4px; border:1px solid #4a2b6e; margin-bottom:8px;">
            <div style="font-size:0.85rem; font-weight:bold; margin-bottom:3px;">選択肢${idx+1}: ${c.text}</div>
            ${reqStr}
            <div style="font-size:0.9rem; font-weight:bold; color:${rateColor}; margin-top:3px;">成功率: ${successRate}%</div>
        </div>`;
    });

    detailArea.innerHTML = html;
}

function recoverCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    const msPerCrystal = 10 * 60 * 1000;
    const now = Date.now();
    const elapsed = now - gameState.lastPlayTime;
    if (elapsed >= msPerCrystal && gameState.crystals < currentRank.maxCrystals) {
        const added = Math.floor(elapsed / msPerCrystal);
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + added);
        gameState.lastPlayTime = gameState.crystals === currentRank.maxCrystals ? now : gameState.lastPlayTime + added * msPerCrystal;
        updateAll();
    }
}

function switchSkillTab(tab) {
    playSE('click');
    currentSkillTab = tab;
    document.getElementById('tab-combat').classList.toggle('active', tab === 'combat');
    document.getElementById('tab-noncombat').classList.toggle('active', tab === 'noncombat');
    document.getElementById('skill-detail-panel').style.display = 'none';
    checkAndRenderSkills();
}

function checkAndRenderSkills() {
    let isNewSkillAcquired = false;
    skills.forEach(skill => {
        let meetsReq = true;
        let reqs = Array.isArray(skill.requirements) ? skill.requirements : (skill.requirements ? [skill.requirements] : []);
        for (let req of reqs) {
            if (!req || !req.stat) continue;
            const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : (gameState.innerTraits[req.stat] || 0);
            if (currentVal < (req.value || 0)) { meetsReq = false; break; }
        }
        if (meetsReq && !gameState.acquiredSkills.includes(skill.id)) {
            gameState.acquiredSkills.push(skill.id);
            isNewSkillAcquired = true;
            if (skill.bonus) {
                for (let k in skill.bonus) {
                    if (gameState.stats[k] !== undefined) gameState.stats[k] += skill.bonus[k];
                    else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += skill.bonus[k];
                }
                gameState.stats.magAtk = (gameState.stats.fireAtk || 0) + (gameState.stats.waterAtk || 0) + (gameState.stats.thunderAtk || 0) + (gameState.stats.darkAtk || 0) + (gameState.stats.lightAtk || 0) + (gameState.stats.nonElemAtk || 0);
            }
        }
    });
    if (isNewSkillAcquired) { checkAndRenderSkills(); return; }

    const list = document.getElementById('acquired-skills-list');
    list.innerHTML = '';
    const filteredSkills = gameState.acquiredSkills.filter(skillId => {
        const skill = skills.find(s => s.id === skillId);
        if (!skill) return false;
        if (currentSkillTab === 'combat' && skill.category === '戦闘') return true;
        if (currentSkillTab === 'noncombat' && skill.category === '非戦闘') return true;
        return false;
    });
    if (filteredSkills.length === 0) {
        list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">まだ該当するスキルを習得していません。</div>';
        return;
    }

    filteredSkills.forEach(skillId => {
        const skill = skills.find(s => s.id === skillId);
        if (skill) {
            const btn = document.createElement('button');
            btn.style.textAlign = 'left'; btn.style.padding = '12px'; btn.style.background = 'rgba(40,20,60,0.8)'; btn.style.marginBottom = '5px';
            btn.innerHTML = `<span style="color:var(--crystal-color); margin-right:5px;">${skill.rarity || ''}</span>${skill.name}`;
            
            btn.onclick = () => {
                playSE('click');
                document.getElementById('skill-detail-panel').style.display = 'block';
                document.getElementById('detail-skill-name').innerHTML = `<span style="color:var(--crystal-color); margin-right:5px;">${skill.rarity || ''}</span>${skill.name}`;
                
                const elementEl = document.getElementById('detail-skill-element');
                if (skill.element) {
                    elementEl.innerText = `属性: ${skill.element}`;
                    elementEl.style.display = 'block';
                } else {
                    elementEl.style.display = 'none';
                }

                const mpEl = document.getElementById('detail-skill-mp');
                if (skill.mpCost) {
                    mpEl.innerText = `消費MP: ${skill.mpCost}`;
                    mpEl.style.display = 'block';
                } else {
                    mpEl.style.display = 'none';
                }
                
                const powerEl = document.getElementById('detail-skill-power');
                if (skill.combatEffect) {
                    let effectText = '';
                    const ce = skill.combatEffect;
                    const targetStr = ce.target === 'enemy' ? '敵' : (ce.target === 'self' ? '自身' : '対象');
                    switch(ce.type) {
                        case 'damage':
                            effectText = `${targetStr}にダメージ (基本威力: ${skill.power || 0})`;
                            break;
                        case 'heal':
                            effectText = `${targetStr}のHPを回復 (基本回復力: ${skill.power || 0})`;
                            break;
                        case 'buff':
                            effectText = `${targetStr}の${LABELS[ce.buffStat] || ce.buffStat}を${ce.buffAmount}上昇 (${ce.turns}ターン)`;
                            break;
                        case 'debuff':
                            effectText = `${targetStr}の${LABELS[ce.buffStat] || ce.buffStat}を${Math.abs(ce.buffAmount)}減少 (${ce.turns}ターン)`;
                            break;
                        case 'stun':
                            effectText = `${targetStr}をスタン状態にする (${ce.turns}ターン)`;
                            break;
                        default:
                            effectText = `威力: ${skill.power}`;
                    }
                    powerEl.innerText = effectText;
                    powerEl.style.display = 'block';
                } else if (skill.power) {
                    powerEl.innerText = `威力: ${skill.power}`;
                    powerEl.style.display = 'block';
                } else {
                    powerEl.style.display = 'none';
                }

                const bonusText = Object.entries(skill.bonus || {}).map(([k, v]) => `${LABELS[k] || k} +${v}`).join(' / ');
                document.getElementById('detail-skill-bonus').innerText = bonusText ? `【効果】 ${bonusText}` : '';
                
                let reqText = '';
                if (skill.requirements && skill.requirements.length > 0) {
                    reqText = '【習得条件】 ' + skill.requirements.map(req => `${LABELS[req.stat] || req.stat} ${req.value}以上`).join(', ');
                }
                document.getElementById('detail-skill-req').innerText = reqText;
                document.getElementById('detail-skill-desc').innerText = skill.description;
            };
            list.appendChild(btn);
        }
    });
}

function updateAll() {
    if (ranks.length === 0) return;
    gameState.stats.magAtk = (gameState.stats.fireAtk || 0) + (gameState.stats.waterAtk || 0) + (gameState.stats.thunderAtk || 0) + (gameState.stats.darkAtk || 0) + (gameState.stats.lightAtk || 0) + (gameState.stats.nonElemAtk || 0);
    checkAndRenderSkills();
    const s = gameState.stats;
    const i = gameState.innerTraits;
    const subs = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    const cp = Object.values(s).reduce((a,b)=>a+b,0) + Object.values(i).reduce((a,b)=>a+b,0) + Math.max(0, subs);
    
    let currentRank = ranks.find(r => r.id === gameState.currentRankId);
    let nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    if (nextRank && cp >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        currentRank = ranks.find(r => r.id === gameState.currentRankId);
        nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
        playSE('rankup');
        setTimeout(() => { alert(`昇格：${currentRank.name}`); }, 100);
        if (gameState.crystals < currentRank.maxCrystals) gameState.crystals = currentRank.maxCrystals;
        
        gameState.stats.hp += 1000;
    }

    document.getElementById('rank-name').innerText = currentRank.name;
    const video = document.getElementById('rank-video');
    const newSrc = currentRank.imagePath + "#t=0.001";
    if (video.src !== new URL(newSrc, document.baseURI).href) { video.src = newSrc;
        video.muted = true; }
    
    document.getElementById('display-combat-power').innerText = cp.toLocaleString();
    if (nextRank) {
        document.getElementById('display-next-req').innerText = `戦闘力${nextRank.reqCombatPower.toLocaleString()}で`;
        document.getElementById('display-next-name').innerText = `${nextRank.name}に昇格`;
    } else {
        document.getElementById('display-next-req').innerText = `昇格条件`;
        document.getElementById('display-next-name').innerText = `最高階級（MAX）`;
    }
    document.getElementById('display-subordinates').innerText = Math.max(0, subs).toLocaleString() + "名";
    
    renderCrystalUI(currentRank);
    renderStats();
    renderItems(); 
    save();
}

function renderCrystalUI(rank) {
    const area = document.getElementById('crystal-container');
    area.innerHTML = '';
    for(let i=0; i<rank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        area.appendChild(d);
    }
}

function updateTimer() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    recoverCrystals();
    if (gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const msPerCrystal = 10 * 60 * 1000;
    const remaining = msPerCrystal - (Date.now() - gameState.lastPlayTime);
    const m = Math.floor(remaining / 1000 / 60);
    const s = Math.floor((remaining / 1000) % 60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function startEvent() {
    if(gameState.crystals <= 0) { playSE('error'); return alert("魔力が足りません"); }
    const currentEvents = events.filter(e => e && e.minRankId <= gameState.currentRankId);
    if (!currentEvents || currentEvents.length === 0) { playSE('error'); return alert("イベントデータが見つかりません。"); }
    const ev = currentEvents[Math.floor(Math.random() * currentEvents.length)];
    try {
        const area = document.getElementById('choices-area');
        area.innerHTML = '';
        document.getElementById('event-title').innerText = ev.title || "名称不明のイベント";
        document.getElementById('event-text').innerText = ev.text || "";
        let choices = Array.isArray(ev.choices) ? ev.choices : (ev.choices ? [ev.choices] : []);
        if (choices.length === 0) throw new Error("選択肢(choices)のデータがありません。");
        choices.forEach(c => {
            const b = document.createElement('button');
            b.style.textAlign = 'left'; 
            
            let conditions = Array.isArray(c.reqCondition) ? c.reqCondition : (c.reqCondition ? [c.reqCondition] : []);
            let successRate = 100;
           
            for (let req of conditions) {
                if (!req || !req.stat) continue;
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : (gameState.innerTraits[req.stat] || 0);
                const targetVal = req.value || 0;
              
                 if (targetVal > 0) {
                    let rate = Math.floor((currentVal / targetVal) * 100);
                    if (rate > 100) rate = 100;
                    if (rate < successRate) successRate = rate;
  
                }
            }
            
            b.innerHTML = (c.text || "選択肢") + ` <span style="font-size:0.8rem; color:#aaa;">(成功率: ${successRate}%)</span>`;
            
            b.onclick = () => {
            
                let oldRank = gameState.currentRankId;
                let oldSkillCount = gameState.acquiredSkills.length;
                document.getElementById('result-title').innerText = "イベント結果";
                document.getElementById('change-log').innerHTML = '';
                document.getElementById('skill-log').innerHTML = ''; document.getElementById('item-log').innerHTML = '';
                const isSuccess = Math.random() * 100 < successRate;
                if (isSuccess) {
                    document.getElementById('result-text').innerText = c.successText || c.resultText || "成功しました。";
                    
                    if (c.statChanges) {
                        for(let k in c.statChanges) {
                            if (k === 'magAtk') {
                                const elemList = ['fireAtk', 'waterAtk', 'thunderAtk', 'darkAtk', 'lightAtk', 'nonElemAtk'];
                                let amount = c.statChanges[k];
                                let sign = Math.sign(amount);
                                let absAmount = Math.abs(amount);
                                let dist = {};
                                for(let i=0; i<absAmount; i++) {
                                    const randElem = elemList[Math.floor(Math.random() * elemList.length)];
                                    if (gameState.stats[randElem] !== undefined) {
                                        gameState.stats[randElem] += sign;
                                        dist[randElem] = (dist[randElem] || 0) + sign;
                                    }
                                }
                                for (let e in dist) {
                        
                                    const signStr = dist[e] > 0 ? "+" : "";
                                    document.getElementById('change-log').innerHTML += `${LABELS[e] || e}: ${signStr}${dist[e]}<br>`;
                                }
                            } else {
                                if (gameState.stats[k] !== undefined) gameState.stats[k] += c.statChanges[k];
                                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += c.statChanges[k];
                                const sign = c.statChanges[k] > 0 ? "+" : "";
                                document.getElementById('change-log').innerHTML += `${LABELS[k] || k}: ${sign}${c.statChanges[k]}<br>`;
                            }
                        }
                    }
                    
                    let droppedItemNames = [];
                    let drops = Array.isArray(c.itemDrops) ? c.itemDrops : (c.itemDrops ? [c.itemDrops] : []);
                    drops.forEach(drop => {
                        if (!drop || !drop.itemId) return;
                        if (gameState.currentRankId >= (drop.minRankId || 1)) {
                            if (Math.random() < (drop.probability !== undefined ? drop.probability : 1)) {
  
                                gameState.items[drop.itemId] = (gameState.items[drop.itemId] || 0) + 1;
                                const itemData = items.find(i => i.id === drop.itemId);
                         
                                if (itemData) droppedItemNames.push(itemData.name);
                            }
                        }
                    });
                    const prevSkillCount = gameState.acquiredSkills.length;
                    updateAll(); 
                    
                    let rankedUp = (gameState.currentRankId > oldRank);
                    let skilledUp = (gameState.acquiredSkills.length > oldSkillCount);
                    let itemDropped = droppedItemNames.length > 0;
                    
                    if (!rankedUp) { 
                        if (skilledUp) { playSE('skill');
                        } 
                        else if (itemDropped) { playSE('item');
                        } 
                        else { playSE('finish');
                        } 
                    }
                    
                    if (skilledUp) {
                        const newSkills = gameState.acquiredSkills.slice(prevSkillCount);
                        newSkills.forEach(id => {
                            const s = skills.find(sk => sk.id === id);
                            if (s) document.getElementById('skill-log').innerHTML += `<br>★ スキル【${s.name}】を習得！`;
                        });
                    }
                    if (itemDropped) { 
                        document.getElementById('item-log').innerHTML = `<br>🎁 ドロップ: ${droppedItemNames.join('、')} を獲得！`;
                    }
                } else {
                    document.getElementById('result-text').innerText = c.failText || "失敗しました…";
                    updateAll();
                    let rankedUp = (gameState.currentRankId > oldRank);
                    if (!rankedUp) { playSE('error');
                    }
                }
                
                showScreen('result-screen');
            };
            area.appendChild(b);
        });
        playSE('click');
        const currentRank = ranks.find(r => r.id === gameState.currentRankId);
        if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
        gameState.crystals--;
        save(); renderCrystalUI(currentRank); updateTimer(); showScreen('event-screen');
    } catch (e) {
        console.error("イベント展開エラー:", e); playSE('error');
        alert("イベントのデータに不備があるため中断しました。\nエラー内容: " + e.message);
    }
}

// 育成ゲーム風にUIを更新するための修正版
function renderStats() {
    const s = gameState.stats;
    const i = gameState.innerTraits;
    
    // HPとMPの特別枠描画
    const basicArea = document.getElementById('status-basic-area');
    basicArea.innerHTML = `
        <div style="flex: 1; background: rgba(30,15,45,0.8); border: 1px solid #7c4bb3; border-radius: 8px; padding: 10px; text-align: center;">
            <div style="font-size: 0.8rem; color: #bcaed4;">HP</div>
            <div style="font-size: 1.4rem; font-weight: bold; color: #32cd32; text-shadow: 0 0 5px rgba(50,205,50,0.5);">${s.hp}</div>
        </div>
        <div style="flex: 1; background: rgba(30,15,45,0.8); border: 1px solid #7c4bb3; border-radius: 8px; padding: 10px; text-align: center;">
            <div style="font-size: 0.8rem; color: #bcaed4;">MP</div>
            <div style="font-size: 1.4rem; font-weight: bold; color: #1e90ff; text-shadow: 0 0 5px rgba(30,144,255,0.5);">${s.mp}</div>
        </div>
    `;

    // パラメータを分類
    const mainKeys = ['physAtk', 'magAtk', 'physDef', 'magDef', 'agility', 'luck'];
    const elemKeys = ['fireAtk', 'waterAtk', 'thunderAtk', 'darkAtk', 'lightAtk', 'nonElemAtk'];
    const innerKeys = ['cruelty', 'leadership', 'charisma', 'control', 'responsibility'];

    // 個別のリスト描画用の関数
    const renderList = (keys, dataObj, targetId, colorType) => {
        const target = document.getElementById(targetId);
        target.innerHTML = '';
        keys.forEach(k => {
            const val = dataObj[k] || 0;
            // 数値から適当なゲージ幅を算出（MAX想定500とするが超えても100%にする）
            const fillPct = Math.min(100, Math.max(0, (val / 500) * 100));
            
            let barColor = "linear-gradient(90deg, #5c3a82, #d100ff)";
            if (colorType === 'elem') {
                if (k==='fireAtk') barColor = "linear-gradient(90deg, #8b0000, #ff4500)";
                if (k==='waterAtk') barColor = "linear-gradient(90deg, #00008b, #1e90ff)";
                if (k==='thunderAtk') barColor = "linear-gradient(90deg, #b8860b, #ffd700)";
                if (k==='darkAtk') barColor = "linear-gradient(90deg, #2b00ff, #8a2be2)";
                if (k==='lightAtk') barColor = "linear-gradient(90deg, #daa520, #ffffe0)";
                if (k==='nonElemAtk') barColor = "linear-gradient(90deg, #555, #aaa)";
            } else if (colorType === 'inner') {
                barColor = "linear-gradient(90deg, #006400, #32cd32)";
            }

            target.innerHTML += `
                <div class="status-item">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <span class="status-label">${LABELS[k]}</span>
                        <span class="status-value">${val}</span>
                    </div>
                    <div class="status-bar-container">
                        <div class="status-bar-fill" style="width: ${fillPct}%; background: ${barColor};"></div>
                    </div>
                </div>
            `;
        });
    };

    renderList(mainKeys, s, 'stat-main-list', 'main');
    renderList(elemKeys, s, 'stat-elem-list', 'elem');
    renderList(innerKeys, i, 'stat-inner-list', 'inner');
}

function renderItems() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = '';
    if (!gameState.items || Object.keys(gameState.items).length === 0) {
        list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">アイテムを所持していません。</div>';
        return;
    }
    let hasItem = false;
    for (let itemId in gameState.items) {
        const count = gameState.items[itemId];
        if (count > 0) {
            hasItem = true;
            const itemData = items.find(i => i.id == itemId);
            if (itemData) {
                const effectsText = Object.entries(itemData.effects || {}).map(([k, v]) => `${LABELS[k]}+${v}`).join(' / ');
                list.innerHTML += `
                    <div class="item-row">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:bold; font-size:1.05rem; color:var(--text-color);">
                   
                                <span class="item-rarity rarity-${itemData.rarity}">${itemData.rarity}</span>${itemData.name}
                            </div>
                            <div style="color:var(--accent-gold); font-weight:bold;">所持: ${count}</div>
                        </div>
  
                        <div style="font-size:0.8rem; color:#aaa; margin-top:6px; line-height:1.4;">${itemData.description}</div>
                        <div style="font-size:0.8rem; color:var(--crystal-color); font-weight:bold; margin-top:4px;">【効果】 ${effectsText}</div>
                        <button class="item-use-btn" onclick="useItem(${itemData.id})">使う</button>
                   
                    </div>`;
            }
        }
    }
    if (!hasItem) { list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">アイテムを所持していません。</div>';
    }
}

function useItem(itemId) {
    if (!gameState.items[itemId] || gameState.items[itemId] <= 0) return;
    const itemData = items.find(i => i.id == itemId);
    if (!itemData || !itemData.effects) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    for (let k in itemData.effects) {
        if (k === 'crystals') { 
            gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + itemData.effects[k]);
        } 
        else if (k === 'magAtk') {
            const elemList = ['fireAtk', 'waterAtk', 'thunderAtk', 'darkAtk', 'lightAtk', 'nonElemAtk'];
            let amount = itemData.effects[k];
            let sign = Math.sign(amount);
            let absAmount = Math.abs(amount);
            for(let i=0; i<absAmount; i++) {
                const randElem = elemList[Math.floor(Math.random() * elemList.length)];
                if (gameState.stats[randElem] !== undefined) {
                    gameState.stats[randElem] += sign;
                }
            }
        }
        else if (gameState.stats[k] !== undefined) { 
            gameState.stats[k] += itemData.effects[k];
        } 
        else if (gameState.innerTraits[k] !== undefined) { 
            gameState.innerTraits[k] += itemData.effects[k];
        }
    }
    gameState.items[itemId]--; playSE('use_item'); alert(`${itemData.name} を使用した！`); save(); updateAll(); 
}

function save() { localStorage.setItem('devil_lord_save', JSON.stringify(gameState)); }
init();
</script>
