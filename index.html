<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - 育成スケジュール設定</title>
    <style>
        :root {
            --bg-schedule: #f7f1e3;
            --slot-bg: #ffffff;
            --slot-border: #d1ccc0;
            --accent: #ff5252;
            --sidebar-bg: #2c3e50;
        }

        body {
            font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
            margin: 0;
            background: #333;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--bg-schedule);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ヘッダーエリア */
        .schedule-header {
            background: #fff;
            padding: 10px;
            display: flex;
            border-bottom: 2px solid var(--slot-border);
        }
        .mini-status { font-size: 0.75rem; flex: 1; }
        .mini-sprite { width: 50px; height: 50px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 10px; }

        /* メインコンテンツ：左右分割 */
        .schedule-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左側：スケジュールスロット */
        .slot-container {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #fff;
            margin: 5px;
            border-radius: 8px;
        }
        .view-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .tab {
            flex: 1;
            padding: 5px;
            text-align: center;
            background: #ddd;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .tab.active { background: var(--accent); color: white; }

        .day-slot {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.8rem;
        }
        .day-num { width: 30px; color: #888; font-weight: bold; }
        .action-name { flex: 1; color: #ccc; border: 1px dashed #ccc; border-radius: 4px; padding: 2px 5px; text-align: center; }
        .action-name.set { color: #333; border: 1px solid #3498db; background: #ebf5fb; }

        /* 右側：行動リスト */
        .action-list {
            width: 140px;
            background: var(--sidebar-bg);
            padding: 10px;
            overflow-y: auto;
        }
        .action-item {
            background: #fff;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: center;
        }

        /* 下部：アイテムスロット & ボタン */
        .schedule-footer {
            background: #fff;
            padding: 15px;
            border-top: 2px solid var(--slot-border);
        }
        .item-slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .item-slot {
            width: 50px;
            height: 50px;
            border: 2px dashed #bbb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: #f9f9f9;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: not-allowed;
            background: #ccc;
            color: white;
        }
        .btn.active {
            background: #27ae60;
            cursor: pointer;
            box-shadow: 0 4px #1e8449;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="schedule-header">
        <div class="mini-sprite">🌱</div>
        <div class="mini-status">
            <strong>ドロモン</strong> (Rank E)<br>
            体力: 10 / 筋力: 5 / 魔力: 5
        </div>
    </div>

    <div class="schedule-main">
        <div class="slot-container">
            <div class="view-tabs">
                <div class="tab">1週</div>
                <div class="tab">1月</div>
                <div class="tab active">3月(90日)</div>
            </div>
            
            <div id="slots">
                <div class="day-slot"><span class="day-num">1</span> <div class="action-name set">ひたすら腹筋</div></div>
                <div class="day-slot"><span class="day-num">2</span> <div class="action-name set">ひたすら腹筋</div></div>
                <div class="day-slot"><span class="day-num">3</span> <div class="action-name">行動を選択</div></div>
                <div class="day-slot"><span class="day-num">4</span> <div class="action-name">行動を選択</div></div>
                <div class="day-slot"><span class="day-num">5</span> <div class="action-name">行動を選択</div></div>
                <div class="day-slot"><span class="day-num">...</span> <div class="action-name">残り85日分</div></div>
            </div>
        </div>

        <div class="action-list">
            <div style="color: white; font-size: 0.7rem; margin-bottom: 10px;">行動一覧</div>
            <div class="action-item">腹筋</div>
            <div class="action-item">瞑想</div>
            <div class="action-item">お花摘み</div>
            <div class="action-item">日向ぼっこ</div>
            <div class="action-item">読書</div>
        </div>
    </div>

    <div class="schedule-footer">
        <div style="font-size: 0.7rem; text-align: center; margin-bottom: 5px;">補助アイテム（3つまで）</div>
        <div class="item-slots">
            <div class="item-slot">💊</div>
            <div class="item-slot"></div>
            <div class="item-slot"></div>
        </div>

        <div class="btn-group">
            <button class="btn active">補助アイテム選択</button>
            <button class="btn">育成開始</button> 
        </div>
        <p style="font-size: 0.6rem; color: #666; text-align: center; margin-top: 5px;">
            ※全てのスロットを埋めると「育成開始」が有効になります[span_0](end_span)
        </p>
    </div>
</div>

</body>
</html>
