<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - 統合版</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(to bottom, #a5c9fd, #d1d9ff);
            --accent-green: #2ecc71;
            --accent-yellow: #f1c40f;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --text-dark: #333;
            --nav-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 画面切り替え */
        section { display: none; width: 100%; height: 100%; flex-direction: column; }
        section.active { display: flex; }

        /* --- ホーム画面 --- */
        .home-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .game-title {
            font-size: 2.2rem;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .main-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .leaf-icon { font-size: 4rem; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }
        .monster-sprite { font-size: 6rem; margin: 10px 0; animation: float 3s infinite ease-in-out; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .evolution-days {
            font-size: 1.4rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.4);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .quick-stats {
            font-size: 0.9rem;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .action-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-home {
            width: 140px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .btn-green { background: var(--accent-green); box-shadow: 0 4px #27ae60; }
        .btn-yellow { background: var(--accent-yellow); box-shadow: 0 4px #f39c12; color: #333; }
        .btn-home:active { transform: translateY(2px); box-shadow: none; }

        /* 下部ナビゲーション */
        .bottom-nav {
            height: 80px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #ddd;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #7f8c8d;
            font-size: 0.8rem;
            flex: 1;
        }

        .nav-item.active { color: var(--accent-blue); font-weight: bold; }
        .nav-icon { font-size: 1.6rem; }

        /* --- スケジュール画面等のスタイル（前回踏襲・一部調整） --- */
        .top-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #ddd; }
        .monster-mini-card { margin: 10px; padding: 10px; background: white; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .status-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); font-size: 0.7rem; color: #666; }
        
        .editor-container { flex: 1; display: flex; overflow: hidden; background: #fff; }
        .slot-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .day-box { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .slot-rect { flex: 1; height: 35px; border: 1px dashed #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.8rem; }
        .slot-rect.filled { border: 1px solid var(--accent-blue); background: #ebf5fb; color: #333; font-weight: bold; }
        
        .side-actions { width: 130px; background: #2c3e50; padding: 10px; overflow-y: auto; }
        .act-chip { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; cursor: pointer; }
        
        .footer-fixed { padding: 15px; background: white; border-top: 1px solid #ddd; }
        .item-circles { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .circle-slot { width: 50px; height: 50px; border: 2px dashed #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ccc; }
        .btn-full { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <section id="home-screen" class="active">
        <div class="home-content">
            <div class="game-title">Hanamon Breeder</div>
            
            <div class="main-visual">
                <div class="leaf-icon">🌱</div>
                <div class="monster-sprite">🌱</div> <div class="evolution-days">あと 82 日</div>
                <div class="quick-stats">
                    HP: 10 / 筋力: 5 / 魔力: 5 / 防御: 5 / 俊敏: 5
                </div>
            </div>

            <div class="action-group">
                <button class="btn-home btn-green" onclick="nextDay()">行動</button>
                <button class="btn-home btn-yellow" onclick="alert('全行動を実行して進化させます')">全行動</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home-screen')">
                <span class="nav-icon">🍃</span>
                <span>育成</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📖</span>
                <span>図鑑</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>ショップ</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🏗</span>
                <span>増築</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🎒</span>
                <span>持ち物</span>
            </div>
        </nav>
    </section>

    <section id="schedule-screen">
        <div class="top-bar">
            <h3 style="margin:0; font-size:1rem;">スケジュール設定</h3>
            <span style="cursor:pointer; font-size:1.2rem;" onclick="showPage('home-screen')">🏠</span>
        </div>

        <div class="monster-mini-card">
            <div style="font-size:2rem; background:#f0f0f0; padding:10px; border-radius:8px;">🌱</div>
            <div style="flex:1">
                <div style="font-weight:bold; font-size:0.9rem;">ドロモン <small style="color:#999;">Rank E</small></div>
                <div class="status-mini-grid">
                    <span>体力: 12</span> <span>筋力: 8</span> <span>魔力: 5</span>
                    <span>防御: 6</span> <span>俊敏: 5</span>
                </div>
            </div>
        </div>

        <div style="display:flex; justify-content:center; gap:10px; padding:10px; background:#f9f9f9;">
            <button class="tab-btn" onclick="updateSlots(7)">7日</button>
            <button class="tab-btn" onclick="updateSlots(30)">1月</button>
            <button class="tab-btn active" onclick="updateSlots(90)">3月</button>
        </div>

        <div class="editor-container">
            <div class="slot-scroll" id="slot-list"></div>
            <div class="side-actions">
                <div class="act-chip" onclick="addAct('腹筋')">腹筋</div>
                <div class="act-chip" onclick="addAct('瞑想')">瞑想</div>
                <div class="act-chip" onclick="addAct('散歩')">散歩</div>
                <div class="act-chip" onclick="addAct('昼寝')">昼寝</div>
            </div>
        </div>

        <div class="footer-fixed">
            <div class="item-circles">
                <div class="circle-slot">1</div>
                <div class="circle-slot">2</div>
                <div class="circle-slot">3</div>
            </div>
            <button class="btn-full btn-blue" style="background:#3498db" onclick="alert('アイテム選択')">アイテム選択</button>
            <button class="btn-full" id="start-btn" style="background:#bdc3c7; color:#fff;" disabled>育成開始</button>
        </div>
    </section>

</div>

<script>
    let remainingDays = 82;
    let scheduleMode = 90;
    let currentActs = [];

    // 画面遷移
    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'schedule-screen') updateSlots(scheduleMode);
    }

    // ホーム画面：行動ボタン
    function nextDay() {
        if(remainingDays > 0) {
            remainingDays--;
            document.querySelector('.evolution-days').innerText = `あと ${remainingDays} 日`;
            alert('行動を実行しました。ステータスが変動します。');
        }
    }

    // スケジュール：スロット生成
    function updateSlots(days) {
        scheduleMode = days;
        currentActs = new Array(days).fill(null);
        const list = document.getElementById('slot-list');
        list.innerHTML = '';
        for(let i=0; i<days; i++) {
            list.innerHTML += `
                <div class="day-box">
                    <span style="width:25px; color:#999; font-size:0.8rem;">${i+1}</span>
                    <div class="slot-rect" id="slot-${i}">行動を選択</div>
                </div>
            `;
        }
        checkReady();
    }

    function addAct(name) {
        const idx = currentActs.indexOf(null);
        if(idx !== -1) {
            currentActs[idx] = name;
            const target = document.getElementById(`slot-${idx}`);
            target.innerText = name;
            target.classList.add('filled');
            checkReady();
        }
    }

    function checkReady() {
        const btn = document.getElementById('start-btn');
        const isReady = currentActs.every(a => a !== null);
        if(isReady) {
            btn.style.background = "#2ecc71";
            btn.disabled = false;
            btn.onclick = () => { alert('育成を開始します！'); showPage('home-screen'); };
        }
    }

    // 初回「育成」ボタンの代わりにダミーでスケジュール画面への動線を作るなら
    // ナビの「育成」をダブルクリックや長押し、あるいは特定の条件で切り替え
    document.querySelector('.nav-item').onclick = () => showPage('schedule-screen');
</script>

</body>
</html>
