<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #080410;
            --panel-color: rgba(25, 12, 40, 0.9);
            --border-color: #5c3a82;
            --accent-gold: #e5b05c;
            --text-color: #f0e6fa;
            --disabled-color: #221533;
            --crystal-color: #d100ff;
            --btn-bg: linear-gradient(180deg, #4b2373 0%, #1a082e 100%);
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at top, #1e0b35, #000000);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: transparent;
        }

        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-gold);
            text-align: center;
            position: relative;
        }
        
        #rank-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(229, 176, 92, 0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { 
            width: 16px; height: 16px; 
            background: var(--crystal-color); 
            border-radius: 50%; 
            box-shadow: 0 0 12px var(--crystal-color); 
            transform: rotate(45deg);
        }
        .crystal-empty { background: #1a0a25; box-shadow: inset 0 0 5px #000; }
        #crystal-timer { font-size: 0.8rem; color: #a894c2; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px; 
            overflow: hidden;
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;}
        .active { display: flex; }

        .rank-image-box {
            flex: 1 1 0; 
            min-height: 0; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(92, 58, 130, 0.4);
            cursor: pointer;
        }

        #rank-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .home-bottom-area { flex-shrink: 0; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .status-item { 
            background: rgba(30, 15, 45, 0.7); 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid rgba(92, 58, 130, 0.5);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .status-label { font-size: 0.7rem; color: #bcaed4; margin-bottom: 2px; }
        .status-value { font-size: 1rem; font-weight: bold; color: var(--accent-gold); }

        button {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: var(--disabled-color); border-color: #222; opacity: 0.5; cursor: not-allowed; }

        .reason-text { font-size: 0.75rem; color: #ff5555; display: block; margin-top: 3px; font-weight: normal; }

        #skill-detail-panel {
            background: var(--panel-color);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            margin-top: 10px;
            display: none;
        }

        footer { 
            flex-shrink: 0;
            display: flex; 
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
        }
        footer button { 
            flex: 1; 
            background: transparent; 
            border: none;
            border-right: 1px solid var(--border-color); 
            border-radius: 0;
            padding: 15px 0; 
            font-weight: bold;
            color: #d1c1e5;
        }
        footer button:last-child { border-right: none; }

        .dev-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .dev-btn { padding: 4px 8px; font-size: 0.7rem; width: auto; border-radius: 4px; border:none; cursor: pointer; }
        .btn-max { background: #ffaa00; color: #000; }
        .btn-reset { background: #cc3333; color: #fff; }

        #event-screen, #result-screen, #status-screen, #skill-screen { overflow-y: auto; }
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="dev-tools">
            <button class="dev-btn btn-max" onclick="devMaxCrystals()">[開発] クリスタルMAX</button>
            <button class="dev-btn btn-reset" onclick="devResetSave()">[開発] セーブ初期化</button>
        </div>
        <div id="rank-name">読み込み中...</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" onclick="playRankVideo()">
                <video id="rank-video" muted playsinline preload="metadata" src=""></video>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item">
                        <div class="status-label" id="display-next-req">戦闘力---で</div>
                        <div class="status-value" id="display-next-name" style="font-size: 0.9rem;">---に昇格</div>
                    </div>
                </div>
                <div class="status-item" style="margin-bottom:10px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div class="status-label" style="margin:0;">配下総数</div>
                    <div class="status-value" id="display-subordinates">0名</div>
                </div>
                <button onclick="startEvent()">イベント発生 (消費: 1)</button>
            </div>
        </div>

        <div id="event-screen" class="screen">
            <div class="event-box">
                <h3 id="event-title"></h3>
                <p id="event-text"></p>
            </div>
            <div id="choices-area" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <div id="result-screen" class="screen">
            <div class="event-box" style="flex:1;">
                <h3>結果</h3>
                <p id="result-text"></p>
                <div id="change-log" style="color:var(--crystal-color); margin-top: 15px; font-size: 0.9rem; font-weight:bold;"></div>
                <div id="skill-log" style="color:var(--accent-gold); margin-top: 5px; font-size: 0.9rem; font-weight:bold;"></div>
            </div>
            <button onclick="showScreen('home-screen')">ホームへ</button>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3>内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div id="acquired-skills-list" style="display:flex; flex-direction:column; gap:8px;"></div>
            <div id="skill-detail-panel">
                <div id="detail-skill-name"></div>
                <div id="detail-skill-bonus"></div>
                <div id="detail-skill-desc"></div>
            </div>
        </div>
    </main>

    <footer>
        <button onclick="showScreen('home-screen')">ホーム</button>
        <button onclick="showScreen('skill-screen')">スキル</button>
        <button onclick="showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
let ranks = [];
let skills = [];
let events = [];

const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感'};

let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: []
};

async function init() {
    try {
        const [ranksRes, skillsRes, eventsRes] = await Promise.all([
            fetch('ranks.json'),
            fetch('skills.json'),
            fetch('events.json')
        ]);
        ranks = await ranksRes.json();
        skills = await skillsRes.json();
        events = await eventsRes.json();

        const saved = localStorage.getItem('devil_lord_save');
        if (saved) gameState = JSON.parse(saved);

        recoverCrystals();
        updateAll();
        setInterval(updateTimer, 1000);
    } catch (error) {
        console.error("データ読み込み失敗", error);
    }
}

// 動画タップ時に音を出して再生
function playRankVideo() {
    const video = document.getElementById('rank-video');
    if (video) {
        video.muted = false; // ★ ミュートを解除して音を出す
        video.currentTime = 0; 
        video.play();
    }
}

function devMaxCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    gameState.crystals = currentRank.maxCrystals;
    gameState.lastPlayTime = Date.now();
    save();
    updateAll();
}

function devResetSave() {
    if (confirm("データをリセットしますか？")) {
        localStorage.removeItem('devil_lord_save');
        location.reload();
    }
}

function recoverCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    const msPerCrystal = 60 * 60 * 1000;
    const now = Date.now();
    const elapsed = now - gameState.lastPlayTime;
    if (elapsed >= msPerCrystal && gameState.crystals < currentRank.maxCrystals) {
        const added = Math.floor(elapsed / msPerCrystal);
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + added);
        gameState.lastPlayTime = gameState.crystals === currentRank.maxCrystals ? now : gameState.lastPlayTime + added * msPerCrystal;
        updateAll();
    }
}

function updateAll() {
    if (ranks.length === 0) return;
    const s = gameState.stats;
    const i = gameState.innerTraits;
    const subs = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    const cp = Object.values(s).reduce((a,b)=>a+b,0) + Object.values(i).reduce((a,b)=>a+b,0) + Math.max(0, subs);
    
    let currentRank = ranks.find(r => r.id === gameState.currentRankId);
    let nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    
    if (nextRank && cp >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        currentRank = ranks.find(r => r.id === gameState.currentRankId);
        nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
        alert(`昇格：${currentRank.name}`);
        if (gameState.crystals < currentRank.maxCrystals) gameState.crystals = currentRank.maxCrystals;
    }

    document.getElementById('rank-name').innerText = currentRank.name;
    const video = document.getElementById('rank-video');
    
    // 新しい階級の動画を設定。読み込み時はミュート状態にしておく
    const newSrc = currentRank.imagePath + "#t=0.001";
    if (video.src !== new URL(newSrc, document.baseURI).href) {
        video.src = newSrc;
        video.muted = true; 
    }
    
    document.getElementById('display-combat-power').innerText = cp.toLocaleString();
    if (nextRank) {
        document.getElementById('display-next-req').innerText = `戦闘力${nextRank.reqCombatPower.toLocaleString()}で`;
        document.getElementById('display-next-name').innerText = `${nextRank.name}に昇格`;
    } else {
        document.getElementById('display-next-req').innerText = `昇格条件`;
        document.getElementById('display-next-name').innerText = `最高階級（MAX）`;
    }
    document.getElementById('display-subordinates').innerText = Math.max(0, subs).toLocaleString() + "名";
    
    renderCrystalUI(currentRank);
    renderStats();
    save();
}

function renderCrystalUI(rank) {
    const area = document.getElementById('crystal-container');
    area.innerHTML = '';
    for(let i=0; i<rank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        area.appendChild(d);
    }
}

function updateTimer() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    recoverCrystals();
    if (gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const msPerCrystal = 60 * 60 * 1000;
    const remaining = msPerCrystal - (Date.now() - gameState.lastPlayTime);
    const m = Math.floor(remaining / 1000 / 60);
    const s = Math.floor((remaining / 1000) % 60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startEvent() {
    if(gameState.crystals <= 0) return alert("魔力が足りません");
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
    gameState.crystals--;
    save();
    
    const currentEvents = events.filter(e => e.minRankId <= gameState.currentRankId);
    const ev = currentEvents[Math.floor(Math.random() * currentEvents.length)];
    document.getElementById('event-title').innerText = ev.title;
    document.getElementById('event-text').innerText = ev.text;
    const area = document.getElementById('choices-area');
    area.innerHTML = '';
    ev.choices.forEach(c => {
        const b = document.createElement('button');
        b.style.textAlign = 'left';
        b.innerHTML = c.text;
        let disabled = false;
        if (c.reqCondition) {
            for (let req of c.reqCondition) {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                if (currentVal < req.value) disabled = true;
            }
        }
        if (disabled) {
            b.disabled = true;
            b.innerHTML += `<span class="reason-text">${c.disabledReason}</span>`;
        } else {
            b.onclick = () => {
                document.getElementById('result-text').innerText = c.resultText;
                document.getElementById('change-log').innerHTML = '';
                for(let k in c.statChanges) {
                    if (gameState.stats[k] !== undefined) gameState.stats[k] += c.statChanges[k];
                    else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += c.statChanges[k];
                    const sign = c.statChanges[k] > 0 ? "+" : "";
                    document.getElementById('change-log').innerHTML += `${LABELS[k]}: ${sign}${c.statChanges[k]}<br>`;
                }
                updateAll();
                showScreen('result-screen');
            };
        }
        area.appendChild(b);
    });
    showScreen('event-screen');
}

function renderStats() {
    const labels = [
        {id: 'stat-list', data: gameState.stats},
        {id: 'inner-list', data: gameState.innerTraits}
    ];
    labels.forEach(l => {
        const target = document.getElementById(l.id);
        target.innerHTML = '';
        for(let k in l.data) {
            target.innerHTML += `<div class="status-item"><div class="status-label">${LABELS[k]}</div><div class="status-value">${l.data[k]}</div></div>`;
        }
    });
}

function save() { localStorage.setItem('devil_lord_save', JSON.stringify(gameState)); }
init();
</script>
</body>
</html>
