<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #080410;
            --panel-color: rgba(25, 12, 40, 0.95);
            --border-color: #5c3a82;
            --accent-gold: #e5b05c;
            --text-color: #f0e6fa;
            --disabled-color: #221533;
            --crystal-color: #d100ff;
            --btn-bg: linear-gradient(180deg, #4b2373 0%, #1a082e 100%);
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at top, #1e0b35, #000000);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: transparent;
        }

        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-gold);
            text-align: center;
            position: relative;
        }
        
        #rank-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(229, 176, 92, 0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { 
            width: 16px; height: 16px; 
            background: var(--crystal-color); 
            border-radius: 50%; 
            box-shadow: 0 0 12px var(--crystal-color); 
            transform: rotate(45deg);
            transition: all 0.3s;
        }
        .crystal-empty { background: #1a0a25; box-shadow: inset 0 0 5px #000; transform: rotate(45deg) scale(0.8); opacity: 0.5; }
        #crystal-timer { font-size: 0.8rem; color: #a894c2; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px; 
            overflow: hidden;
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;}
        .active { display: flex; }

        .rank-image-box {
            flex: 1 1 0;
            min-height: 0; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(92, 58, 130, 0.4);
            cursor: pointer;
        }

        #rank-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .home-bottom-area { flex-shrink: 0; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .status-item { 
            background: rgba(30, 15, 45, 0.7);
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid rgba(92, 58, 130, 0.5);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .status-label { font-size: 0.7rem; color: #bcaed4; margin-bottom: 2px; }
        .status-value { font-size: 1rem; font-weight: bold; color: var(--accent-gold); }

        button {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        button:disabled, button.disabled-btn { 
            background: var(--disabled-color);
            border-color: #222; 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        button.disabled-btn:active { transform: scale(1); }

        .reason-text { font-size: 0.75rem; color: #ff5555; display: block; margin-top: 3px; font-weight: normal; }

        #skill-detail-panel {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            margin-top: 10px;
            display: none;
        }

        footer { 
            flex-shrink: 0;
            display: flex; 
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
        }
        footer button { 
            flex: 1;
            background: transparent; 
            border: none;
            border-right: 1px solid var(--border-color); 
            border-radius: 0;
            padding: 12px 0; 
            font-size: 0.85rem;
            font-weight: bold;
            color: #d1c1e5;
        }
        footer button:last-child { border-right: none; }
        footer button:disabled { background: #1a082e; color: #555; opacity: 1; }

        .dev-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .dev-btn { padding: 4px 8px; font-size: 0.7rem; width: auto; border-radius: 4px; border:none; cursor: pointer; }
        .btn-max { background: #ffaa00; color: #000; }
        .btn-reset { background: #cc3333; color: #fff; }

        #event-screen, #result-screen, #status-screen, #skill-screen, #item-screen { overflow-y: auto; }
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        
        .item-row { background: rgba(30,15,50,0.8); padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #4a2b6e; }
        .item-rarity { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px; margin-right: 6px; font-weight: bold; border: 1px solid currentColor;}
        .rarity-SS { color: #ff3333; text-shadow: 0 0 5px #ff0000; }
        .rarity-S { color: #ffdf00; }
        .rarity-A { color: #d100ff; }
        .rarity-B { color: #33aaff; }
        .rarity-C { color: #33ff33; }
        .rarity-D { color: #aaaaaa; }
        .rarity-E { color: #888888; }
        .rarity-F { color: #555555; }
        .item-use-btn { background: #4a2b6e; padding: 6px 12px; font-size: 0.8rem; width: auto; border-radius: 4px; border: 1px solid #7c4bb3; margin-top: 8px;}

        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; overflow-y: auto; padding: 5px 0; }
        .level-btn { background: #2a1540; border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 5px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .level-btn.cleared { background: #1a3320; border-color: #33cc66; color: #aaffaa; }
        .level-btn:disabled { background: #111; color: #555; border-color: #333; cursor: not-allowed; }

        /* 特訓＆バトル画面のレイアウト上書き */
        .battle-ui { display: flex; flex-direction: column; height: 100%; gap: 10px; }
        
        .battle-enemy-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px; border: 1px solid var(--border-color);
            position: relative; overflow: hidden;
        }
        .enemy-name { 
            font-size: 1.2rem; font-weight: bold; color: #ff5555; margin-bottom: 5px;
            text-shadow: 0 0 5px #ff0000; position: relative; z-index: 1;
            background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 6px;
        }
        .enemy-image { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.5);
            width: 100%; height: 100%; object-fit: contain; z-index: 0; transition: opacity 0.3s; margin: 0;
        }
        
        .hp-container { 
            width: 100%; background: #222; border-radius: 10px; border: 1px solid #555; height: 18px; overflow: hidden; margin-bottom: 5px; position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .hp-bar { height: 100%; background: linear-gradient(90deg, #228b22, #32cd32); width: 100%; transition: width 0.3s ease; }
        .hp-bar.enemy { background: linear-gradient(90deg, #8b0000, #ff4500); }
        .hp-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 0.75rem; line-height: 18px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;}

        .battle-player-area { padding: 10px; background: rgba(30, 15, 45, 0.8); border-radius: 8px; border: 1px solid var(--border-color);}
        
        .battle-log-area { 
            flex: none; height: 80px; margin-top: auto; 
            background: #000; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; color: #d1c1e5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        @keyframes shake {
            0% { transform: translate(3px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .anim-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        
        @keyframes flashRed {
            0% { background-color: rgba(255, 0, 0, 0.6); }
            100% { background-color: transparent; }
        }
        .anim-flash { animation: flashRed 0.4s ease-out; }
        
        @keyframes fadeOutDown {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(30px); }
        }
        .anim-defeat { animation: fadeOutDown 1s forwards; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="dev-tools">
            <button class="dev-btn btn-max" onclick="playSE('click'); devMaxCrystals()">[開発] クリスタルMAX</button>
            <button class="dev-btn btn-reset" onclick="playSE('click'); devResetSave()">[開発] セーブ初期化</button>
        </div>
        <div id="rank-name">読み込み中...</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
    
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" onclick="playRankVideo()">
                <video id="rank-video" muted playsinline preload="metadata" src=""></video>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item">
                        <div class="status-label" id="display-next-req">戦闘力---で</div>
                        <div class="status-value" id="display-next-name" style="font-size: 0.9rem;">---に昇格</div>
                    </div>
                </div>
                <div class="status-item" style="margin-bottom:10px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div class="status-label" style="margin:0;">配下総数</div>
                    <div class="status-value" id="display-subordinates">0名</div>
                </div>
                <button onclick="startEvent()" style="margin-bottom: 8px;">イベント発生 (消費: 1)</button>
                <button onclick="openTrainingScreen()" style="background: linear-gradient(180deg, #732323 0%, #2e0808 100%);">特訓で鍛える (消費: 1)</button>
            </div>
        </div>

        <div id="training-screen" class="screen">
            <h3>特訓レベル選択</h3>
            <p style="font-size: 0.8rem; margin-top: 0; color: #aaa;">勝利するとステータスやアイテムを獲得できます。</p>
            
            <div id="level-preview-area" style="display: flex; align-items: center; background: rgba(30,15,45,0.8); border: 1px solid var(--accent-gold); border-radius: 8px; padding: 10px; margin-bottom: 10px; min-height: 70px;">
                <div style="flex: 1;">
                    <div id="preview-level-name" style="color: var(--accent-gold); font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">レベルを選択してください</div>
                    <div id="preview-enemy-name" style="color: #ff5555; font-size: 0.9rem;">---</div>
                </div>
                <img id="preview-enemy-img" src="" alt="" style="width: 60px; height: 60px; object-fit: contain; display: none; margin: 0 10px;">
                <button id="start-training-btn" disabled style="width: auto; padding: 10px 15px; font-size: 1rem; background: linear-gradient(180deg, #732323 0%, #2e0808 100%);">挑戦</button>
            </div>

            <div id="level-list" class="level-grid" style="flex: 1; overflow-y: auto;"></div>
        </div>

        <div id="battle-screen" class="screen">
            <div class="battle-ui" id="battle-ui-area">
                <div class="battle-enemy-area">
                    <div class="enemy-name" id="battle-enemy-name">未知のモンスター</div>
            
                    <img class="enemy-image" id="battle-enemy-img" src="" alt="敵画像">
                    <div style="width: 90%; position: relative; z-index: 1;">
                        <div class="hp-container">
                            <div class="hp-bar enemy" id="battle-enemy-hp-bar" style="width: 100%;"></div>
        
                            <div class="hp-text" id="battle-enemy-hp-text">HP: ???/???</div>
                        </div>
                    </div>
                </div>
                
                <div class="battle-player-area">
                    <div style="font-weight: bold; color: var(--accent-gold); margin-bottom: 5px;">自分（魔族）</div>
                    <div class="hp-container">
                        <div class="hp-bar" id="battle-player-hp-bar" style="width: 100%;"></div>
                        <div class="hp-text" id="battle-player-hp-text">HP: 100/100</div>
                    </div>
                </div>
                
                <div class="battle-log-area" id="battle-log"></div>

                <button id="temp-end-battle-btn" style="padding: 10px; font-size: 0.9rem; display: none;">[結果を見る]</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h3>戦闘結果</h3>
            <div id="result-text" style="text-align: center; font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></div>
            <div class="event-box" id="result-log" style="font-size: 0.9rem; line-height: 1.6;"></div>
            <div id="skill-log" style="color: #e5b05c; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="item-log" style="color: #d100ff; font-weight: bold; margin-bottom: 10px;"></div>
            <button onclick="endBattle()">戻る</button>
        </div>

        <div id="event-screen" class="screen">
            <h3 id="event-title">イベント</h3>
            <div class="event-box" id="event-text" style="min-height: 100px;"></div>
            <div id="choices-area" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス詳細</h3>
            <div class="event-box" id="status-list" style="margin-bottom:0;"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>習得スキル</h3>
            <div id="skill-list" style="overflow-y:auto; flex:1;"></div>
            <div id="skill-detail-panel">
                <div style="font-weight:bold; color:var(--accent-gold); margin-bottom:10px;" id="detail-skill-name"></div>
                <div style="font-size:0.85rem; color:#d1c1e5; margin-bottom:10px;" id="detail-skill-desc"></div>
                <div style="font-size:0.85rem; color:#bcaed4;" id="detail-skill-bonus"></div>
            </div>
        </div>

        <div id="item-screen" class="screen">
            <h3>所持アイテム</h3>
            <div id="item-list" style="overflow-y:auto; flex:1;"></div>
        </div>
    </main>

    <footer>
        <button onclick="playSE('click'); showScreen('home-screen')">ホーム</button>
        <button onclick="playSE('click'); showScreen('status-screen'); checkAndRenderStatus();">ステータス</button>
        <button onclick="playSE('click'); showScreen('skill-screen'); checkAndRenderSkills();">スキル</button>
        <button onclick="playSE('click'); showScreen('item-screen'); checkAndRenderItems();">アイテム</button>
    </footer>
</div>

<script>
// 【グローバル変数と状態管理】
let gameState = {
    crystals: 0,
    lastCrystalTime: Date.now(),
    currentRankId: 1,
    stats: { physAtk: 10, physDef: 10, magAtk: 10, magDef: 10, hp: 100, luck: 10 },
    innerTraits: { ambition: 5, charisma: 5, cruelty: 5, wisdom: 5 },
    subordinates: 0,
    items: {},
    clearedLevels: [],
    acquiredSkills: []
};

let ranks = [];
let events = [];
let monsters = [];
let skills = [];
let items = [];

const LABELS = {
    physAtk: "物理攻撃", physDef: "物理防御", magAtk: "魔法攻撃", magDef: "魔法防御", hp: "体力", luck: "運",
    ambition: "野心", charisma: "カリスマ", cruelty: "冷酷", wisdom: "知恵"
};

/* 【開発ツール】 */
function devMaxCrystals() {
    const r = ranks.find(x => x.id === gameState.currentRankId);
    if(r) gameState.crystals = r.maxCrystals;
    updateAll();
}
function devResetSave() {
    if(confirm("セーブデータを初期化しますか？")) {
        localStorage.removeItem('demonLordSave');
        location.reload();
    }
}

/* 【初期化処理】 */
window.onload = async () => {
    try {
        const [rRes, eRes, mRes, sRes, iRes] = await Promise.all([
            fetch('ranks.json'), fetch('events.json'), fetch('monsters.json'), fetch('skills.json'), fetch('items.json')
        ]);
        ranks = await rRes.json();
        events = await eRes.json();
        monsters = await mRes.json();
        skills = await sRes.json();
        items = await iRes.json();

        loadGame();
        
        if (!gameState.stats.luck && gameState.stats.exercise) {
            gameState.stats.luck = gameState.stats.exercise;
            delete gameState.stats.exercise;
        }

        if (!gameState.items) gameState.items = {};
        if (!gameState.clearedLevels) gameState.clearedLevels = [];
        if (!gameState.acquiredSkills) gameState.acquiredSkills = [];
        
        recoverCrystals();
        updateAll();
        setInterval(updateTimer, 1000);
    } catch (error) {
        console.error("致命的な初期化エラー:", error);
    }
}

/* 【画面遷移・UI更新】 */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const footerBtns = document.querySelectorAll('footer button');
    if (id === 'event-screen' || id === 'battle-screen') {
        footerBtns.forEach(btn => btn.disabled = true);
    } else {
        footerBtns.forEach(btn => btn.disabled = false);
    }
}

function updateAll() {
    saveGame();
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if(!currentRank) return;

    document.getElementById('rank-name').innerText = currentRank.name;
    const rankVideo = document.getElementById('rank-video');
    if(rankVideo.src !== currentRank.videoPath && currentRank.videoPath) {
        rankVideo.src = currentRank.videoPath;
        rankVideo.play().catch(e => console.log("Auto-play prevented", e));
    }

    const cContainer = document.getElementById('crystal-container');
    cContainer.innerHTML = '';
    for(let i=0; i<currentRank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = 'crystal-icon' + (i >= gameState.crystals ? ' crystal-empty' : '');
        cContainer.appendChild(d);
    }

    const power = calculateCombatPower();
    document.getElementById('display-combat-power').innerText = power;
    document.getElementById('display-subordinates').innerText = gameState.subordinates + "名";

    const nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    if(nextRank) {
        document.getElementById('display-next-req').innerText = `戦闘力 ${nextRank.reqCombatPower} 以上で`;
        document.getElementById('display-next-name').innerText = `${nextRank.name} に昇格`;
        if(power >= nextRank.reqCombatPower) {
            gameState.currentRankId = nextRank.id;
            playSE('rankup');
            updateAll();
        }
    } else {
        document.getElementById('display-next-req').innerText = "現在の階級:";
        document.getElementById('display-next-name').innerText = "最高位";
    }
}

function calculateCombatPower() {
    let s = gameState.stats;
    return Math.floor((s.physAtk + s.physDef + s.magAtk + s.magDef + s.hp + s.luck) * 1.5 + (gameState.subordinates * 0.1));
}

function recoverCrystals() {
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if(!currentRank) return;
    const now = Date.now();
    const elapsed = Math.floor((now - gameState.lastCrystalTime) / 1000);
    const recoverCount = Math.floor(elapsed / currentRank.crystalRecoverSeconds);
    if (recoverCount > 0) {
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + recoverCount);
        gameState.lastCrystalTime += recoverCount * currentRank.crystalRecoverSeconds * 1000;
        updateAll();
    }
}

function updateTimer() {
    recoverCrystals();
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if(!currentRank || gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const now = Date.now();
    const rem = currentRank.crystalRecoverSeconds * 1000 - (now - gameState.lastCrystalTime);
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem / 1000) % 60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function playRankVideo() {
    const v = document.getElementById('rank-video');
    v.currentTime = 0;
    v.play();
}

/* 【特訓とバトル関連】 */
function openTrainingScreen() {
    playSE('click');
    showScreen('training-screen');
    renderLevelGrid();
}

function renderLevelGrid() {
    const list = document.getElementById('level-list');
    list.innerHTML = '';
    
    document.getElementById('preview-level-name').innerText = 'レベルを選択してください';
    document.getElementById('preview-enemy-name').innerText = '---';
    document.getElementById('preview-enemy-img').style.display = 'none';
    document.getElementById('start-training-btn').disabled = true;

    for (let i = 1; i <= 100; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.innerText = `Lv.${i}`;
        
        if (gameState.clearedLevels && gameState.clearedLevels.includes(i)) {
            btn.classList.add('cleared');
        }
        
        const monsterExists = monsters.some(m => m.level === i);
        if (!monsterExists) {
            btn.disabled = true;
        }

        btn.onclick = () => selectTrainingLevel(i, btn);
        list.appendChild(btn);
    }
}

function selectTrainingLevel(level, btnElement) {
    playSE('click'); 
    
    document.querySelectorAll('.level-btn').forEach(b => b.style.boxShadow = 'none');
    if (btnElement) {
        btnElement.style.boxShadow = '0 0 8px 2px var(--accent-gold)';
    }

    const monster = monsters.find(m => m.level === level);
    
    const previewLevelName = document.getElementById('preview-level-name');
    const previewEnemyName = document.getElementById('preview-enemy-name');
    const previewEnemyImg = document.getElementById('preview-enemy-img');
    const startBtn = document.getElementById('start-training-btn');

    previewLevelName.innerText = `Lv.${level} の特訓`;
    
    if (monster) {
        previewEnemyName.innerText = monster.name;
        previewEnemyImg.src = monster.image || ''; 
        previewEnemyImg.style.display = 'block';
        startBtn.disabled = false;
        
        startBtn.onclick = () => {
            if(gameState.crystals <= 0) {
                playSE('error');
                alert("魔力が足りません");
                return;
            }
            gameState.crystals--;
            updateAll();
            playSE('click');
            startBattle(level);
        };
    } else {
        previewEnemyName.innerText = '未知のモンスター（未実装）';
        previewEnemyImg.style.display = 'none';
        startBtn.disabled = true;
    }
}

let battleState = {};

async function startBattle(level) {
    showScreen('battle-screen');
    const monster = monsters.find(m => m.level === level);
    battleState = {
        monster: monster,
        playerHp: gameState.stats.hp,
        playerMaxHp: gameState.stats.hp,
        enemyHp: monster.stats.hp,
        enemyMaxHp: monster.stats.hp,
        turn: 1,
        log: []
    };
    
    document.getElementById('battle-enemy-name').innerText = monster.name;
    document.getElementById('battle-enemy-img').src = monster.image || '';
    document.getElementById('battle-player-hp-text').innerText = `HP: ${battleState.playerHp}/${battleState.playerMaxHp}`;
    document.getElementById('battle-enemy-hp-text').innerText = `HP: ${battleState.enemyHp}/${battleState.enemyMaxHp}`;
    updateHpBar('player', 100);
    updateHpBar('enemy', 100);
    document.getElementById('battle-log').innerHTML = `<p>${monster.name} が現れた！</p>`;
    document.getElementById('temp-end-battle-btn').style.display = 'none';

    await wait(1000);
    battleLoop();
}

async function battleLoop() {
    while (battleState.playerHp > 0 && battleState.enemyHp > 0) {
        await executeAttack(true);
        if (battleState.enemyHp <= 0) break;
        await wait(800);
        
        await executeAttack(false);
        if (battleState.playerHp <= 0) break;
        await wait(800);
        
        battleState.turn++;
    }
    
    await wait(1000);
    finishBattle(battleState.playerHp > 0);
}

async function executeAttack(isPlayer) {
    const monster = battleState.monster;
    let attackerName = isPlayer ? "自分" : monster.name;
    let defenderName = isPlayer ? monster.name : "自分";
    
    let pAtk = isPlayer ? Math.max(gameState.stats.physAtk, gameState.stats.magAtk) : Math.max(monster.stats.physAtk, monster.stats.magAtk);
    let isMag = isPlayer ? gameState.stats.magAtk > gameState.stats.physAtk : monster.stats.magAtk > monster.stats.physAtk;
    let def = isPlayer ? 
        (isMag ? monster.stats.magDef : monster.stats.physDef) : 
        (isMag ? gameState.stats.magDef : gameState.stats.physDef);
        
    let damage = Math.max(1, Math.floor(pAtk - (def / 2)));
    
    let luck = isPlayer ? gameState.stats.luck : monster.stats.luck;
    let isCrit = Math.random() < (luck * 0.01);
    
    if (isPlayer && monster.weaknessSkills && Array.isArray(monster.weaknessSkills)) {
        let hasWeakness = gameState.acquiredSkills.some(sid => monster.weaknessSkills.includes(sid));
        if(hasWeakness) {
            damage = Math.floor(damage * 1.5);
            isCrit = true; 
        }
    }
    
    if(isCrit) damage = Math.floor(damage * 1.5);
    damage = Math.floor(damage * (0.8 + Math.random() * 0.4));

    addLog(`${attackerName}の攻撃！`);
    playSE('attack');
    
    if(!isPlayer) {
        document.getElementById('battle-ui-area').classList.add('anim-shake', 'anim-flash');
        setTimeout(() => document.getElementById('battle-ui-area').classList.remove('anim-shake', 'anim-flash'), 400);
    } else {
        document.getElementById('battle-enemy-img').classList.add('anim-shake');
        setTimeout(() => document.getElementById('battle-enemy-img').classList.remove('anim-shake'), 400);
    }

    await wait(400);
    
    if(isCrit) addLog(`<span style="color:#ffaa00;">クリティカル！</span>`);
    addLog(`${defenderName}に ${damage} のダメージ！`);
    
    if(isPlayer) {
        battleState.enemyHp = Math.max(0, battleState.enemyHp - damage);
        updateHpBar('enemy', (battleState.enemyHp / battleState.enemyMaxHp) * 100);
        document.getElementById('battle-enemy-hp-text').innerText = `HP: ${battleState.enemyHp}/${battleState.enemyMaxHp}`;
    } else {
        battleState.playerHp = Math.max(0, battleState.playerHp - damage);
        updateHpBar('player', (battleState.playerHp / battleState.playerMaxHp) * 100);
        document.getElementById('battle-player-hp-text').innerText = `HP: ${battleState.playerHp}/${battleState.playerMaxHp}`;
    }
}

function updateHpBar(target, percent) {
    document.getElementById(`battle-${target}-hp-bar`).style.width = `${percent}%`;
}

function addLog(msg) {
    const logArea = document.getElementById('battle-log');
    logArea.innerHTML += `<div>${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
}

function finishBattle(isWin) {
    const monster = battleState.monster;
    const resText = document.getElementById('result-text');
    let changeLog = "";
    
    document.getElementById('skill-log').innerHTML = "";
    document.getElementById('item-log').innerHTML = "";

    let skilledUp = false;
    let prevSkillCount = gameState.acquiredSkills.length;
    let itemDropped = false;
    let droppedItemNames = [];

    if (isWin) {
        resText.innerText = "勝利！";
        resText.style.color = "#33cc66";
        playSE('win');
        
        if (!gameState.clearedLevels.includes(monster.level)) {
            gameState.clearedLevels.push(monster.level);
        }
        
        if (monster.winStatsReward) {
            for(let k in monster.winStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.winStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.winStatsReward[k];
                changeLog += `${LABELS[k] || k}: +${monster.winStatsReward[k]}<br>`;
            }
        }
        
        if (monster.bonusProbability && Math.random() < monster.bonusProbability && monster.bonusStatsReward) {
            for(let k in monster.bonusStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.bonusStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.bonusStatsReward[k];
                changeLog += `<span style="color:#ffaa00;">[ボーナス]</span> ${LABELS[k] || k}: +${monster.bonusStatsReward[k]}<br>`;
            }
        }

        if (monster.dropItems && Array.isArray(monster.dropItems)) {
            monster.dropItems.forEach(drop => {
                if (Math.random() <= drop.rate) {
                    itemDropped = true;
                    if (!gameState.items[drop.id]) gameState.items[drop.id] = 0;
                    gameState.items[drop.id]++;
                    const itemData = items.find(i => i.id === drop.id);
                    if(itemData) droppedItemNames.push(itemData.name);
                }
            });
        }

    } else {
        resText.innerText = "敗北...";
        resText.style.color = "#cc3333";
        playSE('lose');
        
        if (monster.loseStatsReward) {
            for(let k in monster.loseStatsReward) {
                if (gameState.stats[k] !== undefined) gameState.stats[k] += monster.loseStatsReward[k];
                else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += monster.loseStatsReward[k];
                changeLog += `${LABELS[k] || k}: ${monster.loseStatsReward[k]}<br>`;
            }
        }
    }
    
    document.getElementById('result-log').innerHTML = changeLog || "能力の変動はありませんでした。";
    
    skills.forEach(skill => {
        if (!gameState.acquiredSkills.includes(skill.id)) {
            let canAcquire = true;
            for(let req in skill.requirements) {
                if(req === 'levelCleared') {
                    if(!gameState.clearedLevels.includes(skill.requirements[req])) canAcquire = false;
                } else if(gameState.stats[req] !== undefined) {
                    if(gameState.stats[req] < skill.requirements[req]) canAcquire = false;
                } else if(gameState.innerTraits[req] !== undefined) {
                    if(gameState.innerTraits[req] < skill.requirements[req]) canAcquire = false;
                }
            }
            if (canAcquire) {
                gameState.acquiredSkills.push(skill.id);
                skilledUp = true;
                if(skill.bonus) {
                    for(let k in skill.bonus) {
                        if (gameState.stats[k] !== undefined) gameState.stats[k] += skill.bonus[k];
                        else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += skill.bonus[k];
                    }
                }
            }
        }
    });

    if (skilledUp) {
        const newSkills = gameState.acquiredSkills.slice(prevSkillCount);
        newSkills.forEach(id => {
            const s = skills.find(sk => sk.id === id);
            if (s) {
                document.getElementById('skill-log').innerHTML += `★ スキル【${s.name}】を新しく習得！<br>`;
                playSE('skill');
            }
        });
    }

    if (itemDropped && droppedItemNames.length > 0) {
        document.getElementById('item-log').innerHTML = `🎁 ドロップ: ${droppedItemNames.join(', ')}`;
    }

    showScreen('result-screen');
    updateAll();
}

function endBattle() {
    playSE('click');
    showScreen('training-screen');
    renderLevelGrid(); 
}

/* 【イベントシステム】 */
function startEvent() {
    if(gameState.crystals <= 0) {
        playSE('error');
        return alert("魔力が足りません");
    }
    gameState.crystals--;
    updateAll();

    const currentEvents = events.filter(e => e && e.minRankId <= gameState.currentRankId);
    if (!currentEvents || currentEvents.length === 0) {
        return alert("発生可能なイベントがありません。");
    }
    const ev = currentEvents[Math.floor(Math.random() * currentEvents.length)];
    
    document.getElementById('event-title').innerText = ev.title || "イベント";
    document.getElementById('event-text').innerText = ev.text || "";
    const area = document.getElementById('choices-area');
    area.innerHTML = '';

    if (Array.isArray(ev.choices)) {
        ev.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.innerText = c.label;
            
            let canChoose = true;
            let reason = "";
            if (c.requirements) {
                for(let req in c.requirements) {
                    if(gameState.stats[req] !== undefined && gameState.stats[req] < c.requirements[req]) { canChoose = false; reason = `${LABELS[req]}不足`; }
                    else if(gameState.innerTraits[req] !== undefined && gameState.innerTraits[req] < c.requirements[req]) { canChoose = false; reason = `${LABELS[req]}不足`; }
                    else if(req === 'subordinates' && gameState.subordinates < c.requirements[req]) { canChoose = false; reason = `配下不足`; }
                }
            }

            if(!canChoose) {
                btn.classList.add('disabled-btn');
                btn.innerHTML += `<span class="reason-text">(${reason})</span>`;
            } else {
                btn.onclick = () => {
                    playSE('click');
                    applyEventResult(c.results);
                };
            }
            area.appendChild(btn);
        });
    }
    showScreen('event-screen');
}

function applyEventResult(results) {
    if(results) {
        for(let k in results) {
            if(k === 'subordinates') gameState.subordinates += results[k];
            else if(gameState.stats[k] !== undefined) gameState.stats[k] += results[k];
            else if(gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += results[k];
        }
    }
    updateAll();
    alert("行動を完了しました。");
    showScreen('home-screen');
}

/* 【ステータス・スキル・アイテム画面】 */
function checkAndRenderStatus() {
    const list = document.getElementById('status-list');
    list.innerHTML = '';
    
    let html = `<div style="color:var(--accent-gold); font-weight:bold; margin-bottom:10px;">【基本ステータス】</div>`;
    for(let k in gameState.stats) {
        html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding:5px 0;"><span>${LABELS[k] || k}</span><span>${gameState.stats[k]}</span></div>`;
    }
    html += `<div style="color:var(--accent-gold); font-weight:bold; margin:15px 0 10px 0;">【内面特性】</div>`;
    for(let k in gameState.innerTraits) {
        html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding:5px 0;"><span>${LABELS[k] || k}</span><span>${gameState.innerTraits[k]}</span></div>`;
    }
    list.innerHTML = html;
}

function checkAndRenderSkills() {
    const list = document.getElementById('skill-list');
    list.innerHTML = '';
    document.getElementById('skill-detail-panel').style.display = 'none';

    if (gameState.acquiredSkills.length === 0) {
        list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">まだスキルを習得していません。</div>';
        return;
    }
    
    gameState.acquiredSkills.forEach(skillId => {
        const skill = skills.find(s => s.id === skillId);
        if (skill) {
            const btn = document.createElement('button');
            btn.style.textAlign = 'left';
            btn.style.padding = '12px';
            btn.style.background = 'rgba(40,20,60,0.8)';
            btn.style.marginBottom = '5px';
            btn.innerText = `♦ ${skill.name}`;
            btn.onclick = () => {
                playSE('click');
                document.getElementById('skill-detail-panel').style.display = 'block';
                document.getElementById('detail-skill-name').innerText = skill.name;
                document.getElementById('detail-skill-desc').innerText = skill.description || "";
                
                const bonusText = Object.entries(skill.bonus || {}).map(([k, v]) => `${LABELS[k] || k}+${v}`).join(', ');
                document.getElementById('detail-skill-bonus').innerText = bonusText ? `効果: ${bonusText}` : "効果: なし";
            };
            list.appendChild(btn);
        }
    });
}

function checkAndRenderItems() {
    const list = document.getElementById('item-list');
    list.innerHTML = '';
    
    let hasItem = false;
    for(let id in gameState.items) {
        if (gameState.items[id] > 0) {
            hasItem = true;
            const itemData = items.find(i => i.id == id);
            if (itemData) {
                let effectsText = Object.entries(itemData.effects || {}).map(([k, v]) => {
                    if (k === 'crystals') return `魔力回復 +${v}`;
                    return `${LABELS[k] || k} +${v}`;
                }).join(', ');
                
                list.innerHTML += `
                    <div class="item-row">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:bold; color:var(--accent-gold);"><span class="item-rarity rarity-${itemData.rarity}">${itemData.rarity}</span> ${itemData.name}</div>
                            <div style="font-size:0.9rem;">所持数: ${gameState.items[id]}</div>
                        </div>
                        <div style="font-size:0.8rem; color:#aaa; margin-top:6px; line-height:1.4;">${itemData.description}</div>
                        <div style="font-size:0.8rem; color:var(--crystal-color); font-weight:bold; margin-top:4px;">【効果】 ${effectsText}</div>
                        <button class="item-use-btn" onclick="useItem(${itemData.id})">使う</button>
                    </div>`;
            }
        }
    }
    
    if (!hasItem) { list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">アイテムを所持していません。</div>'; }
}

function useItem(itemId) {
    if (!gameState.items[itemId] || gameState.items[itemId] <= 0) return;
    const itemData = items.find(i => i.id == itemId);
    if (!itemData || !itemData.effects) return;

    playSE('use_item');
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);

    for (let k in itemData.effects) {
        if (k === 'crystals') {
            gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + itemData.effects[k]);
        } else if (gameState.stats[k] !== undefined) {
            gameState.stats[k] += itemData.effects[k];
        } else if (gameState.innerTraits[k] !== undefined) {
            gameState.innerTraits[k] += itemData.effects[k];
        }
    }

    gameState.items[itemId]--;
    updateAll();
    checkAndRenderItems();
    alert(`${itemData.name} を使用しました。`);
}

/* 【ユーティリティ関数（効果音など）】 */
function saveGame() {
    localStorage.setItem('demonLordSave', JSON.stringify(gameState));
}
function loadGame() {
    const s = localStorage.getItem('demonLordSave');
    if (s) {
        try {
            gameState = JSON.parse(s);
        } catch(e) {
            console.error("セーブデータ破損", e);
        }
    }
}
function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration, vol, delay) {
    setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }, delay * 1000);
}

function playSE(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    switch(type) {
        case 'click': playTone(800, 'sine', 0.1, 0.1, 0); break;
        case 'attack': playTone(150, 'square', 0.1, 0.2, 0); playTone(100, 'sawtooth', 0.2, 0.2, 0.05); break;
        case 'win': playTone(440, 'square', 0.1, 0.1, 0); playTone(554.37, 'square', 0.1, 0.1, 0.1); playTone(659.25, 'square', 0.3, 0.1, 0.2); break;
        case 'lose': playTone(300, 'sawtooth', 0.4, 0.2, 0); playTone(250, 'sawtooth', 0.4, 0.2, 0.2); playTone(200, 'sawtooth', 0.6, 0.2, 0.4); break;
        case 'rankup': playTone(523.25, 'sine', 0.2, 0.1, 0); playTone(659.25, 'sine', 0.2, 0.1, 0.1); playTone(783.99, 'sine', 0.2, 0.1, 0.2); playTone(1046.50, 'sine', 0.4, 0.1, 0.3); break;
        case 'error': playTone(200, 'square', 0.2, 0.1, 0); playTone(150, 'square', 0.3, 0.1, 0.1); break;
        case 'skill': playTone(880, 'square', 0.2, 0.03, 0); playTone(1108.73, 'square', 0.2, 0.03, 0.1); playTone(1318.51, 'square', 0.2, 0.03, 0.2); playTone(1760, 'square', 0.6, 0.03, 0.3); break;
        case 'use_item': playTone(600, 'sine', 0.4, 0.05, 0); playTone(800, 'triangle', 0.3, 0.03, 0.1); break;
    }
}
