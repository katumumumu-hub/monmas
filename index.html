<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - ショップ拡張版</title>
    <style>
        :root {
            --bg-sky: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            --panel-bg: rgba(0, 0, 0, 0.4);
            --accent-yellow: #ffeaa7;
            --accent-blue: #0984e3;
        }

        body { font-family: sans-serif; margin: 0; background: #222; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: var(--bg-sky); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        section { display: none; width: 100%; height: 100%; flex-direction: column; }
        section.active { display: flex; }

        .header-info { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: rgba(0,0,0,0.2); }
        .info-slot { background: var(--panel-bg); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; color: white; display: flex; justify-content: space-between; }
        .info-label { color: var(--accent-yellow); font-weight: bold; }

        .monster-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #monster-image-container { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        #monster-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        #status-board { 
            background: var(--panel-bg); border-radius: 10px; padding: 12px; width: 85%; color: white; font-size: 0.8rem; display: none; 
        }
        .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .status-label { width: 40px; font-weight: bold; }
        .status-bar-bg { flex: 1; background: #333; height: 10px; margin: 0 10px; border-radius: 5px; overflow: hidden; }
        .status-bar-fill { background: #55efc4; height: 100%; width: 0%; transition: width 0.5s; }
        .status-val { width: 25px; text-align: right; }

        /* ショップリスト拡張 */
        #shop-item-list { flex: 1; overflow-y: auto; padding: 15px; }
        .shop-item-card { background: white; margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; color: #333; }
        .item-type-badge { font-size: 0.6rem; color: #0984e3; font-weight: bold; margin-bottom: 2px; }

        .bottom-nav { height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 15px 15px 0 0; }
        .nav-button { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; color: #95a5a6; cursor: pointer; border: none; background: none; }
        .nav-button.active { color: var(--accent-blue); font-weight: bold; }
        .nav-icon { font-size: 1.5rem; }

        .btn-buy { background: var(--accent-blue); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="home-screen" class="active">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">PLAYER:</span><span>ケンジ</span></div>
            <div class="info-slot"><span class="info-label">MONEY:</span><span class="money-display">1500 G</span></div>
        </header>
        <div class="monster-display">
            <div id="monster-image-container">
                <div style="font-size: 4rem; opacity: 0.3;">🌱</div>
            </div>
            <div id="monster-name-display" style="font-weight:bold; color:white; margin-bottom:15px; font-size:1.2rem;">ショップでタネを選ぼう</div>
            
            <div id="status-board">
                <div class="status-row"><span class="status-label">HP</span><div class="status-bar-bg"><div id="hp-bar" class="status-bar-fill"></div></div><span id="hp-val" class="status-val">0</span></div>
                <div class="status-row"><span class="status-label">STR</span><div class="status-bar-bg"><div id="str-bar" class="status-bar-fill"></div></div><span id="str-val" class="status-val">0</span></div>
                <div class="status-row"><span class="status-label">MAG</span><div class="status-bar-bg"><div id="mag-bar" class="status-bar-fill"></div></div><span id="mag-val" class="status-val">0</span></div>
                <div class="status-row"><span class="status-label">DEF</span><div class="status-bar-bg"><div id="def-bar" class="status-bar-fill"></div></div><span id="def-val" class="status-val">0</span></div>
                <div class="status-row"><span class="status-label">SPD</span><div class="status-bar-bg"><div id="spd-bar" class="status-bar-fill"></div></div><span id="spd-val" class="status-val">0</span></div>
            </div>
        </div>
        <div class="bottom-nav">
            <button class="nav-button active" onclick="showPage('home-screen')"><span class="nav-icon">🥚</span><span>育成</span></button>
            <button class="nav-button" onclick="showPage('shop-screen')"><span class="nav-icon">🛒</span><span>ショップ</span></button>
            <button class="nav-button"><span class="nav-icon">🎒</span><span>持ち物</span></button>
        </div>
    </section>

    <section id="shop-screen">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">MONEY:</span><span class="money-display">1500 G</span></div>
            <button onclick="showPage('home-screen')" style="color:white; background:none; border:none; cursor:pointer; font-weight:bold;">✖ 戻る</button>
        </header>
        <div id="shop-item-list">データ読み込み中...</div>
    </section>
</div>

<script>
    // モンスターデータ（画像とステータス）
    const monsterMaster = {
        "ドロモン（最低ランク）": {
            image: "https://raw.githubusercontent.com/katumumumu-hub/monmas/main/images/doromon.png",
            stats: { hp: 10, str: 5, mag: 5, def: 5, spd: 5 }
        }
    };

    let gameState = {
        money: 1500,
        currentMonster: null,
        inventory: [] // アイテム保存用
    };

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'shop-screen') fetchShopData();
    }

    async function fetchShopData() {
        const url = "https://raw.githubusercontent.com/katumumumu-hub/monmas/main/shop.json";
        const container = document.getElementById('shop-item-list');
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // 3つのカテゴリをまとめてリスト化
            const allItems = [
                ...data.shop_data.tanemon_list.map(i => ({...i, type: 'monster'})),
                ...data.shop_data.consumable_items.map(i => ({...i, type: 'item'})),
                ...data.shop_data.equipment_items.map(i => ({...i, type: 'equipment'}))
            ];
            
            renderShop(allItems);
        } catch (e) {
            container.innerHTML = "<p style='color:white; text-align:center;'>通信失敗</p>";
        }
    }

    function renderShop(items) {
        const container = document.getElementById('shop-item-list');
        container.innerHTML = '';
        
        items.forEach(item => {
            const typeLabel = item.type === 'monster' ? '【タネモン】' : (item.type === 'item' ? '【消耗品】' : '【設備】');
            const card = document.createElement('div');
            card.className = "shop-item-card";
            card.innerHTML = `
                <div style="flex:1">
                    <div class="item-type-badge">${typeLabel}</div>
                    <div style="font-weight:bold">${item.name}</div>
                    <div style="font-size:0.7rem; color:#666">${item.description}</div>
                    <div style="color:#e67e22; font-weight:bold">💰 ${item.price} G</div>
                </div>
                <button class="btn-buy" onclick="buyItem('${item.name}', ${item.price}, '${item.type}')">購入</button>
            `;
            container.appendChild(card);
        });
    }

    function buyItem(name, price, type) {
        // 所持金チェック
        if (gameState.money < price) {
            alert("お金が足りません！");
            return;
        }

        // モンスターのみの重複購入チェック
        if (type === 'monster' && gameState.currentMonster !== null) {
            alert("すでに別のタネモンを育成中です！");
            return;
        }

        // 購入確定処理
        gameState.money -= price;

        if (type === 'monster') {
            gameState.currentMonster = name;
            alert(name + " の育成を開始します！");
            updateUI();
            showPage('home-screen'); // モンスター購入時はホームへ
        } else {
            gameState.inventory.push(name);
            alert(name + " を購入して持ち物に追加しました。");
            updateUI();
        }
    }

    function updateUI() {
        document.querySelectorAll('.money-display').forEach(el => el.innerText = gameState.money + " G");
        
        if (gameState.currentMonster) {
            const data = monsterMaster[gameState.currentMonster];
            if (data) {
                document.getElementById('monster-image-container').innerHTML = `<img src="${data.image}">`;
                document.getElementById('monster-name-display').innerText = gameState.currentMonster;
                document.getElementById('status-board').style.display = 'block';
                
                for (let key in data.stats) {
                    const val = data.stats[key];
                    document.getElementById(`${key}-val`).innerText = val;
                    document.getElementById(`${key}-bar`).style.width = (val * 10) + "%";
                }
            }
        }
    }

    updateUI();
</script>
</body>
</html>
