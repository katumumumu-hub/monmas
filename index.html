<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #e94560;
            --text-color: #ffffff;
            --disabled-color: #444;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-color);
            text-align: center;
            position: relative;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { width: 18px; height: 18px; background: #0f8; border-radius: 50%; box-shadow: 0 0 8px #0f8; }
        .crystal-empty { background: #333; box-shadow: none; }
        #crystal-timer { font-size: 0.8rem; color: #aaa; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px; 
            overflow: hidden;
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;}
        .active { display: flex; }

        .rank-image-box {
            flex: 1 1 0; 
            min-height: 0; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
        }

        #rank-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .home-bottom-area { flex-shrink: 0; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; display: flex; flex-direction: column; justify-content: center;}
        .status-label { font-size: 0.7rem; color: #aaa; }
        .status-value { font-size: 1rem; font-weight: bold; }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        button:disabled { background: var(--disabled-color); cursor: not-allowed; opacity: 0.6; }

        .reason-text { font-size: 0.75rem; color: #ff8888; display: block; margin-top: 3px; font-weight: normal; }

        #skill-detail-panel {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            margin-top: 10px;
            display: none;
        }

        footer { 
            flex-shrink: 0;
            display: flex; 
            background: var(--panel-color); 
            border-top: 1px solid #333; 
        }
        footer button { flex: 1; background: transparent; border-right: 1px solid #333; padding: 12px; font-weight: normal; }

        .dev-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .dev-btn { padding: 4px 8px; font-size: 0.7rem; width: auto; border-radius: 4px; cursor: pointer; }
        .btn-max { background: #ffaa00; color: #000; }
        .btn-reset { background: #cc3333; color: #fff; }

        #event-screen, #result-screen, #status-screen, #skill-screen {
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="dev-tools">
            <button class="dev-btn btn-max" onclick="devMaxCrystals()">[開発] クリスタルMAX</button>
            <button class="dev-btn btn-reset" onclick="devResetSave()">[開発] セーブ初期化</button>
        </div>
        
        <div id="rank-name">読み込み中...</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" onclick="playRankVideo()">
                <video id="rank-video" muted playsinline preload="metadata" src=""></video>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    
                    <div class="status-item">
                        <div class="status-label" id="display-next-req" style="font-size: 0.75rem;">戦闘力---で</div>
                        <div class="status-value" id="display-next-name" style="font-size: 0.95rem;">---に昇格</div>
                    </div>
                </div>
                <div class="status-item" style="margin-bottom:10px;"><div class="status-label">配下</div><div class="status-value" id="display-subordinates">0名</div></div>
                <button onclick="startEvent()">イベント発生 (消費: 1)</button>
            </div>
        </div>

        <div id="event-screen" class="screen">
            <div style="background: var(--panel-color); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <h3 id="event-title" style="margin-top:0;"></h3>
                <p id="event-text"></p>
            </div>
            <div id="choices-area" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <div id="result-screen" class="screen">
            <div style="background: var(--panel-color); padding: 15px; border-radius: 8px; margin-bottom: 15px; flex:1;">
                <h3 style="margin-top:0;">結果</h3>
                <p id="result-text"></p>
                <div id="change-log" style="color:#0f8; margin-top: 15px; font-size: 0.9rem;"></div>
                <div id="skill-log" style="color:#fa0; margin-top: 5px; font-size: 0.9rem;"></div>
            </div>
            <button onclick="showScreen('home-screen')">ホームへ戻る</button>
        </div>

        <div id="status-screen" class="screen">
            <h3 style="margin-top:0;">ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3 style="margin-top:15px;">内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3 style="margin-top:0;">取得済みスキル</h3>
            <div id="acquired-skills-list"></div>
            <div id="skill-detail-panel">
                <div id="detail-skill-name" style="font-weight:bold;"></div>
                <div id="detail-skill-bonus" style="color:#0f8; font-size:0.8rem; margin: 5px 0;"></div>
                <div id="detail-skill-desc" style="font-size:0.8rem;"></div>
            </div>
        </div>
    </main>

    <footer>
        <button onclick="showScreen('home-screen')">戻る</button>
        <button onclick="showScreen('skill-screen')">スキル</button>
        <button onclick="showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
let ranks = [];
let skills = [];
let events = [];

const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感'};

let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: []
};

async function init() {
    try {
        const [ranksRes, skillsRes, eventsRes] = await Promise.all([
            fetch('ranks.json'),
            fetch('skills.json'),
            fetch('events.json')
        ]);
        ranks = await ranksRes.json();
        skills = await skillsRes.json();
        events = await eventsRes.json();

        const saved = localStorage.getItem('devil_lord_save');
        if (saved) gameState = JSON.parse(saved);

        recoverCrystals();
        updateAll();
        setInterval(updateTimer, 1000);

    } catch (error) {
        console.error("データの読み込みに失敗しました:", error);
        alert("データの読み込みに失敗しました。各JSONファイルを確認してください。");
    }
}

function playRankVideo() {
    const video = document.getElementById('rank-video');
    if (video) {
        video.currentTime = 0; 
        video.play();
    }
}

function devMaxCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    gameState.crystals = currentRank.maxCrystals;
    gameState.lastPlayTime = Date.now();
    save();
    updateAll();
    updateTimer();
}

function devResetSave() {
    if (confirm("セーブデータを初期化して最初からやり直しますか？")) {
        localStorage.removeItem('devil_lord_save');
        gameState = {
            lastPlayTime: Date.now(),
            crystals: ranks.length > 0 ? ranks[0].maxCrystals : 3,
            currentRankId: 1,
            stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
            innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
            acquiredSkills: []
        };
        save();
        updateAll();
        updateTimer();
        alert("データをリセットしました！");
    }
}

function recoverCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (!currentRank || gameState.crystals >= currentRank.maxCrystals) return;

    const msPerCrystal = 60 * 60 * 1000;
    const now = Date.now();
    const elapsed = now - gameState.lastPlayTime;

    if (elapsed >= msPerCrystal) {
        const addedCrystals = Math.floor(elapsed / msPerCrystal);
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + addedCrystals);
        if (gameState.crystals === currentRank.maxCrystals) {
            gameState.lastPlayTime = now;
        } else {
            gameState.lastPlayTime += addedCrystals * msPerCrystal;
        }
        updateAll();
    }
}

function updateAll() {
    if (ranks.length === 0) return;

    const s = gameState.stats;
    const i = gameState.innerTraits;
    const subs = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    const cp = Object.values(s).reduce((a,b)=>a+b,0) + Object.values(i).reduce((a,b)=>a+b,0) + Math.max(0, subs);
    
    let currentRank = ranks.find(r => r.id === gameState.currentRankId);
    let nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    
    if (nextRank && cp >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        currentRank = ranks.find(r => r.id === gameState.currentRankId);
        nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
        alert(`階級が【${currentRank.name}】に昇格しました！`);
        if (gameState.crystals < currentRank.maxCrystals) gameState.crystals = currentRank.maxCrystals;
    }

    document.getElementById('rank-name').innerText = currentRank.name;
    
    // ★ 動画のパスの最後に `#t=0.001` を付けて、最初のフレームを強制的に表示させる（スマホ真っ暗対策）
    document.getElementById('rank-video').src = currentRank.imagePath + "#t=0.001";
    
    document.getElementById('display-combat-power').innerText = cp.toLocaleString();
    
    if (nextRank) {
        document.getElementById('display-next-req').innerText = `戦闘力${nextRank.reqCombatPower.toLocaleString()}で`;
        document.getElementById('display-next-name').innerText = `${nextRank.name}に昇格`;
    } else {
        document.getElementById('display-next-req').innerText = `昇格条件`;
        document.getElementById('display-next-name').innerText = `最高階級（MAX）`;
    }

    document.getElementById('display-subordinates').innerText = Math.max(0, subs).toLocaleString() + "名";
    
    renderCrystalUI(currentRank);
    renderStats();
    save();
}

function renderCrystalUI(rank) {
    const area = document.getElementById('crystal-container');
    area.innerHTML = '';
    for(let i=0; i<rank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        area.appendChild(d);
    }
}

function updateTimer() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    recoverCrystals();
    if (gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const msPerCrystal = 60 * 60 * 1000;
    const now = Date.now();
    const elapsed = now - gameState.lastPlayTime;
    const remaining = msPerCrystal - elapsed;
    const m = Math.floor(remaining / 1000 / 60);
    const s = Math.floor((remaining / 1000) % 60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startEvent() {
    if(gameState.crystals <= 0) return alert("クリスタルが足りません");
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
    gameState.crystals--;
    save();
    updateTimer(); 
    const currentEvents = events.filter(e => e.minRankId <= gameState.currentRankId);
    const ev = currentEvents[Math.floor(Math.random() * currentEvents.length)];
    document.getElementById('event-title').innerText = ev.title;
    document.getElementById('event-text').innerText = ev.text;
    const area = document.getElementById('choices-area');
    area.innerHTML = '';
    ev.choices.forEach(c => {
        const b = document.createElement('button');
        b.style.textAlign = 'left';
        b.style.background = '#2a2a4a';
        b.innerHTML = c.text;
        let disabled = false;
        if (c.reqCondition && c.reqCondition.length > 0) {
            for (let req of c.reqCondition) {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                if (currentVal < req.value) disabled = true;
            }
        }
        if (disabled) {
            b.disabled = true;
            b.innerHTML += `<span class="reason-text">${c.disabledReason}</span>`;
        } else {
            b.onclick = () => {
                document.getElementById('result-text').innerText = c.resultText;
                document.getElementById('change-log').innerHTML = '';
                for(let k in c.statChanges) {
                    if (gameState.stats[k] !== undefined) gameState.stats[k] += c.statChanges[k];
                    else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += c.statChanges[k];
                    const sign = c.statChanges[k] > 0 ? "+" : "";
                    document.getElementById('change-log').innerHTML += `${LABELS[k]}: ${sign}${c.statChanges[k]}<br>`;
                }
                updateAll();
                showScreen('result-screen');
            };
        }
        area.appendChild(b);
    });
    showScreen('event-screen');
}

function renderStats() {
    const statList = document.getElementById('stat-list');
    statList.innerHTML = '';
    for(let k in gameState.stats) {
        statList.innerHTML += `<div class="status-item"><div class="status-label">${LABELS[k]}</div><div class="status-value">${gameState.stats[k]}</div></div>`;
    }
    const innerList = document.getElementById('inner-list');
    innerList.innerHTML = '';
    for(let k in gameState.innerTraits) {
        innerList.innerHTML += `<div class="status-item"><div class="status-label">${LABELS[k]}</div><div class="status-value">${gameState.innerTraits[k]}</div></div>`;
    }
}

function save() { localStorage.setItem('devil_lord_save', JSON.stringify(gameState)); }
init();
</script>
</body>
</html>
