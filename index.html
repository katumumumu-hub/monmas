<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #e94560;
            --text-color: #ffffff;
            --disabled-color: #444;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        header {
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-color);
            text-align: center;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { width: 18px; height: 18px; background: #0f8; border-radius: 50%; box-shadow: 0 0 8px #0f8; }
        .crystal-empty { background: #333; box-shadow: none; }
        #crystal-timer { font-size: 0.8rem; color: #aaa; }

        main {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; flex: 1; flex-direction: column; }
        .active { display: flex; }

        /* 画像エリアを大きく表示 */
        .rank-image-box {
            flex: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #333;
        }
        #rank-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 画像の比率を保って表示 */
        }

        .home-bottom-area { flex-shrink: 0; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; }
        .status-label { font-size: 0.7rem; color: #aaa; }
        .status-value { font-size: 1rem; font-weight: bold; }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* スキル詳細 */
        #skill-detail-panel {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            margin-top: 10px;
            display: none;
        }

        footer { display: flex; background: var(--panel-color); border-top: 1px solid #333; }
        footer button { flex: 1; background: transparent; border-right: 1px solid #333; padding: 12px; font-weight: normal; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div id="rank-name">魔族の端くれ</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box">
                <img id="rank-image" src="" alt="階級画像">
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item"><div class="status-label">次まで</div><div class="status-value" id="display-next-rank">1,000</div></div>
                </div>
                <div class="status-item" style="margin-bottom:10px;"><div class="status-label">配下</div><div class="status-value" id="display-subordinates">0名</div></div>
                <button onclick="startEvent()">イベント発生 (消費: 1)</button>
            </div>
        </div>

        <div id="event-screen" class="screen">
            <h3 id="event-title"></h3>
            <p id="event-text"></p>
            <div id="choices-area"></div>
        </div>

        <div id="result-screen" class="screen">
            <h3>結果</h3>
            <p id="result-text"></p>
            <div id="change-log" style="color:#0f8;"></div>
            <div id="skill-log" style="color:#fa0;"></div>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3>内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div id="acquired-skills-list"></div>
            <div id="skill-detail-panel">
                <div id="detail-skill-name" style="font-weight:bold;"></div>
                <div id="detail-skill-bonus" style="color:#0f8; font-size:0.8rem;"></div>
                <div id="detail-skill-desc" style="font-size:0.8rem; margin-top:5px;"></div>
            </div>
        </div>
    </main>

    <footer>
        <button onclick="showScreen('home-screen')">戻る</button>
        <button onclick="showScreen('skill-screen')">スキル</button>
        <button onclick="showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
// マスターデータに画像パス(imagePath)を追加
const ranks = [
    { "id": 1, "name": "魔族の端くれ", "reqCombatPower": 0, "maxCrystals": 3, "imagePath": "assets/images/rank1.png" },
    { "id": 2, "name": "魔軍歩兵", "reqCombatPower": 1000, "maxCrystals": 4, "imagePath": "assets/images/rank2.png" }
];

const skills = [
    { "id": 1, "name": "強打", "description": "魔力を拳に込めて殴りつける。", "bonus": { "physAtk": 5 }, "reqs": [{ "stat": "physAtk", "val": 0 }] }
];

const events = [
    {
        "id": 1, "title": "特訓", "text": "独りで鍛錬した。", "minRankId": 1,
        "choices": [{ "text": "筋力トレ", "req": null, "res": "筋肉がついた。", "change": {"physAtk": 10} }]
    }
];

const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感'};

let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: []
};

function init() {
    const saved = localStorage.getItem('devil_lord_save');
    if (saved) gameState = JSON.parse(saved);
    updateAll();
    setInterval(updateTimer, 1000);
}

function updateAll() {
    const s = gameState.stats;
    const i = gameState.innerTraits;
    const subs = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    const cp = Object.values(s).reduce((a,b)=>a+b,0) + Object.values(i).reduce((a,b)=>a+b,0) + Math.max(0, subs);
    
    // UI更新
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    document.getElementById('rank-name').innerText = currentRank.name;
    document.getElementById('rank-image').src = currentRank.imagePath; // 画像パスを反映
    document.getElementById('display-combat-power').innerText = cp.toLocaleString();
    document.getElementById('display-subordinates').innerText = Math.max(0, subs).toLocaleString() + "名";
    
    renderCrystalUI(currentRank);
    renderStats();
    save();
}

function renderCrystalUI(rank) {
    const area = document.getElementById('crystal-container');
    area.innerHTML = '';
    for(let i=0; i<rank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        area.appendChild(d);
    }
}

function updateTimer() {
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const remaining = (60 * 60 * 1000) - (Date.now() - gameState.lastPlayTime);
    const m = Math.floor(remaining/1000/60);
    const s = Math.floor((remaining/1000)%60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startEvent() {
    if(gameState.crystals <= 0) return;
    gameState.crystals--;
    gameState.lastPlayTime = Date.now();
    const ev = events[0]; // サンプルとして1つ目
    document.getElementById('event-title').innerText = ev.title;
    document.getElementById('event-text').innerText = ev.text;
    const area = document.getElementById('choices-area');
    area.innerHTML = '';
    ev.choices.forEach(c => {
        const b = document.createElement('button');
        b.innerText = c.text;
        b.onclick = () => {
            document.getElementById('result-text').innerText = c.res;
            for(let k in c.change) gameState.stats[k] += c.change[k];
            updateAll();
            showScreen('result-screen');
        };
        area.appendChild(b);
    });
    showScreen('event-screen');
}

function renderStats() {
    const list = document.getElementById('stat-list');
    list.innerHTML = '';
    for(let k in gameState.stats) {
        list.innerHTML += `<div class="status-item"><div class="status-label">${LABELS[k]}</div><div class="status-value">${gameState.stats[k]}</div></div>`;
    }
}

function save() { localStorage.setItem('devil_lord_save', JSON.stringify(gameState)); }

init();
</script>
</body>
</html>
