<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - Home UI Framework</title>
    <style>
        :root {
            /* カラーパレット */
            --bg-sky: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            --panel-bg: rgba(0, 0, 0, 0.4);
            --text-white: #ffffff;
            --accent-green: #55efc4;
            --accent-yellow: #ffeaa7;
            --nav-bg: #ffffff;
            --border-white: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: var(--text-white);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-sky);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* --- 1. 上部：プレイヤー情報 --- */
        .header-info {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-slot {
            background: var(--panel-bg);
            border: 1px solid var(--border-white);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 20px;
        }
        .info-label { color: var(--accent-yellow); font-weight: bold; margin-right: 5px; }

        /* --- 2. 中央：タネモン表示エリア --- */
        .monster-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .monster-image-area {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ここにJSで画像を流し込む */
        }
        .days-badge {
            background: rgba(0,0,0,0.5);
            padding: 4px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            min-width: 100px;
            text-align: center;
        }

        /* --- 3. ステータスパネル --- */
        .status-panel {
            width: 85%;
            background: var(--panel-bg);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .status-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .status-name { width: 50px; font-weight: bold; }
        .status-bar-bg {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin: 0 10px;
            overflow: hidden;
        }
        .status-bar-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%; /* 動的に変更 */
        }
        .status-value { width: 30px; text-align: right; }

        /* --- 4. 行動ボタン --- */
        .action-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn-main {
            width: 130px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        .btn-act { background: #55efc4; color: #00b894; }
        .btn-all { background: #ffeaa7; color: #d63031; }

        /* --- 5. 下部：ナビゲーション --- */
        .bottom-nav {
            background: var(--nav-bg);
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #636e72;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: bold;
            gap: 5px;
        }
        .nav-icon-placeholder {
            width: 40px;
            height: 40px;
            background: #dfe6e9;
            border-radius: 10px;
        }
        .nav-button.active { color: #0984e3; }
        .nav-button.active .nav-icon-placeholder { background: #74b9ff; }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="header-info">
        <div class="info-slot"><span class="info-label">PLAYER:</span><span id="player-name"></span></div>
        <div class="info-slot"><span class="info-label">MONEY:</span><span id="player-money"></span></div>
        <div class="info-slot"><span class="info-label">RANK:</span><span id="player-rank"></span></div>
        <div class="info-slot"><span class="info-label">DIAMOND:</span><span id="player-diamond"></span></div>
    </header>

    <main class="monster-display">
        <div class="monster-image-area" id="monster-img">
            </div>
        <div class="days-badge" id="display-days">
            </div>
    </main>

    <div style="display: flex; justify-content: center;">
        <section class="status-panel">
            <div class="status-row">
                <span class="status-name">HP</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-hp"></div></div>
                <span class="status-value" id="val-hp"></span>
            </div>
            <div class="status-row">
                <span class="status-name">筋力</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-str"></div></div>
                <span class="status-value" id="val-str"></span>
            </div>
            <div class="status-row">
                <span class="status-name">魔力</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-mag"></div></div>
                <span class="status-value" id="val-mag"></span>
            </div>
            <div class="status-row">
                <span class="status-name">防御</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-def"></div></div>
                <span class="status-value" id="val-def"></span>
            </div>
            <div class="status-row">
                <span class="status-name">俊敏</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-spd"></div></div>
                <span class="status-value" id="val-spd"></span>
            </div>
        </section>
    </div>

    <div style="display: flex; justify-content: center;">
        <div class="action-container">
            <button class="btn-main btn-act">行動</button>
            <button class="btn-main btn-all">全行動</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-button active">
            <div class="nav-icon-placeholder"></div>
            <span>育成</span>
        </div>
        <div class="nav-button">
            <div class="nav-icon-placeholder"></div>
            <span>図鑑</span>
        </div>
        <div class="nav-button">
            <div class="nav-icon-placeholder"></div>
            <span>ショップ</span>
        </div>
        <div class="nav-button">
            <div class="nav-icon-placeholder"></div>
            <span>増築</span>
        </div>
        <div class="nav-button">
            <div class="nav-icon-placeholder"></div>
            <span>持ち物</span>
        </div>
    </nav>

</div>

</body>
</html>
