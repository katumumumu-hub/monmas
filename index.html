<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハナモン・ブリーダー - 統合版</title>
    <style>
        :root {
            --bg-sky: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            --panel-bg: rgba(0, 0, 0, 0.4);
            --text-white: #ffffff;
            --accent-green: #55efc4;
            --accent-yellow: #ffeaa7;
            --accent-blue: #0984e3;
            --nav-bg: #ffffff;
        }

        body { font-family: sans-serif; margin: 0; background: #222; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: var(--bg-sky); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        section { display: none; width: 100%; height: 100%; flex-direction: column; }
        section.active { display: flex; }

        /* ヘッダー */
        .header-info { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: rgba(0,0,0,0.2); }
        .info-slot { background: var(--panel-bg); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; color: white; display: flex; justify-content: space-between; }
        .info-label { color: var(--accent-yellow); font-weight: bold; }

        /* メイン表示 */
        .monster-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .monster-placeholder { width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 4rem; }

        /* ショップリスト */
        #shop-item-list { flex: 1; overflow-y: auto; padding: 15px; }
        .shop-item-card { background: white; margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* ナビゲーション */
        .bottom-nav { height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 15px 15px 0 0; }
        .nav-button { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; color: #95a5a6; cursor: pointer; border: none; background: none; }
        .nav-button.active { color: var(--accent-blue); font-weight: bold; }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; }

        .btn-buy { background: var(--accent-blue); color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="home-screen" class="active">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">PLAYER:</span><span id="player-name">ケンジ</span></div>
            <div class="info-slot"><span class="info-label">MONEY:</span><span id="player-money" class="money-display">1500 G</span></div>
        </header>
        <div class="monster-display">
            <div class="monster-placeholder">🌱</div>
            <div style="margin-top:20px; font-weight:bold; font-size:1.2rem; color:white;">ドロモン</div>
        </div>
        <div class="bottom-nav">
            <button class="nav-button active" onclick="showPage('home-screen')">
                <span class="nav-icon">🥚</span><span>育成</span>
            </button>
            <button class="nav-button">
                <span class="nav-icon">📖</span><span>図鑑</span>
            </button>
            <button class="nav-button" onclick="showPage('shop-screen')">
                <span class="nav-icon">🛒</span><span>ショップ</span>
            </button>
            <button class="nav-button">
                <span class="nav-icon">🏗</span><span>増築</span>
            </button>
            <button class="nav-button">
                <span class="nav-icon">🎒</span><span>持ち物</span>
            </button>
        </div>
    </section>

    <section id="shop-screen">
        <header class="header-info">
            <div class="info-slot"><span class="info-label">MONEY:</span><span id="shop-player-money" class="money-display">1500 G</span></div>
            <button onclick="showPage('home-screen')" style="color:white; background:none; border:none; cursor:pointer;">✖ 戻る</button>
        </header>
        <div id="shop-item-list">
            <p style="text-align:center; color:white;">アイテムを取得中...</p>
        </div>
    </section>
</div>

<script>
    // 1. ゲームの状態管理
    let gameState = {
        money: 1500,
        inventory: []
    };

    // 2. 画面切り替え関数
    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        
        if(id === 'shop-screen') {
            fetchShopData();
        }
    }

    // 3. ショップデータの取得
    async function fetchShopData() {
        const url = "https://raw.githubusercontent.com/katumumumu-hub/monmas/main/shop.json";
        const container = document.getElementById('shop-item-list');
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderShop(data.items);
        } catch (error) {
            container.innerHTML = "<p style='text-align:center; color:white;'>ショップデータの読み込みに失敗しました</p>";
        }
    }

    // 4. ショップ画面の表示
    function renderShop(items) {
        const container = document.getElementById('shop-item-list');
        container.innerHTML = '';

        items.forEach(item => {
            const itemCard = document.createElement('div');
            itemCard.className = "shop-item-card";
            itemCard.innerHTML = `
                <div style="flex:1;">
                    <div style="font-weight:bold;">${item.name}</div>
                    <div style="font-size:0.7rem; color:#666;">${item.description}</div>
                    <div style="color:#e67e22; font-weight:bold;">💰 ${item.price} G</div>
                </div>
                <button class="btn-buy" onclick="buyItem('${item.name}', ${item.price})">購入</button>
            `;
            container.appendChild(itemCard);
        });
    }

    // 5. 購入処理
    function buyItem(name, price) {
        if (gameState.money >= price) {
            gameState.money -= price;
            gameState.inventory.push(name);
            alert(`${name} を購入しました！`);
            updateUI();
        } else {
            alert("所持金が足りません！");
        }
    }

    // 6. お金表示の更新
    function updateUI() {
        document.querySelectorAll('.money-display').forEach(el => {
            el.innerText = gameState.money + " G";
        });
    }

    // 起動時に表示を更新
    updateUI();
</script>

</body>
</html>
