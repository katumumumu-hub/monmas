<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #1a1a2e; /* いただいた画像のようなダークブルー系 */
            --panel-color: #16213e;
            --accent-color: #e94560; /* ピンクレッド系のアクセント */
            --text-color: #ffffff;
            --disabled-color: #444;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 850px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        /* ヘッダー周り */
        header {
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-color);
            text-align: center;
        }
        #rank-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { width: 18px; height: 18px; background: #0f8; border-radius: 50%; box-shadow: 0 0 8px #0f8; }
        .crystal-empty { background: #333; box-shadow: none; }
        #crystal-timer { font-size: 0.8rem; color: #aaa; } /* タイマーのスタイル */

        /* メイン画面のベース設定 */
        main {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .screen { display: none; flex: 1; flex-direction: column; }
        .active { display: flex; }

        /* ホーム画面：画像拡大レイアウト */
        .rank-image-box {
            flex: 1; /* 空きスペースをすべて画像エリアに割り当てる */
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 15px;
            position: relative;
            min-height: 200px;
        }
        .rank-up-effect {
            position: absolute;
            color: yellow;
            font-weight: bold;
            font-size: 1.5rem;
            animation: flash 1s infinite;
        }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ホーム画面下部のステータス＆ボタンエリア */
        .home-bottom-area {
            flex-shrink: 0; /* 画像に押されても縮まない */
        }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 8px 10px; border-radius: 4px; }
        .status-label { font-size: 0.75rem; color: #aaa; margin-bottom: 2px; }
        .status-value { font-size: 1.1rem; font-weight: bold; }

        /* 各種ボタン */
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
        }
        button:disabled { background: var(--disabled-color); cursor: not-allowed; opacity: 0.6; }

        /* イベント画面 */
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .choice-btn { margin-bottom: 10px; text-align: left; background: #2a2a4a; }
        .reason-text { font-size: 0.75rem; color: #ff8888; display: block; margin-top: 3px; font-weight: normal; }

        /* スキル画面 */
        #acquired-skills-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .skill-item { 
            background: var(--panel-color); 
            margin-bottom: 8px; 
            padding: 12px; 
            border-left: 4px solid var(--accent-color); 
            border-radius: 4px;
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .skill-item.selected { background: rgba(255,255,255,0.15); border-left-color: #ffaa00; }
        .skill-name { font-weight: bold; font-size: 1.1rem; }
        
        /* スキル詳細パネル */
        #skill-detail-panel {
            flex-shrink: 0;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            display: none; /* 初期は非表示 */
        }
        #detail-skill-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        #detail-skill-bonus { color: #0f8; font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; }
        #detail-skill-desc { font-size: 0.85rem; color: #ddd; line-height: 1.4; }

        /* フッター（ナビゲーション） */
        footer {
            display: flex;
            background: var(--panel-color);
            border-top: 1px solid #333;
        }
        footer button { flex: 1; margin: 0; border-radius: 0; background: transparent; border-right: 1px solid #333; font-weight: normal; padding: 12px; }
        footer button:last-child { border-right: none; }
        footer button:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div id="rank-name">魔族の端くれ</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" id="rank-image-area">
                <span>階級画像</span>
                <div id="rank-up-msg" class="rank-up-effect" style="display:none;">RANK UP!!</div>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item"><div class="status-label">次まで</div><div class="status-value" id="display-next-rank">1,000</div></div>
                </div>
                <div class="status-grid" style="grid-template-columns: 1fr;">
                    <div class="status-item"><div class="status-label">配下</div><div class="status-value" id="display-subordinates">0名</div></div>
                </div>
                <button onclick="startEvent()">イベント発生 (消費: 1)</button>
            </div>
        </div>

        <div id="event-screen" class="screen">
            <div class="event-box">
                <h3 id="event-title"></h3>
                <p id="event-text"></p>
            </div>
            <div id="choices-area"></div>
        </div>

        <div id="result-screen" class="screen">
            <div class="event-box" style="flex:1;">
                <h3>結果</h3>
                <p id="result-text"></p>
                <div id="change-log" style="color: #0f8; font-size: 0.9rem; margin-top: 15px;"></div>
                <div id="skill-log" style="color: #ffaa00; font-size: 0.9rem; margin-top: 5px;"></div>
            </div>
            <button onclick="showScreen('home-screen')" style="margin-top: 15px;">ホームへ戻る</button>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3 style="margin-top:10px;">内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div id="acquired-skills-list"></div>
            
            <div id="skill-detail-panel">
                <div id="detail-skill-name">スキル名</div>
                <div id="detail-skill-bonus">上昇値</div>
                <div id="detail-skill-desc">説明文</div>
            </div>
        </div>
    </main>

    <footer>
        <button onclick="showScreen('home-screen')">戻る</button>
        <button onclick="showScreen('skill-screen')">スキル</button>
        <button onclick="showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
// --- JS用 定数マスターデータ（description付き） ---
const ranks = [
    { "id": 1, "name": "魔族の端くれ", "reqCombatPower": 0, "maxCrystals": 3 },
    { "id": 2, "name": "魔軍歩兵", "reqCombatPower": 1000, "maxCrystals": 4 }
    // ... 必要に応じてranks.jsonのデータを追加
];

const skills = [
    { "id": 1, "name": "火炎", "description": "手のひらから灼熱の炎を放つ基本的な魔法。周囲の空気を焼き尽くす。", "bonus": { "magAtk": 8 }, "reqs": [{ "stat": "magAtk", "val": 8 }] },
    { "id": 2, "name": "強打", "description": "魔力を拳に込めて力任せに殴りつける。単純だが破壊力は高い。", "bonus": { "physAtk": 5 }, "reqs": [{ "stat": "physAtk", "val": 5 }] },
    { "id": 3, "name": "号令", "description": "部下を鼓舞する大音声。組織を動かす力となる。", "bonus": { "leadership": 15 }, "reqs": [{ "stat": "leadership", "val": 10 }] }
    // ... skills.jsonのデータをここに追加
];

const events = [
    {
        "id": 1, "title": "魔軍歩兵の因縁", "text": "パトロール中の歩兵に生意気だと絡まれた。", "minRankId": 1,
        "choices": [
            { "text": "力で分からせる", "req": {"stat": "physAtk", "val": 5}, "fail": "力が足りない…", "res": "力でねじ伏せた！", "change": {"physAtk": 5, "cruelty": 10} },
            { "text": "魔法で驚かせる", "req": {"stat": "magAtk", "val": 5}, "fail": "魔力が足りない…", "res": "魔力を見せつけた。", "change": {"magAtk": 5, "charisma": 5} },
            { "text": "賄賂を渡す", "req": null, "res": "金で解決したが屈辱的だ。", "change": {"luck": 5, "responsibility": -5} },
            { "text": "謝る", "req": null, "res": "プライドを捨てて謝罪した。", "change": {"responsibility": 10, "charisma": -5} }
        ]
    }
    // ... events.jsonのデータをここに追加
];

const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感'};

// --- ゲーム状態管理 ---
let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: []
};

let subordinates = 0;
let combatPower = 0;

// --- 初期化 ---
function init() {
    const saved = localStorage.getItem('devil_lord_save');
    if (saved) {
        gameState = JSON.parse(saved);
        recoverCrystals();
    }
    updateAll();
    showScreen('home-screen');
    
    // タイマーを1秒ごとに更新
    setInterval(updateTimer, 1000);
}

// クリスタル回復ロジック（時間を正確に計算）
function recoverCrystals() {
    const now = Date.now();
    const msPerCrystal = 60 * 60 * 1000; // 1時間 = 3600000ミリ秒
    const elapsed = now - gameState.lastPlayTime;
    const diffCrystals = Math.floor(elapsed / msPerCrystal);
    
    if (diffCrystals > 0) {
        const currentRank = ranks.find(r => r.id === gameState.currentRankId);
        const prevCrystals = gameState.crystals;
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + diffCrystals);
        
        if (gameState.crystals < currentRank.maxCrystals) {
            // MAXに達していない場合は、回復した時間分だけPlayTimeを進める（余剰時間を保持）
            gameState.lastPlayTime += diffCrystals * msPerCrystal;
        } else {
            // MAXに達した場合は、基準時間をリセット
            gameState.lastPlayTime = now;
        }
    }
}

// タイマー更新描画
function updateTimer() {
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    const timerElement = document.getElementById('crystal-timer');

    if (gameState.crystals >= currentRank.maxCrystals) {
        timerElement.innerText = "MAX";
        return;
    }
    
    const now = Date.now();
    const msPerCrystal = 60 * 60 * 1000;
    const elapsed = now - gameState.lastPlayTime;
    
    // アプリを開いたまま1時間が経過した時の処理
    if (elapsed >= msPerCrystal) {
        recoverCrystals();
        updateAll(); // UIの再描画
        return;
    }
    
    // 次のクリスタルまでの残り時間を計算
    const remaining = msPerCrystal - elapsed;
    const m = Math.floor(remaining / 1000 / 60);
    const s = Math.floor((remaining / 1000) % 60);
    timerElement.innerText = `次まで: ${m}分${s.toString().padStart(2, '0')}秒`;
}

// 数値の更新
function updateAll() {
    const s = gameState.stats;
    const i = gameState.innerTraits;

    subordinates = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    subordinates = Math.max(0, subordinates);

    const statSum = Object.values(s).reduce((a, b) => a + b, 0);
    const innerSum = Object.values(i).reduce((a, b) => a + b, 0);
    combatPower = statSum + innerSum + subordinates;

    checkRankUp();
    checkSkills();
    renderUI();
    save();
}

function checkRankUp() {
    const nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    if (nextRank && combatPower >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        document.getElementById('rank-up-msg').style.display = 'block';
        setTimeout(() => { document.getElementById('rank-up-msg').style.display = 'none'; }, 3000);
        updateAll();
    }
}

function checkSkills() {
    let skillAdded = false;
    skills.forEach(skill => {
        if (!gameState.acquiredSkills.includes(skill.id)) {
            const isMet = skill.reqs.every(req => {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                return currentVal >= req.val;
            });

            if (isMet) {
                gameState.acquiredSkills.push(skill.id);
                for (let key in skill.bonus) {
                    if (gameState.stats[key] !== undefined) gameState.stats[key] += skill.bonus[key];
                    else if (gameState.innerTraits[key] !== undefined) gameState.innerTraits[key] += skill.bonus[key];
                }
                skillAdded = true;
                const log = document.getElementById('skill-log');
                if (log) log.innerHTML += `スキル習得: 【${skill.name}】！<br>`;
            }
        }
    });
    if (skillAdded) updateAll();
}

function renderUI() {
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    document.getElementById('rank-name').innerText = currentRank.name;
    document.getElementById('display-combat-power').innerText = combatPower.toLocaleString();
    document.getElementById('display-subordinates').innerText = subordinates.toLocaleString() + "名";
    
    const nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    document.getElementById('display-next-rank').innerText = nextRank ? nextRank.reqCombatPower.toLocaleString() : "MAX";

    // クリスタル表示
    const crystalArea = document.getElementById('crystal-container');
    crystalArea.innerHTML = '';
    for (let i = 0; i < currentRank.maxCrystals; i++) {
        const dot = document.createElement('div');
        dot.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        crystalArea.appendChild(dot);
    }
    updateTimer(); // 即座にタイマーも更新

    // ステータス画面
    renderList('stat-list', gameState.stats, LABELS);
    renderList('inner-list', gameState.innerTraits, LABELS);

    // スキルリスト描画
    const skillList = document.getElementById('acquired-skills-list');
    skillList.innerHTML = '';
    gameState.acquiredSkills.forEach(sid => {
        const sk = skills.find(s => s.id === sid);
        // クリックで showSkillDetail() を呼ぶように設定
        skillList.innerHTML += `<div class="skill-item" id="skill-item-${sk.id}" onclick="showSkillDetail(${sk.id})"><div class="skill-name">${sk.name}</div></div>`;
    });
}

function renderList(targetId, data, labels) {
    const target = document.getElementById(targetId);
    target.innerHTML = '';
    for (let key in data) {
        target.innerHTML += `<div class="status-item"><div class="status-label">${labels[key]}</div><div class="status-value">${data[key]}</div></div>`;
    }
}

// スキル詳細の表示
function showSkillDetail(skillId) {
    const skill = skills.find(s => s.id === skillId);
    if (!skill) return;

    // ボーナステキストの作成
    let bonusText = "";
    for (let key in skill.bonus) {
        bonusText += `${LABELS[key]} +${skill.bonus[key]}　`;
    }

    document.getElementById('detail-skill-name').innerText = skill.name;
    document.getElementById('detail-skill-bonus').innerText = `【上昇効果】\n${bonusText}`;
    document.getElementById('detail-skill-desc').innerText = skill.description || "説明がありません。";

    document.getElementById('skill-detail-panel').style.display = 'block';

    // 選択中のハイライトを更新
    document.querySelectorAll('.skill-item').forEach(el => el.classList.remove('selected'));
    document.getElementById(`skill-item-${skillId}`).classList.add('selected');
}

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function startEvent() {
    if (gameState.crystals <= 0) return alert("クリスタルが足りません");
    
    // クリスタル消費時にMAXだった場合は、そこから1時間のカウントダウンをスタートさせる
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals === currentRank.maxCrystals) {
        gameState.lastPlayTime = Date.now();
    }

    gameState.crystals--;
    save();
    updateTimer(); // 即座にタイマー更新

    const currentEvents = events.filter(e => e.minRankId <= gameState.currentRankId);
    const event = currentEvents[Math.floor(Math.random() * currentEvents.length)];

    document.getElementById('event-title').innerText = event.title;
    document.getElementById('event-text').innerText = event.text;
    const choicesArea = document.getElementById('choices-area');
    choicesArea.innerHTML = '';

    event.choices.forEach((c) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        
        let disabled = false;
        if (c.req) {
            const currentVal = gameState.stats[c.req.stat] !== undefined ? gameState.stats[c.req.stat] : gameState.innerTraits[c.req.stat];
            if (currentVal < c.req.val) disabled = true;
        }

        btn.innerHTML = c.text;
        if (disabled) {
            btn.disabled = true;
            btn.innerHTML += `<span class="reason-text">${c.fail}</span>`;
        } else {
            btn.onclick = () => finishEvent(c);
        }
        choicesArea.appendChild(btn);
    });

    showScreen('event-screen');
}

function finishEvent(choice) {
    document.getElementById('result-text').innerText = choice.res;
    document.getElementById('change-log').innerHTML = '';
    document.getElementById('skill-log').innerHTML = '';

    for (let key in choice.change) {
        if (gameState.stats[key] !== undefined) gameState.stats[key] += choice.change[key];
        else if (gameState.innerTraits[key] !== undefined) gameState.innerTraits[key] += choice.change[key];
        
        // 変動値の表示（プラスなら+をつける）
        const sign = choice.change[key] > 0 ? "+" : "";
        document.getElementById('change-log').innerHTML += `${LABELS[key]}: ${sign}${choice.change[key]}<br>`;
    }

    updateAll();
    showScreen('result-screen');
}

function save() {
    localStorage.setItem('devil_lord_save', JSON.stringify(gameState));
}

// 起動
init();
</script>

</body>
</html>
