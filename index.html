<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王育成計画</title>
    <style>
        :root {
            --bg-color: #080410;
            --panel-color: rgba(25, 12, 40, 0.95);
            --border-color: #5c3a82;
            --accent-gold: #e5b05c;
            --text-color: #f0e6fa;
            --disabled-color: #221533;
            --crystal-color: #d100ff;
            --btn-bg: linear-gradient(180deg, #4b2373 0%, #1a082e 100%);
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at top, #1e0b35, #000000);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: transparent;
        }

        header {
            flex-shrink: 0;
            padding: 10px;
            background: var(--panel-color);
            border-bottom: 2px solid var(--accent-gold);
            text-align: center;
            position: relative;
        }
        
        #rank-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(229, 176, 92, 0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #crystal-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .crystal-icon { 
            width: 16px; height: 16px; 
            background: var(--crystal-color); 
            border-radius: 50%; 
            box-shadow: 0 0 12px var(--crystal-color); 
            transform: rotate(45deg);
            transition: all 0.3s;
        }
        .crystal-empty { background: #1a0a25; box-shadow: inset 0 0 5px #000; transform: rotate(45deg) scale(0.8); opacity: 0.5; }
        #crystal-timer { font-size: 0.8rem; color: #a894c2; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 15px; 
            overflow: hidden;
        }

        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;}
        .active { display: flex; }

        .rank-image-box {
            flex: 1 1 0; 
            min-height: 0; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(92, 58, 130, 0.4);
            cursor: pointer;
        }

        #rank-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .home-bottom-area { flex-shrink: 0; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .status-item { 
            background: rgba(30, 15, 45, 0.7); 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid rgba(92, 58, 130, 0.5);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        .status-label { font-size: 0.7rem; color: #bcaed4; margin-bottom: 2px; }
        .status-value { font-size: 1rem; font-weight: bold; color: var(--accent-gold); }

        button {
            background: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        button:disabled, button.disabled-btn { 
            background: var(--disabled-color); 
            border-color: #222; 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        button.disabled-btn:active { transform: scale(1); }

        .reason-text { font-size: 0.75rem; color: #ff5555; display: block; margin-top: 3px; font-weight: normal; }

        #skill-detail-panel {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            margin-top: 10px;
            display: none;
        }

        footer { 
            flex-shrink: 0;
            display: flex; 
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
        }
        footer button { 
            flex: 1; 
            background: transparent; 
            border: none;
            border-right: 1px solid var(--border-color); 
            border-radius: 0;
            padding: 12px 0; 
            font-size: 0.85rem;
            font-weight: bold;
            color: #d1c1e5;
        }
        footer button:last-child { border-right: none; }
        footer button:disabled { background: #1a082e; color: #555; opacity: 1; }

        .dev-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .dev-btn { padding: 4px 8px; font-size: 0.7rem; width: auto; border-radius: 4px; border:none; cursor: pointer; }
        .btn-max { background: #ffaa00; color: #000; }
        .btn-reset { background: #cc3333; color: #fff; }

        #event-screen, #result-screen, #status-screen, #skill-screen, #item-screen { overflow-y: auto; }
        .event-box { background: var(--panel-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        
        /* アイテム画面用のスタイル */
        .item-row { background: rgba(30,15,50,0.8); padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #4a2b6e; }
        .item-rarity { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px; margin-right: 6px; font-weight: bold; border: 1px solid currentColor;}
        .rarity-SS { color: #ff3333; text-shadow: 0 0 5px #ff0000; }
        .rarity-S { color: #ffdf00; }
        .rarity-A { color: #d100ff; }
        .rarity-B { color: #33aaff; }
        .rarity-C { color: #33ff33; }
        .rarity-D { color: #aaaaaa; }
        .rarity-E { color: #888888; }
        .rarity-F { color: #555555; }
        .item-use-btn { background: #4a2b6e; padding: 6px 12px; font-size: 0.8rem; width: auto; border-radius: 4px; border: 1px solid #7c4bb3; margin-top: 8px;}

        /* ★追加：特訓（レベル選択）画面用のスタイル */
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; overflow-y: auto; padding: 5px 0; }
        .level-btn { background: #2a1540; border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 5px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center; }
        .level-btn.cleared { background: #1a3320; border-color: #33cc66; color: #aaffaa; }
        .level-btn:disabled { background: #111; color: #555; border-color: #333; cursor: not-allowed; }

        /* ★追加：戦闘画面用のスタイル */
        .battle-ui { display: flex; flex-direction: column; height: 100%; gap: 10px; }
        .battle-enemy-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); position: relative;}
        .enemy-name { font-size: 1.2rem; font-weight: bold; color: #ff5555; margin-bottom: 5px; text-shadow: 0 0 5px #ff0000; }
        .enemy-image { max-width: 120px; max-height: 120px; object-fit: contain; margin-bottom: 10px; }
        
        .hp-container { width: 100%; background: #222; border-radius: 10px; border: 1px solid #555; height: 18px; overflow: hidden; margin-bottom: 5px; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);}
        .hp-bar { height: 100%; background: linear-gradient(90deg, #228b22, #32cd32); width: 100%; transition: width 0.3s ease; }
        .hp-bar.enemy { background: linear-gradient(90deg, #8b0000, #ff4500); }
        .hp-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 0.75rem; line-height: 18px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;}

        .battle-player-area { padding: 10px; background: rgba(30, 15, 45, 0.8); border-radius: 8px; border: 1px solid var(--border-color);}
        
        .battle-log-area { flex: 1; background: #000; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; color: #d1c1e5; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);}
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="dev-tools">
            <button class="dev-btn btn-max" onclick="playSE('click'); devMaxCrystals()">[開発] クリスタルMAX</button>
            <button class="dev-btn btn-reset" onclick="playSE('click'); devResetSave()">[開発] セーブ初期化</button>
        </div>
        <div id="rank-name">読み込み中...</div>
        <div id="crystal-container"></div>
        <div id="crystal-timer">次まで: --分--秒</div>
    </header>

    <main>
        <div id="home-screen" class="screen active">
            <div class="rank-image-box" onclick="playRankVideo()">
                <video id="rank-video" muted playsinline preload="metadata" src=""></video>
            </div>
            
            <div class="home-bottom-area">
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">戦闘力</div><div class="status-value" id="display-combat-power">0</div></div>
                    <div class="status-item">
                        <div class="status-label" id="display-next-req">戦闘力---で</div>
                        <div class="status-value" id="display-next-name" style="font-size: 0.9rem;">---に昇格</div>
                    </div>
                </div>
                <div class="status-item" style="margin-bottom:10px; flex-direction:row; justify-content:space-between; align-items:center;">
                    <div class="status-label" style="margin:0;">配下総数</div>
                    <div class="status-value" id="display-subordinates">0名</div>
                </div>
                <button onclick="startEvent()" style="margin-bottom: 8px;">イベント発生 (消費: 1)</button>
                <button onclick="openTrainingScreen()" style="background: linear-gradient(180deg, #732323 0%, #2e0808 100%);">特訓で鍛える (消費: 1)</button>
            </div>
        </div>

        <div id="training-screen" class="screen">
            <h3>特訓レベル選択</h3>
            <p style="font-size: 0.8rem; margin-top: 0; color: #aaa;">勝利するとステータスやアイテムを獲得できます。</p>
            <div id="level-list" class="level-grid"></div>
        </div>

        <div id="battle-screen" class="screen">
            <div class="battle-ui">
                <div class="battle-enemy-area">
                    <div class="enemy-name" id="battle-enemy-name">未知のモンスター</div>
                    <img class="enemy-image" id="battle-enemy-img" src="" alt="敵画像">
                    <div style="width: 90%;">
                        <div class="hp-container">
                            <div class="hp-bar enemy" id="battle-enemy-hp-bar" style="width: 100%;"></div>
                            <div class="hp-text" id="battle-enemy-hp-text">HP: ???/???</div>
                        </div>
                    </div>
                </div>
                
                <div class="battle-player-area">
                    <div style="font-weight: bold; color: var(--accent-gold); margin-bottom: 5px;">自分（魔族）</div>
                    <div class="hp-container">
                        <div class="hp-bar" id="battle-player-hp-bar" style="width: 100%;"></div>
                        <div class="hp-text" id="battle-player-hp-text">HP: 100/100</div>
                    </div>
                </div>
                
                <div class="battle-log-area" id="battle-log">
                    戦闘開始！<br>
                    （※オートバトルロジックは後で実装します）<br>
                </div>

                <button id="temp-end-battle-btn" onclick="endBattleMock()" style="padding: 10px; font-size: 0.9rem;">[仮] 戦闘終了（結果画面へ）</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="event-box" style="flex:1;">
                <h3 id="result-title">結果</h3>
                <p id="result-text" style="line-height:1.5;"></p>
                <div id="change-log" style="color:var(--crystal-color); margin-top: 15px; font-size: 0.9rem; font-weight:bold;"></div>
                <div id="skill-log" style="color:#ffdf00; margin-top: 10px; font-size: 0.95rem; font-weight:bold;"></div>
                <div id="item-log" style="color:#00ffaa; margin-top: 10px; font-size: 0.95rem; font-weight:bold;"></div>
            </div>
            <button onclick="playSE('click'); showScreen('home-screen')">ホームへ</button>
        </div>

        <div id="status-screen" class="screen">
            <h3>ステータス</h3>
            <div class="status-grid" id="stat-list"></div>
            <h3 style="margin-top: 15px;">内面性</h3>
            <div class="status-grid" id="inner-list"></div>
        </div>

        <div id="skill-screen" class="screen">
            <h3>取得済みスキル</h3>
            <div id="acquired-skills-list" style="display:flex; flex-direction:column; gap:8px;"></div>
            <div id="skill-detail-panel">
                <div id="detail-skill-name" style="font-weight:bold; font-size:1.1rem; color:var(--accent-gold); border-bottom:1px solid var(--border-color); padding-bottom:5px;"></div>
                <div id="detail-skill-bonus" style="color:var(--crystal-color); font-size:0.85rem; font-weight:bold; margin: 8px 0;"></div>
                <div id="detail-skill-desc" style="font-size:0.85rem; line-height:1.4;"></div>
            </div>
        </div>

        <div id="item-screen" class="screen">
            <h3>所持アイテム</h3>
            <div id="inventory-list"></div>
        </div>
    </main>

    <footer>
        <button onclick="playSE('click'); showScreen('home-screen')">ホーム</button>
        <button onclick="playSE('click'); showScreen('item-screen')">アイテム</button>
        <button onclick="playSE('click'); showScreen('skill-screen')">スキル</button>
        <button onclick="playSE('click'); showScreen('status-screen')">ステータス</button>
    </footer>
</div>

<script>
// ==========================================
// ★ サウンドエフェクト（SE）管理
// ==========================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!audioCtx) { audioCtx = new AudioContext(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
}

function playTone(freq, type, duration, vol=0.1, delay=0) {
    if (!audioCtx) return;
    const startTime = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function playSE(type) {
    initAudio();
    switch(type) {
        case 'click':      
            playTone(800, 'sine', 0.1, 0.05, 0); break;
        case 'error':      
            playTone(150, 'sawtooth', 0.3, 0.05, 0); playTone(140, 'sawtooth', 0.4, 0.05, 0.15); break;
        case 'finish':     
            playTone(523.25, 'sine', 0.3, 0.05, 0); playTone(659.25, 'sine', 0.3, 0.05, 0.1); playTone(783.99, 'sine', 0.4, 0.05, 0.2); break;
        case 'item':
            playTone(1046.50, 'sine', 0.1, 0.05, 0); playTone(1318.51, 'sine', 0.2, 0.05, 0.1); break;
        case 'use_item':
            playTone(600, 'sine', 0.4, 0.05, 0); playTone(800, 'triangle', 0.3, 0.03, 0.1); break;
        case 'skill':      
            playTone(880, 'square', 0.2, 0.03, 0); playTone(1108.73, 'square', 0.2, 0.03, 0.1); playTone(1318.51, 'square', 0.2, 0.03, 0.2); playTone(1760, 'square', 0.6, 0.03, 0.3); break;
        case 'rankup':     
            playTone(392.00, 'triangle', 0.2, 0.08, 0); playTone(392.00, 'triangle', 0.2, 0.08, 0.15); playTone(392.00, 'triangle', 0.2, 0.08, 0.30); playTone(523.25, 'triangle', 0.6, 0.08, 0.45); break;
    }
}

// ==========================================
// ★ グローバル変数・初期化
// ==========================================
let ranks = [];
let skills = [];
let events = [];
let items = [];
let monsters = []; // ★モンスターデータ用

const LABELS = {hp:'HP', mp:'MP', physAtk:'物理攻撃', magAtk:'魔法力', magDef:'魔法防御', physDef:'物理防御', agility:'俊敏性', luck:'運', cruelty:'凶悪性', leadership:'統率力', charisma:'カリスマ', control:'支配欲', responsibility:'責任感', crystals:'魔力石'};

let gameState = {
    lastPlayTime: Date.now(),
    crystals: 3,
    currentRankId: 1,
    stats: { hp: 0, mp: 0, physAtk: 0, magAtk: 0, magDef: 0, physDef: 0, agility: 0, luck: 0 },
    innerTraits: { cruelty: 0, leadership: 0, charisma: 0, control: 0, responsibility: 0 },
    acquiredSkills: [],
    items: {},
    clearedLevels: [] // ★特訓クリア記録
};

async function init() {
    try {
        const [ranksRes, skillsRes, eventsRes, itemsRes, monstersRes] = await Promise.all([
            fetch('ranks.json'),
            fetch('skills.json'),
            fetch('events.json'),
            fetch('items.json'),
            fetch('monsters.json').catch(() => ({ json: () => [] })) // ★モンスターデータ読み込み
        ]);
        ranks = await ranksRes.json();
        skills = await skillsRes.json();
        events = await eventsRes.json();
        items = await itemsRes.json();
        monsters = await monstersRes.json();

        const saved = localStorage.getItem('devil_lord_save');
        if (saved) gameState = JSON.parse(saved);
        
        // 互換性対応
        if (!gameState.items) gameState.items = {};
        if (!gameState.clearedLevels) gameState.clearedLevels = [];

        recoverCrystals();
        updateAll();
        setInterval(updateTimer, 1000);
    } catch (error) {
        console.error("データ読み込み失敗", error);
    }
}

// 画面遷移管理
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    // イベント中や戦闘中はフッターボタンを無効化
    const footerBtns = document.querySelectorAll('footer button');
    if (id === 'event-screen' || id === 'battle-screen') {
        footerBtns.forEach(btn => btn.disabled = true);
    } else {
        footerBtns.forEach(btn => btn.disabled = false);
    }
}

// ==========================================
// ★ オートバトル（特訓）関連モック関数
// ==========================================
function openTrainingScreen() {
    playSE('click');
    showScreen('training-screen');
    renderLevelGrid();
}

function renderLevelGrid() {
    const list = document.getElementById('level-list');
    list.innerHTML = '';
    
    // 1〜100までのレベルボタンを生成
    for (let i = 1; i <= 100; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.innerText = `Lv.${i}`;
        
        // クリア済みの場合は色を変える
        if (gameState.clearedLevels && gameState.clearedLevels.includes(i)) {
            btn.classList.add('cleared');
        }
        
        // モンスターデータが存在しないレベルは押せないようにする（暫定）
        if (!monsters.find(m => m.level === i) && i > 10) {
            btn.disabled = true;
            btn.innerText = '???';
        }
        
        btn.onclick = () => startBattleMock(i);
        list.appendChild(btn);
    }
}

function startBattleMock(levelId) {
    if(gameState.crystals <= 0) {
        playSE('error'); 
        return alert("魔力が足りません");
    }
    
    playSE('click');
    
    // クリスタル消費
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
    gameState.crystals--;
    save();
    renderCrystalUI(currentRank);
    updateTimer();

    showScreen('battle-screen');
    
    const monster = monsters.find(m => m.level === levelId);
    const enemyName = monster ? monster.name : `未知のモンスター (Lv.${levelId})`;
    const enemyHp = monster ? monster.stats.hp : 999;
    
    // 戦闘画面の初期描画
    document.getElementById('battle-enemy-name').innerText = enemyName;
    document.getElementById('battle-enemy-hp-text').innerText = `HP: ${enemyHp}/${enemyHp}`;
    document.getElementById('battle-player-hp-text').innerText = `HP: ${gameState.stats.hp}/${gameState.stats.hp}`;
    
    document.getElementById('battle-log').innerHTML = `<span style="color:#ff5555">${enemyName}</span> が現れた！<br><br>※ ここに自動で戦闘ログが流れます。<br>※ ロジック実装をお待ちください。<br>`;
}

function endBattleMock() {
    playSE('finish');
    
    // 結果画面への引き渡し
    document.getElementById('result-title').innerText = "特訓 終了";
    document.getElementById('result-text').innerText = "特訓が終了した！\n（モックのため、ステータス変動はまだありません）";
    document.getElementById('change-log').innerHTML = "";
    document.getElementById('skill-log').innerHTML = "";
    document.getElementById('item-log').innerHTML = "";
    
    showScreen('result-screen');
}


// ==========================================
// ★ 既存の機能（開発ツール、イベント、ステータス描画等）
// ==========================================
function playRankVideo() {
    const video = document.getElementById('rank-video');
    if (video) { video.muted = false; video.currentTime = 0; video.play(); }
}

function devMaxCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    gameState.crystals = currentRank.maxCrystals;
    gameState.lastPlayTime = Date.now();
    save(); updateAll();
}

function devResetSave() {
    if (confirm("データをリセットしますか？")) {
        localStorage.removeItem('devil_lord_save');
        location.reload();
    }
}

function recoverCrystals() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    const msPerCrystal = 10 * 60 * 1000; // 10分
    const now = Date.now();
    const elapsed = now - gameState.lastPlayTime;
    if (elapsed >= msPerCrystal && gameState.crystals < currentRank.maxCrystals) {
        const added = Math.floor(elapsed / msPerCrystal);
        gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + added);
        gameState.lastPlayTime = gameState.crystals === currentRank.maxCrystals ? now : gameState.lastPlayTime + added * msPerCrystal;
        updateAll();
    }
}

function checkAndRenderSkills() {
    const list = document.getElementById('acquired-skills-list');
    list.innerHTML = '';
    let isNewSkillAcquired = false;

    skills.forEach(skill => {
        let meetsReq = true;
        if (skill.requirements && skill.requirements.length > 0) {
            for (let req of skill.requirements) {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                if (currentVal < req.value) { meetsReq = false; break; }
            }
        }
        
        if (meetsReq && !gameState.acquiredSkills.includes(skill.id)) {
            gameState.acquiredSkills.push(skill.id);
            isNewSkillAcquired = true;
            if (skill.bonus) {
                for (let k in skill.bonus) {
                    if (gameState.stats[k] !== undefined) gameState.stats[k] += skill.bonus[k];
                    else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += skill.bonus[k];
                }
            }
        }
    });

    if (isNewSkillAcquired) { checkAndRenderSkills(); return; }

    if (gameState.acquiredSkills.length === 0) {
        list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">まだスキルを習得していません。</div>';
        return;
    }

    gameState.acquiredSkills.forEach(skillId => {
        const skill = skills.find(s => s.id === skillId);
        if (skill) {
            const btn = document.createElement('button');
            btn.style.textAlign = 'left';
            btn.style.padding = '12px';
            btn.style.background = 'rgba(40,20,60,0.8)';
            btn.style.marginBottom = '5px';
            btn.innerText = `♦ ${skill.name}`;
            btn.onclick = () => {
                playSE('click');
                document.getElementById('skill-detail-panel').style.display = 'block';
                document.getElementById('detail-skill-name').innerText = skill.name;
                const bonusText = Object.entries(skill.bonus || {}).map(([k, v]) => `${LABELS[k]} +${v}`).join(' / ');
                document.getElementById('detail-skill-bonus').innerText = bonusText ? `【効果】 ${bonusText}` : '';
                document.getElementById('detail-skill-desc').innerText = skill.description;
            };
            list.appendChild(btn);
        }
    });
}

function updateAll() {
    if (ranks.length === 0) return;
    checkAndRenderSkills();

    const s = gameState.stats;
    const i = gameState.innerTraits;
    const subs = (s.physAtk + s.magAtk + s.magDef + s.physDef + s.agility + s.luck) + i.leadership + i.charisma - i.cruelty;
    const cp = Object.values(s).reduce((a,b)=>a+b,0) + Object.values(i).reduce((a,b)=>a+b,0) + Math.max(0, subs);
    
    let currentRank = ranks.find(r => r.id === gameState.currentRankId);
    let nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
    
    if (nextRank && cp >= nextRank.reqCombatPower) {
        gameState.currentRankId++;
        currentRank = ranks.find(r => r.id === gameState.currentRankId);
        nextRank = ranks.find(r => r.id === gameState.currentRankId + 1);
        
        playSE('rankup');
        setTimeout(() => { alert(`昇格：${currentRank.name}`); }, 100);
        
        if (gameState.crystals < currentRank.maxCrystals) gameState.crystals = currentRank.maxCrystals;
    }

    document.getElementById('rank-name').innerText = currentRank.name;
    const video = document.getElementById('rank-video');
    const newSrc = currentRank.imagePath + "#t=0.001";
    if (video.src !== new URL(newSrc, document.baseURI).href) {
        video.src = newSrc;
        video.muted = true; 
    }
    
    document.getElementById('display-combat-power').innerText = cp.toLocaleString();
    if (nextRank) {
        document.getElementById('display-next-req').innerText = `戦闘力${nextRank.reqCombatPower.toLocaleString()}で`;
        document.getElementById('display-next-name').innerText = `${nextRank.name}に昇格`;
    } else {
        document.getElementById('display-next-req').innerText = `昇格条件`;
        document.getElementById('display-next-name').innerText = `最高階級（MAX）`;
    }
    document.getElementById('display-subordinates').innerText = Math.max(0, subs).toLocaleString() + "名";
    
    renderCrystalUI(currentRank);
    renderStats();
    renderItems(); 
    save();
}

function renderCrystalUI(rank) {
    const area = document.getElementById('crystal-container');
    area.innerHTML = '';
    for(let i=0; i<rank.maxCrystals; i++) {
        const d = document.createElement('div');
        d.className = i < gameState.crystals ? 'crystal-icon' : 'crystal-icon crystal-empty';
        area.appendChild(d);
    }
}

function updateTimer() {
    if (ranks.length === 0) return;
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    recoverCrystals();
    if (gameState.crystals >= currentRank.maxCrystals) {
        document.getElementById('crystal-timer').innerText = "MAX";
        return;
    }
    const msPerCrystal = 10 * 60 * 1000;
    const remaining = msPerCrystal - (Date.now() - gameState.lastPlayTime);
    const m = Math.floor(remaining / 1000 / 60);
    const s = Math.floor((remaining / 1000) % 60);
    document.getElementById('crystal-timer').innerText = `次まで: ${m}分${s.toString().padStart(2,'0')}秒`;
}

function startEvent() {
    if(gameState.crystals <= 0) { playSE('error'); return alert("魔力が足りません"); }
    
    playSE('click'); 
    const currentRank = ranks.find(r => r.id === gameState.currentRankId);
    if (gameState.crystals >= currentRank.maxCrystals) gameState.lastPlayTime = Date.now();
    
    gameState.crystals--;
    save(); renderCrystalUI(currentRank); updateTimer();
    
    const currentEvents = events.filter(e => e.minRankId <= gameState.currentRankId);
    const ev = currentEvents[Math.floor(Math.random() * currentEvents.length)];
    document.getElementById('event-title').innerText = ev.title;
    document.getElementById('event-text').innerText = ev.text;
    const area = document.getElementById('choices-area');
    area.innerHTML = '';
    
    ev.choices.forEach(c => {
        const b = document.createElement('button');
        b.style.textAlign = 'left'; b.innerHTML = c.text;
        
        let disabled = false;
        if (c.reqCondition) {
            for (let req of c.reqCondition) {
                const currentVal = gameState.stats[req.stat] !== undefined ? gameState.stats[req.stat] : gameState.innerTraits[req.stat];
                if (currentVal < req.value) disabled = true;
            }
        }
        
        if (disabled) {
            b.classList.add('disabled-btn');
            b.innerHTML += `<span class="reason-text">${c.disabledReason}</span>`;
            b.onclick = () => { playSE('error'); };
        } else {
            b.onclick = () => {
                let oldRank = gameState.currentRankId;
                let oldSkillCount = gameState.acquiredSkills.length;

                document.getElementById('result-title').innerText = "イベント結果";
                document.getElementById('result-text').innerText = c.resultText;
                document.getElementById('change-log').innerHTML = '';
                document.getElementById('skill-log').innerHTML = ''; 
                document.getElementById('item-log').innerHTML = ''; 
                
                for(let k in c.statChanges) {
                    if (gameState.stats[k] !== undefined) gameState.stats[k] += c.statChanges[k];
                    else if (gameState.innerTraits[k] !== undefined) gameState.innerTraits[k] += c.statChanges[k];
                    const sign = c.statChanges[k] > 0 ? "+" : "";
                    document.getElementById('change-log').innerHTML += `${LABELS[k]}: ${sign}${c.statChanges[k]}<br>`;
                }

                let droppedItemNames = [];
                if (c.itemDrops) {
                    c.itemDrops.forEach(drop => {
                        if (gameState.currentRankId >= (drop.minRankId || 1)) {
                            if (Math.random() < drop.probability) {
                                gameState.items[drop.itemId] = (gameState.items[drop.itemId] || 0) + 1;
                                const itemData = items.find(i => i.id === drop.itemId);
                                if (itemData) droppedItemNames.push(itemData.name);
                            }
                        }
                    });
                }

                const prevSkillCount = gameState.acquiredSkills.length;
                updateAll(); 
                
                let rankedUp = (gameState.currentRankId > oldRank);
                let skilledUp = (gameState.acquiredSkills.length > oldSkillCount);
                let itemDropped = droppedItemNames.length > 0;

                if (!rankedUp) { 
                    if (skilledUp) { playSE('skill'); } else if (itemDropped) { playSE('item'); } else { playSE('finish'); }
                }
                
                if (skilledUp) {
                    const newSkills = gameState.acquiredSkills.slice(prevSkillCount);
                    newSkills.forEach(id => {
                        const s = skills.find(sk => sk.id === id);
                        if (s) document.getElementById('skill-log').innerHTML += `<br>★ スキル【${s.name}】を習得！`;
                    });
                }

                if (itemDropped) { document.getElementById('item-log').innerHTML = `<br>🎁 ドロップ: ${droppedItemNames.join('、')} を獲得！`; }

                showScreen('result-screen');
            };
        }
        area.appendChild(b);
    });
    
    showScreen('event-screen');
}

function renderStats() {
    const labels = [ {id: 'stat-list', data: gameState.stats}, {id: 'inner-list', data: gameState.innerTraits} ];
    labels.forEach(l => {
        const target = document.getElementById(l.id);
        target.innerHTML = '';
        for(let k in l.data) {
            target.innerHTML += `<div class="status-item"><div class="status-label">${LABELS[k]}</div><div class="status-value">${l.data[k]}</div></div>`;
        }
    });
}

function renderItems() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = '';
    
    if (!gameState.items || Object.keys(gameState.items).length === 0) {
        list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">アイテムを所持していません。</div>';
        return;
    }
    
    let hasItem = false;
    for (let itemId in gameState.items) {
        const count = gameState.items[itemId];
        if (count > 0) {
            hasItem = true;
            const itemData = items.find(i => i.id == itemId);
            if (itemData) {
                const effectsText = Object.entries(itemData.effects || {}).map(([k, v]) => `${LABELS[k]}+${v}`).join(' / ');
                list.innerHTML += `
                    <div class="item-row">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:bold; font-size:1.05rem; color:var(--text-color);">
                                <span class="item-rarity rarity-${itemData.rarity}">${itemData.rarity}</span>${itemData.name}
                            </div>
                            <div style="color:var(--accent-gold); font-weight:bold;">所持: ${count}</div>
                        </div>
                        <div style="font-size:0.8rem; color:#aaa; margin-top:6px; line-height:1.4;">${itemData.description}</div>
                        <div style="font-size:0.8rem; color:var(--crystal-color); font-weight:bold; margin-top:4px;">【効果】 ${effectsText}</div>
                        <button class="item-use-btn" onclick="useItem(${itemData.id})">使う</button>
                    </div>`;
            }
        }
    }
    
    if (!hasItem) { list.innerHTML = '<div style="color:#888; text-align:center; padding: 20px 0;">アイテムを所持していません。</div>'; }
}

function useItem(itemId) {
    if (!gameState.items[itemId] || gameState.items[itemId] <= 0) return;
    const itemData = items.find(i => i.id == itemId);
    if (!itemData || !itemData.effects) return;

    const currentRank = ranks.find(r => r.id === gameState.currentRankId);

    for (let k in itemData.effects) {
        if (k === 'crystals') {
            gameState.crystals = Math.min(currentRank.maxCrystals, gameState.crystals + itemData.effects[k]);
        } else if (gameState.stats[k] !== undefined) {
            gameState.stats[k] += itemData.effects[k];
        } else if (gameState.innerTraits[k] !== undefined) {
            gameState.innerTraits[k] += itemData.effects[k];
        }
    }

    gameState.items[itemId]--;
    playSE('use_item');
    alert(`${itemData.name} を使用した！\n力が湧き上がってくるのを感じる…！`);
    save(); updateAll(); 
}

function save() { localStorage.setItem('devil_lord_save', JSON.stringify(gameState)); }
init();
</script>
